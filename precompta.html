      <div class="field"><label>Extrait RNE (Registre National des Entreprises) — PDF</label>
        <button class="btn btn-ghost" onclick="document.getElementById('is-rne-file').click()">${s.rnePdf?'Remplacer le PDF':'Joindre le PDF'}</button>
        <input type="file" id="is-rne-file" hidden accept=".pdf" onchange="infoRNE(event)">
        ${s.rnePdf?`<button class="btn btn-gold" style="margin-top:8px;display:inline-block" onclick="infoOuvrirRNE()">Ouvrir l'extrait RNE</button>`:'<div class="hint">Aucun extrait joint.</div>'}</div>
    </div>
    <div class="field"><label>Mentions légales de la société</label><textarea id="is-mentions" rows="3" style="width:100%">${(s.mentionsLegales||'')}</textarea></div>
  </div>
  <div class="card"><h2>Coordonnées bancaires (pour la facture)</h2>
    <div class="sub">Affichées dans « Détails du paiement » sur les factures de ce dossier.</div>
    <div class="row g3">
      <div class="field"><label>Nom du bénéficiaire</label><input id="is-banqbenef" value="${v('banqueBenef')||(s.raison||'')}"></div>
      <div class="field"><label>IBAN</label><input id="is-iban" value="${v('iban')}" placeholder="FR..."></div>
      <div class="field"><label>BIC</label><input id="is-bic" value="${v('bic')}" placeholder="XXXXFRPPXXX"></div>
    </div></div>
  <div class="card"><div class="right"><button class="btn btn-pri" onclick="enregistrerInfoSociete()">Enregistrer les informations</button></div></div>`;
}
function enregistrerInfoSociete(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  Object.assign(db.societe,{
    raison:g('is-denom'), formeJur:g('is-forme'), capitalSocial:g('is-capital'),
    siren:g('is-siren'), siret:g('is-siret'), tvaIntra:g('is-tvaintra'),
    codeAPE:g('is-ape'), reglementee:g('is-regl')==='oui', dateCreation:g('is-datecrea'),
    activite:g('is-activite'), conventionCollective:g('is-conv'),
    pays:g('is-pays'), ville:g('is-ville'), cp:g('is-cp'), adresse:g('is-adresse'),
    telSociete:g('is-tel'), mailSociete:g('is-mail'), numContact:g('is-numcontact'), numSecretaire:g('is-numsecret'),
    dirigeant:g('is-dirigeant'), mailProDir:g('is-mailprodir'), mailPersoDir:g('is-mailpersodir'),
    associes:g('is-associes'), societesLiees:g('is-socliees'), entreprisesLiees:g('is-entliees'),
    mentionsLegales:g('is-mentions'),
    banqueBenef:g('is-banqbenef'), iban:g('is-iban'), bic:g('is-bic')
  });
  save(); render(); toast('Informations société enregistrées');
}
function infoLogo(ev){ const f=ev.target.files&&ev.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{ db.societe.logo=r.result; save(); render(); toast('Logo enregistré'); }; r.readAsDataURL(f); }
function infoRNE(ev){ const f=ev.target.files&&ev.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{ try{ db.societe.rnePdf=r.result; save(); render(); toast('Extrait RNE joint'); }catch(e){ toast('PDF trop volumineux pour le stockage local'); } }; r.readAsDataURL(f); }
function infoOuvrirRNE(){ if(!db.societe.rnePdf)return; const w=window.open(); if(w) w.document.write('<iframe src="'+db.societe.rnePdf+'" style="border:0;position:fixed;inset:0;width:100%;height:100%"></iframe>'); }

/* ---------- C) Coffre-fort des identifiants ---------- */
const COFFRE_ORGS=[
  {k:'urssaf',nom:'Urssaf',url:'https://www.urssaf.fr'},
  {k:'impots',nom:'Impôts — espace professionnel',url:'https://cfspro.impots.gouv.fr',secret:true},
  {k:'probtp',nom:'Retraite · Prévoyance · Mutuelle (PRO BTP)',url:'https://www.probtp.com'},
  {k:'cibtp',nom:'Congés Payés (CIBTP)',url:'https://www.cibtp.fr'},
  {k:'apst',nom:'Médecine du travail (APST)',url:'https://www.apst.fr'},
  {k:'netentreprises',nom:'Net-Entreprises',url:'https://www.net-entreprises.fr'},
  {k:'francetravail',nom:'France Travail (Pôle Emploi)',url:'https://www.francetravail.fr'},
  {k:'douane',nom:'Douane',url:'https://www.douane.gouv.fr'},
  {k:'actradis',nom:'Actradis',url:'https://www.actradis.fr'},
  {k:'eattestation',nom:'E-Attestation',url:'https://www.e-attestations.com'}
];
function coffreInit(){
  if(!db.societe.credentials) db.societe.credentials={orgs:{},banques:[]};
  const cr=db.societe.credentials; if(!cr.orgs)cr.orgs={}; if(!cr.banques)cr.banques=[];
  COFFRE_ORGS.forEach(o=>{ if(!cr.orgs[o.k]) cr.orgs[o.k]={id:'',pwd:'',url:o.url,secret:''}; if(cr.orgs[o.k].url==null) cr.orgs[o.k].url=o.url; });
  return cr;
}
function cfField(label,id,val,type){
  const t=type||'text';
  return `<div class="field"><label>${label}</label><div class="cf-row">
    <input id="${id}" type="${t}" value="${(val||'').replace(/"/g,'&quot;')}" autocomplete="off" oninput="${id.startsWith('cf-')?'':''}">
    ${t==='password'?`<button class="cf-eye" type="button" onclick="coffrePwToggle('${id}',this)" title="Afficher/Masquer"></button>`:''}
    <button class="cf-copy" type="button" onclick="coffreCopy('${id}')" title="Copier">⧉ Copier</button>
  </div></div>`;
}
function pageCoffre(){
  const cr=coffreInit();
  const orgsHtml=COFFRE_ORGS.map(o=>{ const c=cr.orgs[o.k];
    return `<div class="cf-org">
      <div class="cf-org-h"><span>${o.nom}</span>
        <a class="cf-link" href="${c.url||o.url}" target="_blank" rel="noopener">Se connecter ↗</a></div>
      <div class="row g2">
        ${cfField('Identifiant','cfid-'+o.k,c.id)}
        ${cfField('Mot de passe','cfpw-'+o.k,c.pwd,'password')}
      </div>
      ${o.secret?`<div class="field"><label>Réponse à la question secrète (modification du mot de passe Impôts)</label><div class="cf-row">
        <input id="cfsc-${o.k}" value="${(c.secret||'').replace(/"/g,'&quot;')}" autocomplete="off">
        <button class="cf-copy" type="button" onclick="coffreCopy('cfsc-${o.k}')">⧉ Copier</button></div></div>`:''}
      <div class="field"><label>Lien du portail</label><div class="cf-row">
        <input id="cfurl-${o.k}" value="${(c.url||o.url).replace(/"/g,'&quot;')}" onchange="coffreSet('org','${o.k}','url',this.value)">
        <a class="cf-link" href="${c.url||o.url}" target="_blank" rel="noopener">Ouvrir ↗</a></div></div>
      <div class="right"><button class="btn btn-ghost btn-sm" onclick="coffreSaveOrg('${o.k}',${o.secret?'true':'false'})">Enregistrer</button></div>
    </div>`;}).join('');
  const banksHtml=cr.banques.map((b,i)=>`<div class="cf-org">
      <div class="cf-org-h"><span>Banque ${i+1}</span>
        <button class="btn btn-ghost btn-sm" onclick="coffreDelBanque(${i})">Supprimer</button></div>
      <div class="field"><label>Nom de la banque</label><input id="cfbnom-${i}" value="${(b.nom||'').replace(/"/g,'&quot;')}"></div>
      <div class="row g2">
        ${cfField('Identifiant','cfbid-'+i,b.id)}
        ${cfField('Mot de passe','cfbpw-'+i,b.pwd,'password')}
      </div>
      <div class="field"><label>Lien de la banque</label><div class="cf-row">
        <input id="cfburl-${i}" value="${(b.url||'').replace(/"/g,'&quot;')}" placeholder="https://...">
        ${b.url?`<a class="cf-link" href="${b.url}" target="_blank" rel="noopener">Se connecter ↗</a>`:''}</div></div>
      <div class="right"><button class="btn btn-ghost btn-sm" onclick="coffreSaveBanque(${i})">Enregistrer</button></div>
    </div>`).join('');
  return head('Coffre-fort des identifiants','Identifiants et mots de passe des organismes et banques du dossier, avec lien d\'accès direct. Données conservées localement dans le dossier.')+
  `<div class="card" style="border:1.5px solid var(--gold) !important"><h2>Sécurité</h2>
     <div class="hint">Ces informations sont sensibles. Elles restent stockées <b>localement</b> dans le dossier (export JSON) et ne sont jamais transmises. Évitez de partager l'export. Cliquez « » pour afficher un mot de passe, « ⧉ Copier » pour le copier en un clic.</div></div>
   <div class="card"><h2>Organismes & administrations</h2>${orgsHtml}</div>
   <div class="card"><h2>Banques du client</h2>${banksHtml||'<div class="empty">Aucune banque enregistrée.</div>'}
     <div class="right" style="margin-top:10px"><button class="btn btn-gold" onclick="coffreAddBanque()">+ Ajouter une banque</button></div></div>`;
}
function coffrePwToggle(id,btn){ const el=document.getElementById(id); if(!el)return; if(el.type==='password'){el.type='text';btn.textContent='';}else{el.type='password';btn.textContent='';} }
function coffreCopy(id){ const el=document.getElementById(id); if(!el)return; const val=el.value||'';
  const ok=()=>toast('Copié ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(val).then(ok).catch(()=>{try{el.type='text';el.select();document.execCommand('copy');ok();}catch(e){toast('Copie impossible');}}); }
  else { try{const tp=el.type;el.type='text';el.select();document.execCommand('copy');el.type=tp;ok();}catch(e){toast('Copie impossible');} } }
function coffreSet(scope,key,field,val){ const cr=coffreInit();
  if(scope==='org'){ cr.orgs[key]=cr.orgs[key]||{}; cr.orgs[key][field]=val; } save(); }
function coffreSaveOrg(k,hasSecret){ const cr=coffreInit(); const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  cr.orgs[k]={ id:g('cfid-'+k), pwd:g('cfpw-'+k), url:g('cfurl-'+k), secret:hasSecret?g('cfsc-'+k):(cr.orgs[k].secret||'') };
  save(); render(); toast('Identifiants enregistrés'); }
function coffreAddBanque(){ const cr=coffreInit(); cr.banques.push({nom:'',id:'',pwd:'',url:''}); save(); render(); }
function coffreDelBanque(i){ const cr=coffreInit(); cr.banques.splice(i,1); save(); render(); toast('Banque supprimée'); }
function coffreSaveBanque(i){ const cr=coffreInit(); const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  cr.banques[i]={ nom:g('cfbnom-'+i), id:g('cfbid-'+i), pwd:g('cfbpw-'+i), url:g('cfburl-'+i) };
  save(); render(); toast('Banque enregistrée'); }

/* ---------- D) Doublons d'écritures (FEC) ---------- */
function ecrMontants(e){ let ttc=0,tva=0,tiers='';
  (e.lignes||[]).forEach(l=>{ const c=String(l.compte); const net=Math.abs((+l.debit||0)-(+l.credit||0));
    if(c.startsWith('401')||c.startsWith('411')){ ttc+=net; tiers=tiers||c; }
    if(c.startsWith('445')) tva+=net; });
  return { ttc:r2(ttc), tva:r2(tva), ht:r2(ttc-tva), tid:(e.tiersId||tiers||'') }; }
function scanDoublonsEcritures(){
  const res=(db.societe&&db.societe.dupEcrResolu)||{}; const groups={};
  (db.ecritures||[]).forEach(e=>{ e.doublon=false; e.dupGroup=null; const m=ecrMontants(e);
    if(!(m.ttc>0 && m.tid)) return;
    const k=e.date+'|'+m.tid+'|'+m.ttc+'|'+m.ht+'|'+m.tva; e._dk=k; (groups[k]=groups[k]||[]).push(e); });
  const real={}; Object.keys(groups).forEach(k=>{ if(groups[k].length>1 && !res[k]){ real[k]=groups[k]; groups[k].forEach(e=>{e.doublon=true;e.dupGroup=k;}); } });
  window.dupEcrGroups=real; return real; }
function blocDoublonsFEC(){
  const g=window.dupEcrGroups||{}; const keys=Object.keys(g);
  if(!keys.length) return `<div class="card"><h2>Traitement des doublons (FEC)</h2><div class="empty">Aucun doublon d'écriture détecté.</div></div>`;
  const n=keys.reduce((a,k)=>a+g[k].length,0);
  return `<div class="card" style="border:2px solid #c98b1f !important"><h2>Traitement des doublons (FEC)</h2>
    <div class="sub">${keys.length} groupe(s), ${n} écriture(s) en double potentiel (même date, tiers, HT, TVA, TTC). Confirmez chaque groupe : <b>supprimer</b> l'écriture en trop, ou <b>conserver les deux</b>.</div>
    ${keys.map(k=>{const grp=g[k];const m=ecrMontants(grp[0]);
      return `<div class="dup-grp"><div class="dup-grp-h">${frDate(grp[0].date)} · ${m.tid} · TTC ${eur(m.ttc)} · HT ${eur(m.ht)} · TVA ${eur(m.tva)}</div>
        <table><tbody>${grp.map(e=>`<tr><td>${jrnTag(e.journal)} <b>${e.libelle}</b></td>
          <td class="r" style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="dupEcrSupprimer('${e.id}')">Supprimer</button>
          <button class="btn btn-ghost btn-sm" onclick="dupEcrIgnorer('${k}')">✓ Conserver les deux</button></td></tr>`).join('')}</tbody></table>
      </div>`;}).join('')}</div>`;
}
function dupEcrSupprimer(id){ const e=(db.ecritures||[]).find(x=>x.id===id); if(!e)return;
  if(!confirm('Supprimer définitivement cette écriture en double ?'))return;
  db.ecritures=db.ecritures.filter(x=>x.id!==id);
  db.banque=(db.banque||[]).filter(b=>b.ecritureId!==id);
  save(); scanDoublonsEcritures(); render(); toast('Écriture en double supprimée'); }
function dupEcrIgnorer(k){ db.societe.dupEcrResolu=db.societe.dupEcrResolu||{}; db.societe.dupEcrResolu[k]=true; save(); scanDoublonsEcritures(); render(); toast('Doublon conservé (notification levée)'); }

/* ---------- E) Doublons fournisseurs / clients ---------- */
function scanDoublonsTiers(){
  const norm=s=>(s||'').toUpperCase().normalize('NFD').replace(/[^A-Z0-9]/g,'');
  const res=(db.societe&&db.societe.dupTiersResolu)||{}; const groups={};
  (db.tiers||[]).forEach(t=>{ const nn=norm(t.nom); if(!nn)return; const k=(t.type||'')+':'+nn; (groups[k]=groups[k]||[]).push(t); });
  const ids=new Set(); const real={};
  Object.keys(groups).forEach(k=>{ if(groups[k].length>1 && !res[k]){ real[k]=groups[k]; groups[k].forEach(t=>ids.add(t.id)); } });
  window.dupTiersIds=ids; window.dupTiersGroups=real; return real; }
function blocDoublonsTiers(){
  const g=window.dupTiersGroups||{}; const keys=Object.keys(g);
  if(!keys.length) return `<div class="card"><h2>Doublons fournisseurs / clients</h2><div class="empty">Aucun doublon de tiers détecté.</div></div>`;
  return `<div class="card" style="border:2px solid #c98b1f !important"><h2>Doublons fournisseurs / clients</h2>
    <div class="sub">Mêmes fournisseurs ou clients détectés (surlignés en <b style="color:#c79200">jaune</b> dans les listes). Choisissez : fusionner, supprimer ou laisser.</div>
    ${keys.map(k=>{const grp=g[k]; const type=grp[0].type;
      return `<div class="dup-grp"><div class="dup-grp-h">${type==='client'?'Client':'Fournisseur'} : ${grp[0].nom} <span class="mini">(${grp.length} fiches)</span></div>
        <table><tbody>${grp.map(t=>`<tr class="dup-tiers"><td><b>${t.nom}</b> <span class="mini">${t.compteAux||''}${t.email?' · '+t.email:''}${t.siret?' · '+t.siret:''}</span></td>
          <td class="r" style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="tiersSupprimerDup('${t.id}')">Supprimer</button></td></tr>`).join('')}</tbody></table>
        <div class="right" style="margin-top:6px;gap:8px">
          <button class="btn btn-pri btn-sm" onclick="tiersFusionner('${k}')">Fusionner</button>
          <button class="btn btn-ghost btn-sm" onclick="tiersLaisser('${k}')">Laisser</button></div>
      </div>`;}).join('')}</div>`;
}
function tiersFusionner(key){ scanDoublonsTiers(); const grp=(window.dupTiersGroups||{})[key]; if(!grp||grp.length<2)return;
  const score=t=>((db.factures||[]).filter(f=>f.tiersId===t.id).length)+((db.ecritures||[]).filter(e=>e.tiersId===t.id).length)+((db.banque||[]).filter(b=>b.tiersId===t.id).length);
  const master=grp.slice().sort((a,b)=>score(b)-score(a))[0];
  if(!confirm('Fusionner '+grp.length+' fiches « '+master.nom+' » en une seule ? Les mouvements seront rattachés à la fiche conservée.'))return;
  grp.forEach(t=>{ if(t.id===master.id)return;
    (db.factures||[]).forEach(f=>{if(f.tiersId===t.id)f.tiersId=master.id;});
    (db.ecritures||[]).forEach(e=>{if(e.tiersId===t.id)e.tiersId=master.id;});
    (db.banque||[]).forEach(b=>{if(b.tiersId===t.id)b.tiersId=master.id;});
    (db.reglements||[]).forEach(r=>{if(r.tiersId===t.id)r.tiersId=master.id;});
    if(!master.compteAux && t.compteAux) master.compteAux=t.compteAux;
    db.tiers=db.tiers.filter(x=>x.id!==t.id); });
  save(); scanDoublonsTiers(); render(); toast('Fiches fusionnées sur « '+master.nom+' »'); }
function tiersSupprimerDup(id){ const t=(db.tiers||[]).find(x=>x.id===id); if(!t)return;
  const nb=((db.ecritures||[]).filter(e=>e.tiersId===id).length)+((db.factures||[]).filter(f=>f.tiersId===id).length);
  if(!confirm('Supprimer la fiche « '+t.nom+' » ?'+(nb?(' '+nb+' mouvement(s) lié(s) deviendront orphelins.'):'')))return;
  db.tiers=db.tiers.filter(x=>x.id!==id); save(); scanDoublonsTiers(); render(); toast('Fiche supprimée'); }
function tiersLaisser(key){ db.societe.dupTiersResolu=db.societe.dupTiersResolu||{}; db.societe.dupTiersResolu[key]=true; save(); scanDoublonsTiers(); render(); toast('Doublon laissé (notification levée)'); }

/* ---------- Greffes : panneaux doublons dans FEC, Tiers ; scan au Journal ---------- */
(function(){
  if(typeof pageFEC==='function'){ const _f=pageFEC; pageFEC=function(){ scanDoublonsEcritures(); return _f()+blocDoublonsFEC(); }; }
  if(typeof pageJournal==='function'){ const _j=pageJournal; pageJournal=function(){ scanDoublonsEcritures(); return _j(); }; }
  if(typeof pageTiers==='function'){ const _t=pageTiers; pageTiers=function(){ scanDoublonsTiers(); return _t()+blocDoublonsTiers(); }; }
})();

</script>
<script id="yada-addon2">
/* ============================================================
   YADA — Facturation client enrichie
   - Bouton « Nouveau » : création (formulaire à gauche, aperçu facture à droite)
   - Catalogue marchandises / produits / prestations (montant + TVA générés)
   - Brouillon -> génération de l'écriture (autorisation) -> TVA collectée
   Bloc additif.
   ============================================================ */
const NF_UNITES=['unité','heure','jour','forfait','mois','kg','m²','m³','litre','lot','km'];
const NF_DEVISES=['EUR — Euro','USD — Dollar','GBP — Livre','CHF — Franc suisse'];
const NF_MOYENS=['Non précisé','Virement','Prélèvement','Carte bancaire','Chèque','Espèces'];
let nfState=null;

function nfLigneVide(){ return {desc:'',catId:'',qte:1,unite:'unité',pu:0,taux:20,forfait:false}; }

/* ----- Catalogue (sous-module produits/services) ----- */
function catInit(){ if(!db.catalogue) db.catalogue=[]; return db.catalogue; }
function catStats(catId){ let ht=0,tva=0; (db.docs||[]).forEach(d=>{ if(d.type!=='facture'||!d.ecritureId)return;
  (d.lignes||[]).forEach(l=>{ if(l.catId===catId){ const lht=l.forfait?r2(+l.pu||0):r2((+l.qte||0)*(+l.pu||0)); ht+=lht; tva+=r2(lht*(+l.taux||0)/100); } }); });
  return {ht:r2(ht),tva:r2(tva)}; }
function catalogueCard(){ const cat=catInit();
  const TYPES={marchandise:'Marchandise',produit:'Produit',prestation:'Prestation de services'};
  const rows=cat.map(it=>{const st=catStats(it.id);
    return `<tr><td><span class="tag ${it.type==='prestation'?'t-devis':it.type==='produit'?'t-part':'t-avoir'}">${TYPES[it.type]||it.type}</span></td>
      <td><b>${it.libelle}</b></td><td class="r num">${eur(+it.pu||0)}</td><td class="r num">${it.taux} %</td>
      <td class="r num cre">${eur(st.ht)}</td><td class="r num">${eur(st.tva)}</td>
      <td class="r"><button class="btn btn-ghost btn-sm" onclick="catDel('${it.id}')">✕</button></td></tr>`;}).join('');
  return `<div class="card"><h2>Catalogue — marchandises, produits & prestations</h2>
    <div class="sub">Articles réutilisables en facturation. « Montant généré » et « TVA » cumulent les ventes effectivement facturées (écriture générée).</div>
    <table><thead><tr><th>Type</th><th>Libellé</th><th class="r">PU HT</th><th class="r">TVA</th><th class="r">Montant généré</th><th class="r">TVA générée</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan=7 class=empty>Aucun article — ajoutez vos produits/services ci-dessous.</td></tr>'}</tbody></table>
    <div class="row g4" style="margin-top:12px">
      <div class="field"><label>Type</label><select id="cat-type"><option value="marchandise">Marchandise</option><option value="produit">Produit</option><option value="prestation">Prestation de services</option></select></div>
      <div class="field"><label>Libellé</label><input id="cat-lib" placeholder="Désignation"></div>
      <div class="field"><label>PU HT</label><input id="cat-pu" type="number" value="0"></div>
      <div class="field"><label>TVA %</label><select id="cat-taux"><option>20</option><option>10</option><option>5.5</option><option>0</option></select></div>
    </div>
    <div class="right"><button class="btn btn-gold" onclick="catAdd()">+ Ajouter au catalogue</button></div>
  </div>`; }
function catAdd(){ const cat=catInit(); const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const lib=(g('cat-lib')||'').trim(); if(!lib)return toast('Libellé requis');

   <div><h2>Créer une facture</h2><div class="sub">Nouvelle facture avec aperçu en direct (facture à droite, saisie à gauche), enregistrée en brouillon puis comptabilisée après autorisation.</div></div>

/* ----- Calculs ----- */
function nfTotaux(){ const s=nfState; let htBrut=0; const parTaux={};
  s.lignes.forEach(l=>{ const lht=l.forfait?r2(+l.pu||0):r2((+l.qte||0)*(+l.pu||0)); htBrut+=lht; parTaux[l.taux]=(parTaux[l.taux]||0)+lht; });
  htBrut=r2(htBrut);
  let remiseMontant=0;
  if(s.remiseType==='pct') remiseMontant=r2(htBrut*(+s.remiseVal||0)/100);
  else if(s.remiseType==='eur') remiseMontant=Math.min(htBrut,r2(+s.remiseVal||0));
  const htNet=r2(htBrut-remiseMontant);
  const fact=htBrut>0?(htNet/htBrut):1;
  let tva=0; Object.keys(parTaux).forEach(t=>{ tva+=r2(parTaux[t]*fact*(+t)/100); }); tva=r2(tva);
  const ttc=r2(htNet+tva);
  const acompte=r2(+s.acompte||0);
  const retenue=s.retenue?r2(ttc*(+s.retenue||0)/100):0;
  const netAPayer=r2(ttc-acompte-retenue);
  return {htBrut,remiseMontant,htNet,tva,ttc,acompte,retenue,netAPayer}; }
function nfRemiseLabel(){ const s=nfState; if(s.remiseType==='pct')return (s.remiseVal||0)+' %'; if(s.remiseType==='eur')return eur(s.remiseVal||0); return ''; }
function nfTempDoc(){ nfSync(); const tot=nfTotaux(); const s=nfState;
  return { type:s.type, clientId:s.clientId, date:s.date, echeance:s.ech, numero:s.numero||'(brouillon)', devise:s.devise,
    lignes:s.lignes.map(l=>({desc:l.desc,qte:l.forfait?1:l.qte,pu:l.pu,taux:l.taux,unite:l.forfait?'forfait':l.unite})),
    htBrut:tot.htBrut, remiseMontant:tot.remiseMontant, remiseLabel:nfRemiseLabel(),
    ht:tot.htNet, tva:tot.tva, ttc:tot.ttc, acompte:tot.acompte, retenue:tot.retenue, netAPayer:tot.netAPayer,
    moyen:s.moyen, conditions:s.conditions, escompte:s.escompte, escompteDelai:s.escompteDelai, showPay:s.showPay!==false }; }

  if((v=g('nf-type'))!=null)s.type=v;

  if((v=g('nf-date'))!=null)s.date=v;

  if((v=g('nf-devise'))!=null)s.devise=v;

  if((v=g('nf-remtype'))!=null)s.remiseType=v;
  if((v=g('nf-remval'))!=null)s.remiseVal=+v||0;
  if((v=g('nf-acompte'))!=null)s.acompte=+v||0;
  if((v=g('nf-moyen'))!=null)s.moyen=v;
  if((v=g('nf-cond'))!=null)s.conditions=v;
  if((v=g('nf-esc'))!=null)s.escompte=+v||0;

  if(!s.clientId) return toast('Sélectionnez un client');
  const tot=nfTotaux(); if(tot.htBrut<=0 && s.type!=='avoir') return toast('Ajoutez au moins une ligne');

    statut:'brouillon', envoye:false, ecritureId:null, devisId:null, transformeEn:null };

/* ----- Génération de l'écriture (autorisation + numéro unique + TVA) ----- */
function genererEcritureDoc(id){ const d=db.docs.find(x=>x.id===id); if(!d)return;
  if(d.ecritureId) return toast('Écriture déjà générée pour '+d.numero);
  if(d.type==='devis') return toast('Un devis ne génère pas d\'écriture — transformez-le en facture');
  const t=db.tiers.find(x=>x.id===d.clientId); if(!t)return toast('Client introuvable');
  if(!confirm('Générer l\'écriture comptable de la facture '+d.numero+' ?\n\nUne écriture de vente sera enregistrée (TVA collectée incluse) et transmise au module TVA. La numérotation '+d.numero+' est définitive.')) return;
  const taux=Math.abs(d.ht)>0?r2(Math.abs(d.tva)/Math.abs(d.ht)*100):20;
  const f=posterFacture({type:'vente',tiersId:t.id,date:d.date,base:Math.abs(d.ht)*(d.ttc<0?-1:1),baseEst:'HT',taux,compteContre:t.compteContre,compteTVA:'44571',numero:d.numero,echeance:d.echeance});
  d.ecritureId=f.ecritureId; d.statut='valide'; save(); render();
  toast('Écriture générée pour '+d.numero+' — TVA collectée transmise au module TVA');
}

function docStatutFac(d){
  if(d.type==='devis') return d.transformeEn?{l:'Transformé',c:'t-part'}:{l:'Devis',c:'t-part'};
  if(d.type==='avoir') return {l:'Avoir',c:'t-avoir'};
  if(!d.ecritureId || d.statut==='brouillon') return {l:'Brouillon',c:'t-draft'};
  const f=(db.factures||[]).find(x=>x.numero===d.numero);
  const reg=(f&&typeof reglementDe==='function')?reglementDe(f.id):null;
  if(reg && reg.statut==='regle') return {l:'Payé',c:'t-paid'};
  if(reg && reg.statut==='partiel') return {l:'Partiel',c:'t-part'};
  if(d.echeance && d.echeance < todayStr()) return {l:'En retard',c:'t-late'};
  return {l:'Émise',c:'t-part'};
}

      <td class="r" style="white-space:nowrap">

  const pag=`<div class="fa-pag"><span>Page ${page} sur ${pages}</span>
     <div style="display:flex;gap:8px">
       <button class="btn btn-ghost btn-sm" ${page<=1?'disabled':''} onclick="faListeGo(${page-1})">‹ Précédent</button>

    <div style="overflow-x:auto"><table class="fa-table"><thead><tr>

      <th class="r">MONTANT HT</th><th class="r">TVA</th><th class="r">MONTANT TTC</th><th>DATE D'ENVOI</th><th class="r">ACTIONS</th>
    </tr></thead><tbody>${rows||'<tr><td colspan=10 class=empty>Aucune facture — cliquez sur « + Nouveau ».</td></tr>'}</tbody></table></div>

<script id="yada-addon5">
/* ============================================================
   YADA — Facturation : fenêtre de création déplaçable
   La fenêtre « Nouvelle facture » devient une fenêtre flottante
   que l'on déplace en glissant sa barre supérieure (.nf-bar).
   Bloc additif.
   ============================================================ */
function nfMakeDraggable(){
  const ov=document.getElementById('nf-overlay'); if(!ov || ov._dragReady) return; ov._dragReady=true;
  let drag=false, ox=0, oy=0, wrap=null;
  const begin=(cx,cy,target)=>{
    const bar=target.closest && target.closest('.nf-bar'); if(!bar) return false;
    if(target.closest('button')) return false;            // ne pas déclencher sur les boutons
    wrap=ov.querySelector('.nf-wrap'); if(!wrap) return false;
    const r=wrap.getBoundingClientRect();
    wrap.style.left=r.left+'px'; wrap.style.top=r.top+'px'; wrap.style.transform='none';
    drag=true; ox=cx-r.left; oy=cy-r.top; document.body.style.userSelect='none'; return true;
  };
  const moveTo=(cx,cy)=>{ if(!drag||!wrap) return;
    const nl=Math.max(0,Math.min(cx-ox, window.innerWidth-90));
    const nt=Math.max(0,Math.min(cy-oy, window.innerHeight-40));
    wrap.style.left=nl+'px'; wrap.style.top=nt+'px';
  };
  const stop=()=>{ drag=false; document.body.style.userSelect=''; };
  ov.addEventListener('mousedown', e=>{ if(begin(e.clientX,e.clientY,e.target)) e.preventDefault(); });
  window.addEventListener('mousemove', e=>moveTo(e.clientX,e.clientY));
  window.addEventListener('mouseup', stop);
  ov.addEventListener('touchstart', e=>{ const t=e.touches[0]; if(t) begin(t.clientX,t.clientY,e.target); }, {passive:true});
  window.addEventListener('touchmove', e=>{ const t=e.touches[0]; if(t) moveTo(t.clientX,t.clientY); }, {passive:true});
  window.addEventListener('touchend', stop);
}
/* Activer le glisser à chaque ouverture de la fenêtre */
(function(){ if(typeof factureNouvelleOuvrir==='function'){ const _o=factureNouvelleOuvrir;
  factureNouvelleOuvrir=function(){ _o(); nfMakeDraggable(); }; } })();

</script>

<script id="yada-addon7">
/* ============================================================
   YADA — Récupération automatique des informations société
   via le numéro SIREN/SIRET (API officielle « Recherche d'entreprises »
   de l'Annuaire des Entreprises / DINUM, ouverte et sans clé).
   + TVA intracommunautaire calculée, convention collective (best-effort).
   Bloc additif.
   ============================================================ */
const FORMES_JUR={
  '1000':'Entrepreneur individuel',
  '5202':'SNC','5306':'SCS','5308':'SCA',
  '5410':'SARL','5415':'SARL','5422':'SARL (immobilière)','5426':'SARL (attribution)','5430':'SARL coopérative','5485':'SARL','5499':'SARL',
  '5505':'SA','5510':'SA','5515':'SA','5520':'SA','5522':'SA','5525':'SA','5530':'SA','5599':'SA',
  '5710':'SAS','5720':'SASU',
  '6540':'SCI','6541':'SCI (attribution)',
  '9220':'Association déclarée'
};
function formeJurLabel(code){ code=(''+(code||'')).trim(); if(!code)return ''; return FORMES_JUR[code]||('Forme (code '+code+')'); }
function tvaFromSiren(siren){ const s=(siren||'').replace(/\D/g,''); if(s.length!==9) return '';
  const key=(12 + 3*(parseInt(s,10)%97))%97; return 'FR'+String(key).padStart(2,'0')+s; }

async function lookupSiret(q){
  const d=(q||'').replace(/\D/g,'');
  if(d.length!==9 && d.length!==14) throw new Error('Entrez un SIREN (9 chiffres) ou un SIRET (14 chiffres)');
  const url='https://recherche-entreprises.api.gouv.fr/search?q='+encodeURIComponent(d)+'&page=1&per_page=1';
  const res=await fetch(url);
  if(!res.ok) throw new Error('Service indisponible ('+res.status+')');
  const data=await res.json();
  const e=(data.results&&data.results[0]); if(!e) throw new Error('Aucune entreprise trouvée pour ce numéro');
  const siege=e.siege||{};
  const siren=e.siren||(d.length>=9?d.slice(0,9):'');
  const siret=(d.length===14)?d:(siege.siret||'');
  return {
    raison: e.nom_complet||e.nom_raison_sociale||'',
    siren, siret,
    tvaIntra: tvaFromSiren(siren),
    codeAPE: e.activite_principale||siege.activite_principale||'',
    activite: e.libelle_activite_principale||siege.libelle_activite_principale||e.activite_principale||'',
    formeJuridique: formeJurLabel(e.nature_juridique),
    dateCreation: e.date_creation||siege.date_creation||'',
    capitalSocial: e.capital_social||'',
    adresse: siege.adresse||'',
    cp: siege.code_postal||'', ville: siege.libelle_commune||''
  };
}
async function lookupConvention(siret){
  const d=(siret||'').replace(/\D/g,''); if(d.length!==14) return '';
  try{
    const res=await fetch('https://siret2idcc.fabrique.social.gouv.fr/api/v1/'+d);
    if(!res.ok) return '';
    const data=await res.json();
    const conv=(data&&data[0]&&data[0].conventions&&data[0].conventions[0]);
    if(!conv) return '';
    const num=conv.num||conv.idcc||'';
    const titre=conv.shortTitle||conv.title||'Convention collective';
    return titre+(num?(' (IDCC '+num+')'):'');
  }catch(e){ return ''; }
}

async function remplirTiersDepuisSiret(){
  const st=document.getElementById('ti-lookup-status');
  const q=(document.getElementById('ti-siret')||{}).value||'';
  const set=(id,v)=>{ const e=document.getElementById(id); if(e && v!=null && v!=='') e.value=v; };
  if(st) st.textContent='Recherche en cours…';
  try{
    const info=await lookupSiret(q);
    if(!document.getElementById('ti-nom').value.trim()) set('ti-nom', info.raison);
    set('ti-siret', info.siret||q); set('ti-siren', info.siren);
    set('ti-tvaintra', info.tvaIntra); set('ti-forme', info.formeJuridique); set('ti-ape', info.codeAPE);
    set('ti-activite', info.activite); set('ti-datecrea', info.dateCreation); set('ti-capital', info.capitalSocial);
    if(!document.getElementById('ti-adresse').value.trim()) set('ti-adresse', info.adresse);
    if(typeof majAuxApercu==='function') majAuxApercu();
    if(st) st.textContent='✓ Informations récupérées';
    toast('Informations société récupérées');
    // Convention collective (best-effort, peut échouer selon CORS)
    if(info.siret){ lookupConvention(info.siret).then(cc=>{ if(cc){ set('ti-conv', cc); if(st) st.textContent='✓ Informations + convention collective récupérées'; } }).catch(()=>{}); }
  }catch(e){
    if(st) st.textContent=''+e.message;
    toast('Récupération impossible : '+e.message);
  }
}

</script>

<script id="yada-addon9">
/* ============================================================
   YADA — Tableau de bord : suivis supplémentaires (style YADA)
   1) Zones d'import (facture fournisseur / facture client)
   2) Histogramme « Factures fournisseur sur les 12 derniers mois (HT) » + filtre
   3) Histogramme « Factures client sur les 12 derniers mois (HT) » + filtre + CA HT

   ============================================================ */
var dashFiltFourn = (typeof dashFiltFourn!=='undefined'?dashFiltFourn:'');
var dashFiltClient = (typeof dashFiltClient!=='undefined'?dashFiltClient:'');
var YC_MOIS = ['JANV','FÉVR','MARS','AVR','MAI','JUIN','JUIL','AOÛT','SEPT','OCT','NOV','DÉC'];

function ycFmtK(v){ v=Math.round(v||0);
  if(v>=1e6) return (v/1e6).toFixed(1).replace('.',',')+' M';
  if(v>=1e3) return Math.round(v/1e3)+' k';
  return ''+v; }

function dash12Mois(){
  const now=new Date(); const arr=[];
  for(let i=11;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
    const y=d.getFullYear(), mo=d.getMonth()+1;
    arr.push({ ym:y+'-'+String(mo).padStart(2,'0'), label:YC_MOIS[mo-1] }); }
  return arr;
}

function dashDropZone(type,label,ico){
  return `<div class="yc-drop" onclick="dashPick('${type}')"
     ondragover="event.preventDefault();this.classList.add('drag')"
     ondragleave="this.classList.remove('drag')"
     ondrop="dashDrop(event,'${type}')">
    <div class="yc-ico">${ico}</div>
    <div class="yc-dt">⊞ ${label}</div>
    <div class="yc-dd">Importez le fichier ou glissez-déposez dans la zone</div>

  </div>`;
}
function dashPick(type){ const el=document.getElementById('yc-file-'+type); if(el) el.click(); }
function dashDrop(ev,type){ ev.preventDefault(); try{ev.currentTarget.classList.remove('drag');}catch(e){}
  const f=ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0]; if(f) dashRoute(type,f.name); }
function dashFile(ev,type){ const f=ev.target.files&&ev.target.files[0]; if(f) dashRoute(type,f.name); }
function dashRoute(type,name){
  if(type==='achat'){ if(typeof acSource!=='undefined') acSource='ocr'; current='achats'; render();
    toast('Fichier « '+name+' » reçu — import dans Achats / OCR'); }
  else { current='facturation'; render();
    setTimeout(()=>{ if(typeof factureNouvelleOuvrir==='function') factureNouvelleOuvrir(); },60);
    toast('Fichier « '+name+' » reçu — nouvelle facture client'); }

/* ---- Histogramme 12 mois ---- */
function dashChartCard(type,title,tiersList,filtVal,filtVar,allLabel){
  const mois=dash12Mois();
  const vals=mois.map(mm=> r2(db.factures.filter(f=>f.type===type && ym(f.date)===mm.ym && (!filtVal||f.tiersId===filtVal))
      .reduce((a,f)=>a+(+f.ht||0),0)) );
  const max=Math.max(1, ...vals);
  const total=r2(vals.reduce((a,b)=>a+b,0));
  const opts=`<option value="">${allLabel}</option>`+
    tiersList.map(t=>`<option value="${t.id}" ${filtVal===t.id?'selected':''}>${t.nom}</option>`).join('');
  const cols=mois.map((mm,i)=>{ const h=vals[i]>0?Math.max(2, vals[i]/max*100):0;
      return `<div class="yc-col"><div class="yc-bar" style="height:${h}%" title="${mm.label} : ${eur(vals[i])}"></div></div>`; }).join('');
  const xs=mois.map(mm=>`<span>${mm.label}</span>`).join('');
  return `<div class="card">
    <div class="yc-head"><div><h2>${title}</h2><div class="sub">Répartition par date de facture</div></div>
      <select class="yc-filter" onchange="${filtVar}=this.value;render()">${opts}</select></div>
    <div class="yc-chart">
      <div class="yc-yaxis"><span>${ycFmtK(max)}</span><span>${ycFmtK(max*0.66)}</span><span>${ycFmtK(max*0.33)}</span><span>0</span></div>
      <div class="yc-area"><div class="yc-cols">${cols}</div><div class="yc-xrow">${xs}</div></div>
    </div>
    ${type==='vente'?`<div class="yc-ca">CHIFFRE D'AFFAIRES (HORS TAXES) <b>${eur(total)}</b></div>`:''}
  </div>`;
}

function dashSuivis(){
  const fournisseurs=db.tiers.filter(t=>t.type==='fournisseur');
  const clients=db.tiers.filter(t=>t.type==='client');
  return `<div class="card"><h2>Import de documents</h2>
      <div class="sub">Déposez une facture pour lancer l'import (Achats / OCR ou Facturation client).</div>
      <div class="yc-grid">
        ${dashDropZone('achat','Facture fournisseur','⤓')}
        ${dashDropZone('vente','Facture client','⤒')}
      </div></div>`
    + dashChartCard('achat','Factures fournisseur sur les 12 derniers mois (hors taxe)', fournisseurs, dashFiltFourn, 'dashFiltFourn', 'Tous les fournisseurs')

}

    else if(e.journal!==jrnFiltre) return false; }
  if(jrnSearch){ const q=jrnSearch.toLowerCase();
    const hit=(e.libelle||'').toLowerCase().includes(q) || (e.date||'').includes(q) ||
      e.lignes.some(l=>String(l.compte).includes(q)||(l.lib||'').toLowerCase().includes(q));
    if(!hit) return false; }
  return true;
}
pageJournal=function(){
  const list=db.ecritures.filter(jrnMatch).slice()
    .sort((a,b)=> jrnSort==='asc' ? (a.date<b.date?-1:1) : (a.date<b.date?1:-1));
  const rows=list.map(e=>{
    const d=r2(e.lignes.reduce((a,l)=>a+l.debit,0)), c=r2(e.lignes.reduce((a,l)=>a+l.credit,0)); const ok=Math.abs(d-c)<0.005;
    return `<div class="ecr"><div class="ecr-h">
      <span>${jrnTag(e.journal)} &nbsp;<b>${e.libelle}</b> &nbsp;<span class="mini">${e.date}</span>${e.doublon?' <span class="dup-badge" title="Doublon FEC détecté">DOUBLON</span>':''}</span>
      <span class="${ok?'balance-ok':'balance-ko'}">${ok?'Équilibrée ✓':'Déséquilibre !'} ${eur(d)}</span></div>
      <table><thead><tr><th>Compte</th><th>Intitulé</th><th class="r">Débit</th><th class="r">Crédit</th></tr></thead><tbody>
      ${e.lignes.map(l=>`<tr><td class="num">${l.compte}</td><td>${l.lib}</td>
        <td class="r num ${l.debit?'deb':''}">${l.debit?eur(l.debit):'—'}</td>
        <td class="r num ${l.credit?'cre':''}">${l.credit?eur(l.credit):'—'}</td></tr>`).join('')}</tbody></table></div>`;
  }).join('');
  const tg=totauxCompte('4'), t4=totauxCompte('44');
  const opt=(v,lbl)=>`<option value="${v}" ${jrnFiltre===v?'selected':''}>${lbl}</option>`;
  return head('Journal comptable','Toutes les écritures : factures (3 lignes) et banque (2 lignes). Triez et filtrez par journal (dont OD).')+
   `<div class="card"><h2>Contrôle global</h2><div class="grid g4" style="margin-top:6px">
      <div class="kpi"><div class="lbl">Écritures (filtrées)</div><div class="val">${list.length} <span class="meta">/ ${db.ecritures.length}</span></div></div>
      <div class="kpi"><div class="lbl">dont banque (BQ)</div><div class="val">${db.banque.length}</div></div>
      <div class="kpi"><div class="lbl">Mouvements comptes 4xx</div><div class="val">${eur(tg.debit)}</div><div class="meta">D ${eur(tg.debit)} · C ${eur(tg.credit)}</div></div>
      <div class="kpi"><div class="lbl">dont TVA (44x)</div><div class="val">${eur(t4.debit+t4.credit)}</div></div>
    </div></div>
    <div class="card"><div class="row g3">
      <div class="field"><label>Filtrer par journal</label><select onchange="jrnFiltre=this.value;render()">
        ${opt('','Tous les journaux')}${opt('ACH','ACH — Achats')}${opt('VTE','VTE — Ventes')}${opt('BQ','BQ — Banque')}${opt('OD','OD — Opérations diverses (OD, ODP, ODTVA)')}</select></div>
      <div class="field"><label>Trier par date</label><select onchange="jrnSort=this.value;render()">
        <option value="desc" ${jrnSort==='desc'?'selected':''}>Plus récentes d'abord</option>
        <option value="asc" ${jrnSort==='asc'?'selected':''}>Plus anciennes d'abord</option></select></div>
      <div class="field"><label>Recherche (libellé, compte, date)</label><input value="${(jrnSearch||'').replace(/"/g,'&quot;')}" placeholder="ex : LOYER, 706, 2026-03" onchange="jrnSearch=this.value;render()"></div>
    </div>${jrnFiltre||jrnSearch?`<div class="right"><button class="btn btn-ghost btn-sm" onclick="jrnFiltre='';jrnSearch='';render()">Réinitialiser les filtres</button></div>`:''}</div>`+
   (rows?`<div class="card"><h2>Pièces comptables (${list.length})</h2>${rows}</div>`:'<div class="card"><div class="empty">Aucune écriture pour ce filtre.</div></div>');
};

/* ---------- ANALYTIQUE : revenus fixes & dépenses fixes (récurrents ≥ 3 mois) ---------- */
function analyseFixe(){
  const charge={}, produit={};
  db.ecritures.forEach(e=>{ const m=ym(e.date); e.lignes.forEach(l=>{
    const c=String(l.compte);
    if(c[0]==='6'){ const a=charge[c]||(charge[c]={total:0,mois:new Set()}); a.total+=(l.debit-l.credit); if(l.debit>0)a.mois.add(m); }
    else if(c[0]==='7'){ const a=produit[c]||(produit[c]={total:0,mois:new Set()}); a.total+=(l.credit-l.debit); if(l.credit>0)a.mois.add(m); }
  });});
  const fixe=o=>Object.entries(o).filter(([c,v])=>v.mois.size>=3 && Math.abs(v.total)>0.005)
    .map(([c,v])=>({compte:c, lib:(COMPTES[c]||c), mois:v.mois.size, total:r2(v.total), moyen:r2(v.total/v.mois.size)}))
    .sort((a,b)=>b.total-a.total);
  return { charges:fixe(charge), produits:fixe(produit) };
}
function fixeTable(rows,cls,vide){
  if(!rows.length) return `<div class="empty">${vide}</div>`;
  const tot=r2(rows.reduce((a,r)=>a+r.total,0)), totM=r2(rows.reduce((a,r)=>a+r.moyen,0));
  return `<table><thead><tr><th>Compte</th><th>Intitulé</th><th class="r">Mois</th><th class="r">Moyen / mois</th><th class="r">Total</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td class="num">${r.compte}</td><td>${r.lib}</td><td class="r num">${r.mois}</td>
      <td class="r num ${cls}">${eur(r.moyen)}</td><td class="r num ${cls}">${eur(r.total)}</td></tr>`).join('')}
    <tr class="totrow"><td colspan="3">Total</td><td class="r num ${cls}">${eur(totM)}</td><td class="r num ${cls}">${eur(tot)}</td></tr>
    </tbody></table>`;
}
function analytiqueFixeCards(){
  const f=analyseFixe();
  return `<div class="grid g2">
    <div class="card"><h2>Revenus fixes (récurrents)</h2>
      <div class="sub">Produits présents sur au moins 3 mois — loyers, abonnements, prestations récurrentes.</div>
      ${fixeTable(f.produits,'cre','Aucun revenu récurrent identifié.')}</div>
    <div class="card"><h2>Dépenses fixes (récurrentes)</h2>
      <div class="sub">Charges présentes sur au moins 3 mois — loyers, assurances, télécom, salaires, abonnements.</div>
      ${fixeTable(f.charges,'deb','Aucune dépense récurrente identifiée.')}</div>
  </div>`;
}
(function(){ if(typeof pageAnalytique==='function'){ const _pa=pageAnalytique;
  pageAnalytique=function(){ return _pa()+analytiqueFixeCards(); }; } })();

/* ---------- RÈGLEMENTS : relances clients ---------- */
function relancesData(){
  db.relances=db.relances||{};
  const map={};
  db.reglements.filter(r=>r.sens==='a_encaisser' && r.statut!=='regle').forEach(r=>{
    const f=db.factures.find(x=>x.id===r.factureId); if(!f)return; const tid=f.tiersId;
    const m=map[tid]||(map[tid]={restant:0,nb:0}); m.restant=r2(m.restant+(+r.restant||0)); m.nb++;
  });
  const rows=Object.entries(map).map(([tid,v])=>{ const t=db.tiers.find(x=>x.id===tid); const rel=db.relances[tid];
    return {tid, nom:t?t.nom:'—', email:(t&&t.email)||'', restant:v.restant, nb:v.nb,
      relanceLe:rel?rel.le:null, count:rel?rel.n:0}; })
    .sort((a,b)=>b.restant-a.restant);
  return { attente:rows.filter(x=>!x.relanceLe), relances:rows.filter(x=>x.relanceLe) };
}
function relancerClient(tid){
  db.relances=db.relances||{}; const t=db.tiers.find(x=>x.id===tid);
  const cur=db.relances[tid]||{le:null,n:0}; cur.le=todayStr(); cur.n=(cur.n||0)+1; db.relances[tid]=cur;
  save(); render();
  toast('Relance de paiement envoyée à '+((t&&t.email)?t.email:(t?t.nom:'')));
}
function relancesCard(){
  const d=relancesData();
  if(!d.attente.length && !d.relances.length)
    return `<div class="card"><h2>Relances clients</h2><div class="empty">Aucune facture client en attente de paiement — rien à relancer.</div></div>`;
  const ligneAtt=d.attente.map(c=>`<tr><td><b>${c.nom}</b><div class="mini">${c.email||'— e-mail non renseigné'}</div></td>
    <td class="r num">${c.nb}</td><td class="r num">${eur(c.restant)}</td>
    <td><span class="tag t-att">en attente</span></td>
    <td class="r"><button class="btn btn-gold btn-sm" onclick="relancerClient('${c.tid}')">Relancer</button></td></tr>`).join('');
  const ligneRel=d.relances.map(c=>`<tr><td><b>${c.nom}</b><div class="mini">${c.email||'—'}</div></td>
    <td class="r num">${c.nb}</td><td class="r num">${eur(c.restant)}</td>
    <td><span class="tag t-pay">relancé ✓</span> <span class="mini">le ${frDate(c.relanceLe)}${c.count>1?(' · '+c.count+' relances'):''}</span></td>
    <td class="r"><button class="btn btn-ghost btn-sm" onclick="relancerClient('${c.tid}')">Relancer à nouveau</button></td></tr>`).join('');
  return `<div class="card"><h2>Relances clients</h2>
    <div class="sub">Suivi des relances de paiement. Le bouton « Relancer » envoie un e-mail de relance à l'adresse du client et enregistre la relance.</div>
    <h2 style="font-family:Fraunces,serif;font-size:15px;margin:6px 0 6px">En attente de relance (${d.attente.length})</h2>
    <table><thead><tr><th>Client</th><th class="r">Factures</th><th class="r">Restant dû</th><th>Statut</th><th></th></tr></thead>
      <tbody>${ligneAtt||'<tr><td colspan="5" class="empty">Aucun client en attente.</td></tr>'}</tbody></table>
    <h2 style="font-family:Fraunces,serif;font-size:15px;margin:18px 0 6px">Clients déjà relancés (${d.relances.length})</h2>
    <table><thead><tr><th>Client</th><th class="r">Factures</th><th class="r">Restant dû</th><th>Dernière relance</th><th></th></tr></thead>
      <tbody>${ligneRel||'<tr><td colspan="5" class="empty">Aucune relance encore envoyée.</td></tr>'}</tbody></table>
  </div>`;
}
(function(){ if(typeof pageReglements==='function'){ const _pr=pageReglements;
  pageReglements=function(){ return _pr()+relancesCard(); }; } })();

</script>
<script id="yada-addon11">
/* ============================================================
   YADA — Édition des écritures d'un compte (double-clic)
   Présentation façon « Compte auxiliaire / lettrage » (modèle Sage) :
   barre de titre, menus, colonnes Date · Jnl · Pièce · Compte · Libellé ·
   Débit · Crédit · Solde (courant, C/D) · L (lettrage), ligne de totaux,
   barre d'état. Saisie/ajout/retrait, équilibrage (471 ou bon compte),
   et LIGNE ROUGE sous chaque écriture soldée.
   ============================================================ */
var ecCode='';
function ecMatch(lcompte, code){
  const A=String(lcompte||'').trim(), B=String(code||'').trim();
  if(!A||!B) return false;
  if(A===B) return true;
  try{ if(c9(A)===c9(B)) return true; }catch(e){}
  if(A.startsWith(B)||B.startsWith(A)) return true;
  const a3=A.replace(/[^0-9].*$/,'').slice(0,3), b3=B.replace(/[^0-9].*$/,'').slice(0,3);
  if(a3 && a3===b3 && (a3==='401'||a3==='411'||a3==='421'||a3==='455')) return true;
  return false;
}
var ecTiersId=null;
function ecResolveTiers(code){ return db.tiers.find(t=> sageCode(t)===code || (t.compteAux && (t.compteAux===code || c9(t.compteAux)===c9(code))) ) || null; }
function ecEcritures(){
  let list;
  if(ecTiersId){
    const ids=new Set();
    db.factures.forEach(f=>{ if(f.tiersId===ecTiersId && f.ecritureId) ids.add(f.ecritureId); });
    (db.banque||[]).forEach(b=>{ if(b.tiersId===ecTiersId && b.ecritureId) ids.add(b.ecritureId); });
    list=db.ecritures.filter(e=>ids.has(e.id));
    if(!list.length) list=db.ecritures.filter(e=>e.lignes.some(l=>ecMatch(l.compte, ecCode)));
  } else {
    list=db.ecritures.filter(e=>e.lignes.some(l=>ecMatch(l.compte, ecCode)));
  }
  return list.slice().sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));
}
function ecTot(e){ let d=0,c=0; e.lignes.forEach(l=>{ d+=(+l.debit||0); c+=(+l.credit||0); }); return {d:r2(d), c:r2(c), diff:r2(d-c)}; }
function ecPiece(e){ return e.piece!=null ? e.piece : ((e.libelle||'').split(' · ')[0]||e.numero||''); }
function ecAttr(v){ return String(v==null?'':v).replace(/"/g,'&quot;'); }
function ecAccountLabel(){
  let t=db.tiers.find(x=> (x.compteAux&&ecMatch(x.compteAux,ecCode)) || ecMatch(sageCode(x),ecCode));
  const lib = t? t.nom : (COMPTES[ecCode]||COMPTES[String(ecCode).replace(/0+$/,'')]||'');
  return {code:ecCode, lib, tiers:t};
}

function ouvrirEcrituresCompte(code){
  ecCode=code||''; ecTiersId=(ecResolveTiers(code)||{}).id||null;
  let ov=document.getElementById('ec-overlay');
  if(!ov){ ov=document.createElement('div'); ov.id='ec-overlay'; ov.className='ec-ov';
    ov.innerHTML='<div class="ec-win" id="ec-win"></div>'; document.body.appendChild(ov); }
  ecRender(); ov.classList.add('show');
}
function ecFermer(){ const ov=document.getElementById('ec-overlay'); if(ov) ov.classList.remove('show'); render(); }

function ecRender(){
  const win=document.getElementById('ec-win'); if(!win) return;
  const acc=ecAccountLabel(); const year=(typeof exoYear==='function'?exoYear():'');
  const dossier=(db.societe&&db.societe.dossierNom)||'YADA';
  const list=ecEcritures();
  let solde=0, totD=0, totC=0, allOk=true; const nEcr=list.length;
  let body='';
  if(!list.length){
    body='<tr><td colspan="11" style="text-align:center;padding:26px;color:#999">Aucune écriture ne touche ce compte.</td></tr>';
  } else list.forEach(e=>{
    const t=ecTot(e); const ok=Math.abs(t.diff)<0.005 && (t.d>0||t.c>0); if(!ok) allOk=false;
    e.lignes.forEach((l,i)=>{
      const first=i===0; const mine=ecMatch(l.compte, ecCode);
      if(mine) solde=r2(solde + (+l.debit||0) - (+l.credit||0));
      totD+=(+l.debit||0); totC+=(+l.credit||0);
      const sSens = solde>0?'D':(solde<0?'C':'');
      body+=`<tr class="ec-r ${mine?'ec-mine':'ec-other'}">
        <td class="ec-c">${first?'!':''}</td>
        <td class="ec-c">${first?`<input class="ec-i ec-date" type="date" value="${ecAttr(e.date)}" onchange="ecSetDate('${e.id}',this.value)">`:''}</td>
        <td class="ec-c ec-jrn">${first?(e.journal||''):''}</td>
        <td class="ec-l">${first?`<input class="ec-i" value="${ecAttr(ecPiece(e))}" onchange="ecSetPiece('${e.id}',this.value)">`:''}</td>
        <td class="ec-l"><input class="ec-i ec-cpt" value="${ecAttr(l.compte)}" onchange="ecSetLine('${e.id}',${i},'compte',this.value)"></td>
        <td class="ec-l"><input class="ec-i" value="${ecAttr(l.lib)}" onchange="ecSetLine('${e.id}',${i},'lib',this.value)"></td>
        <td class="ec-n"><input class="ec-i ec-num" type="number" step="0.01" value="${l.debit||''}" onchange="ecSetLine('${e.id}',${i},'debit',this.value)"></td>
        <td class="ec-n"><input class="ec-i ec-num" type="number" step="0.01" value="${l.credit||''}" onchange="ecSetLine('${e.id}',${i},'credit',this.value)"></td>
        <td class="ec-n ec-solde">${mine&&Math.abs(solde)>0.005?sageNum(solde)+' '+sSens:''}</td>
        <td class="ec-c ec-lettre">${l.lettre||''}</td>
        <td class="ec-c"><button class="ec-del" title="Retirer la ligne" onclick="ecDelLine('${e.id}',${i})">✕</button></td>
      </tr>`;
    });
    body+=`<tr class="ec-act"><td colspan="11">
        <button class="ec-bt" onclick="ecAddLine('${e.id}')">+ Ajouter une ligne</button>
        ${ok?'<span class="ec-okk">Soldée ✓</span>':`<button class="ec-bt ec-bt-solde" onclick="ecSolder('${e.id}')">Solder l'écriture</button>`}
      </td></tr>`;
    if(ok) body+=`<tr class="ec-redrow"><td colspan="11"><div class="ec-soldee"></div></td></tr>`;
  });
  const sensTot = (totD-totC)>0.005?'D':((totC-totD)>0.005?'C':'D');
  win.innerHTML=`<div class="ec-sage">
    <div class="ec-titlebar"><span>${dossier} 01/${year.slice(2)}-12/${year.slice(2)} (E) : Compte auxiliaire ${acc.code}${acc.tiers?(' ('+acc.tiers.nom+')'):''} — Comptabilité</span>
      <span class="ec-winbtn"><i>─</i><i>▢</i><i class="x" onclick="ecFermer()">✕</i></span></div>
    <div class="ec-menubar"><span>Fichier</span><span>Édition</span><span>Déplacement</span><span>Consultation</span><span>Affichage</span><span>Lettrage</span><span>Traitements</span><span>Aide</span></div>
    <div class="ec-toolbar"><span>⟵</span><span>⟶</span><span>⤒</span><span>⤓</span><span>⇕</span><span></span><span>↧</span><span>▤</span><span></span></div>
    <div class="ec-tablewrap"><table class="ec-table"><thead><tr>
      <th></th><th>Date</th><th>Jnl</th><th>Pièce</th><th>Compte</th><th>Libellé</th><th class="r">Débit</th><th class="r">Crédit</th><th class="r">Solde</th><th>L</th><th></th>
    </tr></thead><tbody>${body}</tbody></table></div>
    <div class="ec-totbar"><span class="ec-totlbl">Totaux</span>
      <span class="ec-totn">${sageNum(r2(totD))}</span><span class="ec-totn">${sageNum(r2(totC))}</span>
      <span class="ec-totn">${sageNum(Math.abs(r2(totD-totC)))} ${sensTot}</span></div>
    <div class="ec-fields">
      <label>tx TVA <input value="${acc.tiers&&acc.tiers.taux!=null?acc.tiers.taux:20}"></label>
      <label>Tiers <input value="${ecAttr(acc.tiers?acc.tiers.nom:'')}"></label>
      <label>Échéance <input></label>
      <label>mode Règlement <input value="${ecAttr((acc.tiers&&acc.tiers.modeReglement)||'')}"></label>
    </div>
    <div class="ec-status"><span>Lettrage ${allOk?'équilibré':'à équilibrer'} — ${nEcr} écriture(s)</span>
      <span class="ec-brand"><span class="ec-dot"></span> YADA &nbsp;© ${year}</span></div>
  </div>`;
}

function ecGet(id){ return db.ecritures.find(e=>e.id===id); }
function ecSetDate(id,v){ const e=ecGet(id); if(e){ e.date=v; ecRender(); } }
function ecSetPiece(id,v){ const e=ecGet(id); if(e){ e.piece=v; ecRender(); } }
function ecSetLine(id,i,field,v){ const e=ecGet(id); if(!e||!e.lignes[i])return; const l=e.lignes[i];
  if(field==='debit'||field==='credit'){ l[field]=r2(+v||0); }
  else if(field==='compte'){ l.compte=String(v).trim(); if(!l.lib || l.lib==='—'){ l.lib=COMPTES[l.compte]||l.lib||''; } }
  else { l[field]=v; }
  ecRender();
}
function ecAddLine(id){ const e=ecGet(id); if(!e)return; e.lignes.push({compte:'', lib:'', debit:0, credit:0}); ecRender(); }
function ecDelLine(id,i){ const e=ecGet(id); if(!e)return; e.lignes.splice(i,1); if(!e.lignes.length) e.lignes.push({compte:'',lib:'',debit:0,credit:0}); ecRender(); }
function ecSolder(id){ const e=ecGet(id); if(!e)return; const t=ecTot(e);
  if(Math.abs(t.diff)<0.005){ save(); ecRender(); toast('Écriture soldée ✓'); return; }
  ecNotifSolde(id, t.diff);
}
function ecPlanOptions(){
  let plan=(db.plan&&db.plan.length)?db.plan.map(p=>({code:p.code,lib:p.lib||COMPTES[p.code]||''}))
    :Object.keys(COMPTES).map(c=>({code:c,lib:COMPTES[c]}));
  return plan.map(p=>`<option value="${c9(p.code)}">${c9(p.code)} — ${p.lib||''}</option>`).join('');
}
function ecNotifSolde(id, diff){
  const cote = diff>0 ? 'crédit' : 'débit';
  document.getElementById('modal-c').innerHTML=`
    <div class="modal-h"><h3>Écriture non soldée</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-b">
      <p>Cette écriture n'est pas équilibrée : il manque <b>${eur(Math.abs(diff))}</b> au <b>${cote}</b>.</p>
      <p class="mini" style="margin:6px 0 14px">Vous devez la solder. Deux possibilités :</p>
      <div class="right" style="justify-content:flex-start;margin-bottom:14px">
        <button class="btn btn-ghost" onclick="ecCompteAttente('${id}')">Laisser en compte d'attente (471)</button>
      </div>
      <div class="field"><label>… ou sélectionner le bon compte pour solder</label>
        <select id="ec-solde-cpt">${ecPlanOptions()}</select></div>
      <div class="right"><button class="btn btn-gold" onclick="ecSolderSur('${id}')">Solder sur ce compte</button></div>
    </div>`;
  document.getElementById('modal').classList.add('show');
}
function ecAjoutSolde(e, compte, lib){
  const t=ecTot(e); const dd=Math.max(0, r2(t.c-t.d)), cc=Math.max(0, r2(t.d-t.c));
  e.lignes.push({compte:compte, lib:lib||COMPTES[compte]||'', debit:dd, credit:cc});
}
function ecCompteAttente(id){ const e=ecGet(id); if(!e)return;
  ecAjoutSolde(e, '471000000', "Compte d'attente"); save(); closeModal(); ecRender();
  toast("Soldée sur compte d'attente 471 — à régulariser"); }
function ecSolderSur(id){ const e=ecGet(id); if(!e)return;
  const sel=document.getElementById('ec-solde-cpt'); const compte=sel?sel.value:'471000000';

<script id="yada-addon12">
/* ============================================================
   YADA — Saisie journal Banque : édition inline simplifiée
   Double-clic sur une écriture → ses cases deviennent modifiables
   SUR PLACE (champs sans bordure, même gabarit). Enregistrement
   automatique à la sortie de chaque case. Re-double-clic = terminer.
   Aucune ligne/bouton ajouté, rien ne se déplace.
   ============================================================ */
var sjEditId=null;
function sjA(v){ return String(v==null?'':v).replace(/"/g,'&quot;'); }

function sjRenderEcr(b,e,l1,l2,jour,sd,t,cpt1,pc){
  if(sjEditId===b.ecritureId) return sjRowsEdit(b,e,l1,l2,jour,sd,t,pc);
  const dbl=`ondblclick="sjEdit('${b.ecritureId}')" style="cursor:pointer" title="Double-clic pour modifier"`;
  return `<tr ${dbl}><td class="bang">!</td><td>${jour}</td><td class="l cpt">${cpt1}</td><td class="bj-r">${b.tiersId?'':''}</td><td class="l cpt">${pc}</td><td class="l">${t?t.nom+' — ':''}${b.libelle}</td>
      <td class="num deb">${l1.debit?sageNum(l1.debit):''}</td><td class="num">${l1.credit?sageNum(l1.credit):''}</td><td class="num">${sageNum(Math.abs(sd))}</td><td class="bj-r">${b.tiersId?'x':''}</td></tr>`+
    `<tr class="l2 sep" ${dbl}><td class="bang">!</td><td>${jour}</td><td class="l cpt">512000000</td><td></td><td class="l cpt">${pc}</td><td class="l">${b.libelle}</td>
      <td class="num">${l2.debit?sageNum(l2.debit):''}</td><td class="num">${l2.credit?sageNum(l2.credit):''}</td><td class="num">${sageNum(Math.abs(sd))}</td><td></td></tr>`;
}

function sjRowsEdit(b,e,l1,l2,jour,sd,t,pc){
  const id=b.ecritureId; const num=v=>v?v:'';
  const ch=`onchange="sjSaveFields('${id}')"`;
  const dbl=`ondblclick="sjEdit('${id}')" title="Double-clic pour terminer"`;
  return `<tr class="sj-edit" ${dbl}>
      <td class="bang">✎</td>
      <td><input class="sj-i" id="sje-jour" ${ch} value="${sjA(jour)}"></td>
      <td><input class="sj-i sj-cpt" id="sje-cpt0" ${ch} value="${sjA(l1.compte)}"></td>
      <td class="bj-r">${b.tiersId?'':''}</td>
      <td><input class="sj-i" id="sje-piece" ${ch} value="${sjA(b.suivi||'')}"></td>
      <td><input class="sj-i" id="sje-lib" ${ch} value="${sjA(b.libelle)}"></td>
      <td><input class="sj-i sj-num" id="sje-d0" type="number" step="0.01" ${ch} value="${num(l1.debit)}"></td>
      <td><input class="sj-i sj-num" id="sje-c0" type="number" step="0.01" ${ch} value="${num(l1.credit)}"></td>
      <td class="num">${sageNum(Math.abs(sd))}</td><td class="bj-r">${b.tiersId?'x':''}</td></tr>
    <tr class="sj-edit l2 sep" ${dbl}>
      <td class="bang">✎</td><td></td>
      <td><input class="sj-i sj-cpt" id="sje-cpt1" ${ch} value="${sjA(l2.compte||'512000000')}"></td>
      <td></td><td></td>
      <td><input class="sj-i" id="sje-lib1" ${ch} value="${sjA(l2.lib||b.libelle)}"></td>
      <td><input class="sj-i sj-num" id="sje-d1" type="number" step="0.01" ${ch} value="${num(l2.debit)}"></td>
      <td><input class="sj-i sj-num" id="sje-c1" type="number" step="0.01" ${ch} value="${num(l2.credit)}"></td>
      <td class="num">${sageNum(Math.abs(sd))}</td><td></td></tr>`;
}

function sjEdit(id){ sjEditId = (sjEditId===id ? null : id); render(); }
function sjSaveFields(id){
  const e=db.ecritures.find(x=>x.id===id); const b=db.banque.find(x=>x.ecritureId===id); if(!e||!b)return;
  const g=i=>{const el=document.getElementById(i);return el?el.value:undefined;};
  let dd=parseInt(g('sje-jour'),10); if(dd>=1&&dd<=31){ b.date=b.date.slice(0,8)+String(dd).padStart(2,'0'); e.date=b.date; }
  const pc=g('sje-piece'); if(pc!==undefined) b.suivi=pc.trim();
  const lib=g('sje-lib'); if(lib!==undefined) b.libelle=lib.trim();
  if(!e.lignes[0]) e.lignes[0]={compte:'',lib:'',debit:0,credit:0};
  if(!e.lignes[1]) e.lignes[1]={compte:'512000000',lib:'',debit:0,credit:0};
  if(g('sje-cpt0')!==undefined) e.lignes[0].compte=g('sje-cpt0').trim();
  e.lignes[0].lib=b.libelle;
  if(g('sje-d0')!==undefined) e.lignes[0].debit=r2(+g('sje-d0')||0);
  if(g('sje-c0')!==undefined) e.lignes[0].credit=r2(+g('sje-c0')||0);
  if(g('sje-cpt1')!==undefined) e.lignes[1].compte=g('sje-cpt1').trim()||'512000000';
  if(g('sje-lib1')!==undefined) e.lignes[1].lib=g('sje-lib1').trim()||b.libelle;
  if(g('sje-d1')!==undefined) e.lignes[1].debit=r2(+g('sje-d1')||0);
  if(g('sje-c1')!==undefined) e.lignes[1].credit=r2(+g('sje-c1')||0);
  e.libelle=(b.suivi?b.suivi+' · ':'')+b.libelle;
  save(); /* silencieux : pas de re-render, le focus reste — solde/totaux rafraîchis à la fin (double-clic) */
}

</script>
<script id="yada-addon13">
/* ============================================================
   YADA — Facturation client : cycle de vie & traitement en lot
   - Toute facture créée arrive « en attente de validation »
   - Validation → écriture VTE générée, pièce enregistrée (reste dans la liste)
   - Envoi → pièce verrouillée (non modifiable)
   - Suppression = seul moyen de retirer la pièce (+ écriture + règlement)
   - Sélection multiple → Valider / Envoyer EN LOT
   Bloc additif.
   ============================================================ */
var docSel = {};

/* États plus explicites */
function docEtatTag(d){
  if(d.envoye) return '<span class="tag t-pay">envoyé </span>';
  if(d.statut==='valide') return '<span class="tag t-part">validé</span>';
  return '<span class="tag t-att">en attente de validation</span>';
}

/* Validation silencieuse (pour unité et lot) : génère l'écriture VTE si besoin */
function docValiderSilent(d){
  if(d.statut==='valide' && d.ecritureId) return false;
  const t=db.tiers.find(x=>x.id===d.clientId); if(!t) return false;
  if(d.type==='devis'){ d.statut='valide'; return true; }
  if(!d.ecritureId){
    const taux=Math.abs(d.ht)>0?r2(Math.abs(d.tva)/Math.abs(d.ht)*100):20;
    const f=posterFacture({type:'vente',tiersId:t.id,date:d.date,base:Math.abs(d.ht)*(d.ttc<0?-1:1),baseEst:'HT',
      taux,compteContre:t.compteContre,compteTVA:'44571',numero:d.numero,echeance:d.echeance});
    d.ecritureId=f.ecritureId;
  }
  d.statut='valide'; return true;
}
function validerDoc(id){ const d=db.docs.find(x=>x.id===id); if(!d)return;
  if(d.statut==='valide'){ return toast('Déjà validé'); }
  if(docValiderSilent(d)){ save(); render(); toast(d.numero+' validé ✓ — écriture VTE générée'); }
}
function validerLot(){
  const ids=Object.keys(docSel).filter(id=>docSel[id]); let n=0;
  ids.forEach(id=>{ const d=db.docs.find(x=>x.id===id); if(d && d.statut!=='valide'){ if(docValiderSilent(d)) n++; } });
  docSel={}; save(); render();
  toast(n? (n+' document(s) validé(s) en lot ✓ — écritures générées') : 'Aucun document « en attente » sélectionné');
}
function envoyerLot(){
  const ids=Object.keys(docSel).filter(id=>docSel[id]); let n=0, sansMail=0;
  ids.forEach(id=>{ const d=db.docs.find(x=>x.id===id); if(!d||d.statut!=='valide'||d.envoye)return;
    const c=db.tiers.find(x=>x.id===d.clientId); if(!c||!c.email){ sansMail++; return; }
    d.envoye=true; d.dateEnvoi=todayStr(); const dev=d.devisId?db.docs.find(x=>x.id===d.devisId):null; if(dev)dev.envoye=true; n++; });
  docSel={}; save(); render();
  toast((n?(n+' facture(s) envoyée(s) en lot '):'Aucune facture validée sélectionnée')+(sansMail?(' · '+sansMail+' sans e-mail ignorée(s)'):''));
}

/* Suppression : seul moyen de retirer une pièce (retire aussi écriture + facture + règlement) */
function supprimerDoc(id){
  const d=db.docs.find(x=>x.id===id); if(!d)return;
  if(!confirm('Supprimer définitivement '+d.numero+' ?\n\nLa pièce, son écriture comptable et son suivi de règlement seront retirés.')) return;
  if(d.ecritureId){
    const ec=db.ecritures.find(e=>e.id===d.ecritureId);
    const facId=ec?ec.factureId:null;
    db.ecritures=db.ecritures.filter(e=>e.id!==d.ecritureId);
    if(facId){ db.factures=db.factures.filter(f=>f.id!==facId); db.reglements=db.reglements.filter(r=>r.factureId!==facId); }
  }
  if(d.devisId){ const dev=db.docs.find(x=>x.id===d.devisId); if(dev) dev.transformeEn=null; }
  if(d.transformeEn){ const fac=db.docs.find(x=>x.id===d.transformeEn); if(fac) fac.devisId=null; }
  db.docs=db.docs.filter(x=>x.id!==id); delete docSel[id];
  save(); render(); toast(d.numero+' supprimé');
}

function docToggle(id,ch){ docSel[id]=ch; }
function docSelectAttente(){ docSel={}; db.docs.forEach(d=>{ if(d.statut!=='valide') docSel[d.id]=true; }); render(); }
function docViderSel(){ docSel={}; render(); }

/* Carte « Émettre un document client — suivi & validation » (remplace l'ancienne liste) */
function documentsClientsCard(){
  const docs=db.docs.slice().reverse();
  const nAtt=db.docs.filter(d=>d.statut!=='valide').length;
  const nVal=db.docs.filter(d=>d.statut==='valide'&&!d.envoye).length;
  const rows=docs.map(d=>{ const c=db.tiers.find(x=>x.id===d.clientId);
    const dev=d.devisId?db.docs.find(x=>x.id===d.devisId):null;
    const actionnable = (d.statut!=='valide') || (d.statut==='valide'&&!d.envoye);
    const checked = docSel[d.id]?'checked':'';
    return `<tr>
      <td>${actionnable?`<input type="checkbox" ${checked} onchange="docToggle('${d.id}',this.checked)">`:''}</td>
      <td class="num">${d.numero}</td>
      <td><span class="tag ${d.type==='avoir'?'t-avoir':d.type==='devis'?'t-devis':'t-ven'}">${d.type}</span></td>
      <td>${c?c.nom:''}</td><td class="num">${d.date}</td>
      <td class="r num">${eur(d.ht)}</td><td class="r num">${eur(d.ttc)}</td>
      <td>${docEtatTag(d)}</td>
      <td class="mini">${dev?('devis '+dev.numero):(d.type==='devis'&&d.transformeEn?'→ facturé':'')}</td>
      <td class="r" style="white-space:nowrap">
        ${(d.statut!=='valide')?`<button class="btn btn-gold btn-sm" onclick="validerDoc('${d.id}')">✓ Valider</button>`:''}
        ${(d.type==='devis'&&d.statut==='valide'&&!d.transformeEn)?`<button class="btn btn-ghost btn-sm" onclick="transformerDevis('${d.id}')">→ Facture</button>`:''}
        ${peutEnvoyer(d)?`<button class="btn btn-gold btn-sm" onclick="envoyerDoc('${d.id}')">Envoyer</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="voirDoc('${d.id}')">Voir</button>
        <button class="btn btn-ghost btn-sm" onclick="telechargerDoc('${d.id}')">PDF</button>
        <button class="btn btn-ghost btn-sm" onclick="supprimerDoc('${d.id}')" title="Seul moyen de retirer la pièce"></button>
        ${d.envoye?'<span class="mini" title="Pièce envoyée — non modifiable"></span>':''}
      </td></tr>`;
  }).join('') || '<tr><td colspan="10" class="empty">Aucun document — créez une facture, elle apparaîtra ici en attente de validation.</td></tr>';
  return `<div class="card"><h2>Émettre un document client — suivi & validation</h2>
    <div class="sub">Toute facture créée arrive ici <b>en attente de validation</b>. Une fois <b>validée</b> elle est enregistrée et comptabilisée (et reste dans la liste). Une fois <b>envoyée</b> elle est <b>verrouillée</b>. La <b>suppression</b> est le seul moyen de la retirer.</div>
    <div class="right" style="justify-content:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="docSelectAttente()">Sélectionner les « en attente » (${nAtt})</button>
      <button class="btn btn-gold btn-sm" onclick="validerLot()">✓ Valider en lot</button>
      <button class="btn btn-gold btn-sm" onclick="envoyerLot()">Envoyer en lot</button>
      <button class="btn btn-ghost btn-sm" onclick="docViderSel()">Vider la sélection</button>
      <span class="mini" style="margin-left:auto">${nAtt} en attente · ${nVal} validée(s) non envoyée(s)</span>
    </div>
    <table><thead><tr><th></th><th>N°</th><th>Type</th><th>Client</th><th>Date</th><th class="r">HT</th><th class="r">TTC</th><th>État</th><th>Lié</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="hint">« Valider » génère l'écriture VTE (TVA collectée) et enregistre la pièce. « Envoyer » exige un e-mail client et verrouille la pièce. Cochez plusieurs lignes puis « Valider / Envoyer en lot ».</div>
  </div>`;
}

</script>
<script id="yada-addon14">
/* ============================================================
   YADA — Assistant IA : propositions d'écritures (vérifier → comptabiliser)
   À la création d'une pièce, l'IA repère le tiers, le montant, la date,
   le libellé et la TVA, et PROPOSE l'écriture comptable équilibrée.
   L'utilisateur vérifie, corrige si besoin (aperçu en direct), puis
   comptabilise — à l'unité ou en lot.
   Bloc additif (nouveau module).
   ============================================================ */
function iaQueue(){ if(!db.propositions) db.propositions=[]; return db.propositions; }
function iaCompteLib(c){ return COMPTES[c]||((db.plan||[]).find(p=>p.code===c)||{}).lib||''; }

/* Analyse d'une pièce client en attente → proposition d'écriture */
function iaProposerDepuisDoc(d){
  const t=db.tiers.find(x=>x.id===d.clientId);
  const ht=Math.abs(d.ht);
  const taux= ht>0 ? r2(Math.abs(d.tva)/ht*100) : (d.lignes&&d.lignes[0]?+d.lignes[0].taux:20);
  const lib=(d.lignes&&d.lignes[0]&&d.lignes[0].desc)?d.lignes[0].desc:('Facture '+d.numero);
  return { id:uid(), refType:'doc', refId:d.id, type:'vente', tiersId:d.clientId, date:d.date,
    libelle:lib, ht, taux, compteContre:(t?t.compteContre:'706000'), compteTVA:'44571', numero:d.numero,
    confiance:(t&&ht>0)?'élevée':'moyenne', statut:'a_valider', createdAt:todayStr() };
}
/* Crée les propositions manquantes pour les pièces clients en attente */
function iaSync(){ const q=iaQueue();
  db.docs.filter(d=>d.statut!=='valide').forEach(d=>{
    if(!q.find(p=>p.refType==='doc' && p.refId===d.id)) q.push(iaProposerDepuisDoc(d));
  });
}
/* Proposition depuis le formulaire d'achat (OCR fournisseur) */
function iaProposerAchat(){
  const fid=document.getElementById('ac-four').value; const t=db.tiers.find(x=>x.id===fid);
  if(!t) return toast('Sélectionnez un fournisseur');
  const ttc=+document.getElementById('ac-ttc').value||0, taux=+document.getElementById('ac-taux').value;
  const m=calcMontants(ttc,taux,'TTC');
  iaQueue().push({ id:uid(), refType:'achat', refId:null, type:'achat', tiersId:fid,
    date:document.getElementById('ac-date').value, libelle:'Facture '+t.nom, ht:m.ht, taux,
    compteContre:document.getElementById('ac-contre').value, compteTVA:'44566', numero:null,
    confiance:'élevée', statut:'a_valider', createdAt:todayStr() });
  save(); toast('Proposition créée — à vérifier dans « Assistant IA »');
}

/* Aperçu de l'écriture équilibrée proposée */
function iaPreview(p){
  const t=db.tiers.find(x=>x.id===p.tiersId); const m=calcMontants(p.ht,p.taux,'HT'); const lignes=[];
  if(p.type==='achat'){
    lignes.push({compte:p.compteContre, lib:iaCompteLib(p.compteContre)||'Charge', debit:m.ht, credit:0});
    lignes.push({compte:p.compteTVA, lib:'TVA déductible', debit:m.tva, credit:0});
    lignes.push({compte:'401', lib:'Fournisseur '+(t?t.nom:''), debit:0, credit:m.ttc});
  } else {
    lignes.push({compte:'411', lib:'Client '+(t?t.nom:''), debit:m.ttc, credit:0});
    lignes.push({compte:p.compteContre, lib:iaCompteLib(p.compteContre)||'Produit', debit:0, credit:m.ht});
    lignes.push({compte:p.compteTVA, lib:'TVA collectée', debit:0, credit:m.tva});
  }
  return {lignes, m};
}

function iaGet(id){ return iaQueue().find(p=>p.id===id); }
function iaSet(id, field, val){ const p=iaGet(id); if(!p)return;
  if(field==='ht'||field==='taux') p[field]=+val||0; else p[field]=val; save(); render(); }
function iaComptabiliser(id){
  const p=iaGet(id); if(!p||p.statut!=='a_valider')return; const t=db.tiers.find(x=>x.id===p.tiersId);
  if(!t)return toast('Tiers introuvable');
  const numero=p.numero||nextNumUnique(p.type==='achat'?'ACH':'FAC');
  const f=posterFacture({type:p.type, tiersId:p.tiersId, date:p.date, base:p.ht, baseEst:'HT', taux:p.taux,
    compteContre:p.compteContre, compteTVA:p.compteTVA, numero});
  const ec=db.ecritures.find(e=>e.id===f.ecritureId); if(ec && p.libelle) ec.libelle=numero+' · '+p.libelle;
  if(p.refType==='doc'){ const d=db.docs.find(x=>x.id===p.refId); if(d){ d.statut='valide'; d.ecritureId=f.ecritureId; } }
  p.statut='comptabilise'; p.ecritureId=f.ecritureId; p.numero=numero;
  save(); render(); toast('Écriture '+numero+' comptabilisée — TVA transmise au module TVA');
}
function iaRejeter(id){ const p=iaGet(id); if(!p)return; p.statut='rejete'; save(); render(); toast('Proposition rejetée'); }
function iaToutComptabiliser(){ const ids=iaQueue().filter(p=>p.statut==='a_valider').map(p=>p.id);
  let n=0; ids.forEach(id=>{ const p=iaGet(id); if(p&&p.statut==='a_valider'){ iaComptabiliser(id); n++; } });
  toast(n? (n+' écriture(s) comptabilisée(s) en lot ') : 'Aucune proposition à comptabiliser'); }

/* ---------- PAGE ---------- */
function pageIA(){
  iaSync();
  const q=iaQueue(); const att=q.filter(p=>p.statut==='a_valider');
  const hist=q.filter(p=>p.statut!=='a_valider').slice(-8).reverse();
  const cartes = att.map(p=>{ const t=db.tiers.find(x=>x.id===p.tiersId); const pv=iaPreview(p);
    const role=p.type==='achat'?'Fournisseur':'Client'; const collectif=p.type==='achat'?'401':'411';
    const listeContre = p.type==='achat'?COMPTES_CHARGE:COMPTES_PRODUIT;
    const clientsList=db.tiers.filter(x=>x.type===(p.type==='achat'?'fournisseur':'client'));
    return `<div class="card ia-card">
      <div class="ia-head"><span class="ia-spark"></span>
        <div><b>${role} repéré : ${t?t.nom:'—'}</b>
          <span class="ia-conf ${p.confiance==='élevée'?'hi':'mid'}">confiance ${p.confiance}</span></div>
        <span class="mini" style="margin-left:auto">${p.refType==='achat'?'Facture fournisseur (OCR)':'Facture client'} · ${p.numero||'(n° à l\'émission)'}</span>
      </div>
      <p class="ia-expl">J'ai repéré : <b>${role.toLowerCase()} ${t?t.nom:''}</b> (compte ${collectif}) · <b>TTC ${eur(pv.m.ttc)}</b> dont <b>TVA ${p.taux}%</b> (${eur(pv.m.tva)}) · <b>HT ${eur(pv.m.ht)}</b> → compte <b>${p.compteContre}</b> ${iaCompteLib(p.compteContre)} · date <b>${frDate(p.date)}</b>. Écriture ${p.type==='achat'?'d\'achat':'de vente'} équilibrée proposée ci-dessous — vérifiez puis comptabilisez.</p>
      <div class="row g4">
        <div class="field"><label>${role}</label><select onchange="iaSet('${p.id}','tiersId',this.value)">${clientsList.map(c=>`<option value="${c.id}" ${c.id===p.tiersId?'selected':''}>${c.nom}</option>`).join('')}</select></div>
        <div class="field"><label>Date</label><input type="date" value="${p.date}" onchange="iaSet('${p.id}','date',this.value)"></div>
        <div class="field"><label>Montant HT</label><input type="number" step="0.01" value="${p.ht}" onchange="iaSet('${p.id}','ht',this.value)"></div>
        <div class="field"><label>Taux TVA</label><select onchange="iaSet('${p.id}','taux',this.value)">${[20,10,5.5,2.1,0].map(x=>`<option ${x==p.taux?'selected':''}>${x}</option>`).join('')}</select></div>
      </div>
      <div class="row g2">
        <div class="field"><label>Libellé</label><input value="${(p.libelle||'').replace(/"/g,'&quot;')}" onchange="iaSet('${p.id}','libelle',this.value)"></div>

  }).join('');

  }).join('') || '<tr><td colspan="6" class="empty">—</td></tr>';

  return head('Assistant IA — écritures à valider','Le logiciel analyse chaque pièce, repère le tiers, le montant, la date, le libellé et la TVA, et propose l\'écriture comptable. Vérifiez, corrigez si besoin, puis comptabilisez (à l\'unité ou en lot).')+
    flow(['Pièce créée','Analyse IA (tiers · montant · date · TVA)','Proposition d\'écriture','Vérification / correction','Comptabilisation'])+
    `<div class="card"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
       <b style="font-size:15px">${att.length} proposition(s) à vérifier</b>

       <span class="mini" style="margin-left:auto">Les propositions viennent des factures clients « en attente » et des factures fournisseurs proposées depuis le module Achats.</span>
     </div></div>`+
    (cartes || '<div class="card"><div class="empty">Aucune proposition en attente — créez une facture client (elle arrivera ici), ou utilisez « Proposer via l\'IA » dans le module Achats.</div></div>')+
    `<div class="card"><h2>Historique des propositions</h2>

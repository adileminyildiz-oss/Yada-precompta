  const pref=type==='client'?'411':'401'; el.textContent='Compte auxiliaire : '+c9(pref+(tiersLettres(nom)||'XXXX')); }
function ajoutTiers(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const nom=g('ti-nom'); if(!nom)return toast('Dénomination requise');
  const type=document.getElementById('ti-type').value;
  const cat=type==='client'?document.getElementById('ti-cat').value:null;
  const siret=g('ti-siret'), siren=g('ti-siren');
  if(type==='client' && cat!=='particulier'){
    const dig=(siret||siren).replace(/\D/g,'');
    if(dig.length!==9 && dig.length!==14) return toast('Client société : un SIREN (9) ou SIRET (14) valide est obligatoire — utilisez « Récupérer les informations ».');
    if(!g('ti-forme')||!g('ti-ape')||!g('ti-datecrea')) return toast('Client société : coordonnées incomplètes — lancez « Récupérer les informations (SIREN/SIRET) ».');
  }
  db.tiers.push({id:uid(),type,nom,categorie:cat,
    compteContre:document.getElementById('ti-contre').value, compteTVA:document.getElementById('ti-tva').value,
    taux:+document.getElementById('ti-taux').value, compteAux:genAux(type,nom),
    email:g('ti-email'), tel:g('ti-tel'), siret, siren, adresse:g('ti-adresse'),
    tvaIntra:g('ti-tvaintra'), formeJuridique:g('ti-forme'), codeAPE:g('ti-ape'),
    activite:g('ti-activite'), dateCreation:g('ti-datecrea'), capitalSocial:g('ti-capital'),
    conventionCollective:g('ti-conv')});
  save(); render(); toast('Fiche tiers enregistrée dans la base');
}
function supTiers(id){ db.tiers=db.tiers.filter(t=>t.id!==id); save(); render(); }

/* ---------- FACTURATION CLIENT ---------- */
let faLignes=[{desc:'',qte:1,pu:0,taux:20,unite:''}];
function faTotaux(){ let ht=0,tva=0; faLignes.forEach(l=>{ const lht=r2((+l.qte||0)*(+l.pu||0)); ht+=lht; tva+=r2(lht*(+l.taux||0)/100); });
  ht=r2(ht); tva=r2(tva); return {ht,tva,ttc:r2(ht+tva)}; }
function faAddLigne(){ faLignes.push({desc:'',qte:1,pu:0,taux:20,unite:''}); render(); }
function faDelLigne(i){ faLignes.splice(i,1); if(!faLignes.length)faLignes=[{desc:'',qte:1,pu:0,taux:20,unite:''}]; render(); }
function faSync(){ faLignes.forEach((l,i)=>{ const g=s=>document.getElementById('li-'+s+'-'+i);
  if(g('desc'))l.desc=g('desc').value; if(g('qte'))l.qte=+g('qte').value; if(g('pu'))l.pu=+g('pu').value;
  if(g('taux'))l.taux=+g('taux').value; if(g('unite'))l.unite=g('unite').value; }); }
function faMaj(){ faSync(); const t=faTotaux();
  const el=document.getElementById('fa-apercu'); const c=db.tiers.find(x=>x.id===document.getElementById('fa-client').value);
  if(el) el.innerHTML=`<div class="ecr"><div class="ecr-h"><span>Écriture qui sera générée (journal VTE)</span><span class="balance-ok">Équilibrée ✓</span></div>
    <table><tbody>
    <tr><td class="num">411</td><td>Client ${c?c.nom:''}</td><td class="r num deb">${eur(t.ttc)}</td><td class="r num"></td></tr>
    <tr><td class="num">${c?c.compteContre:'706000'}</td><td>${COMPTES[c?c.compteContre:'706000']}</td><td class="r num"></td><td class="r num cre">${eur(t.ht)}</td></tr>
    <tr><td class="num">44571</td><td>TVA collectée</td><td class="r num"></td><td class="r num cre">${eur(t.tva)}</td></tr>
    <tr class="totrow"><td colspan=2>Totaux — TTC ${eur(t.ttc)}</td><td class="r num">${eur(t.ttc)}</td><td class="r num">${eur(t.ttc)}</td></tr>
    </tbody></table></div>`;
}

  const liHead=`<div class="li-row li-head"><div>Désignation</div><div>Qté</div><div>PU HT</div><div>TVA %</div><div>Total HT</div><div></div></div>`;
  const liRows=faLignes.map((l,i)=>{ const lht=r2((+l.qte||0)*(+l.pu||0));

      <input id="li-pu-${i}" type="number" value="${l.pu}" oninput="faMaj()">
      <select id="li-taux-${i}" onchange="faMaj()">${[20,10,5.5,0].map(x=>`<option ${x==l.taux?'selected':''}>${x}</option>`).join('')}</select>
      <input value="${eur(lht)}" disabled style="background:#f3efe6">
      <button class="btn btn-ghost btn-sm" onclick="faDelLigne(${i})">✕</button></div>`; }).join('');
  // devis existants (non transformés) du client sélectionné — info

  `<div class="card"><h2>Émettre un document client</h2>
    <div class="row g4">
      <div class="field"><label>Type</label><select id="fa-type"><option value="facture">Facture</option><option value="devis">Devis</option><option value="avoir">Avoir</option></select></div>
      <div class="field"><label>Client</label><select id="fa-client" onchange="faMaj()">${clients.map(c=>`<option value="${c.id}">${c.nom}${c.categorie==='particulier'?' (particulier)':''}</option>`).join('')}</select></div>
      <div class="field"><label>Date d'émission</label><input type="date" id="fa-date" value="${todayStr()}"></div>
      <div class="field"><label>Date d'échéance</label><input type="date" id="fa-ech" value="${todayStr()}"></div>
    </div>
    <div class="field"><label>Lignes de facturation</label>${liHead}${liRows}
      <button class="btn btn-ghost btn-sm" onclick="faSync();faAddLigne()">+ Ajouter une ligne</button></div>
    <div class="ecr" style="margin-top:6px"><div class="ecr-h"><span>Totaux</span><span></span></div>
      <table><tbody>
        <tr><td>Total HT</td><td class="r num">${eur(t.ht)}</td></tr>
        <tr><td>Total TVA</td><td class="r num">${eur(t.tva)}</td></tr>
        <tr class="totrow"><td>Total TTC</td><td class="r num">${eur(t.ttc)}</td></tr>
      </tbody></table></div>
    <div id="fa-apercu"></div>
    <div class="right">
      <button class="btn btn-ghost" onclick="emettre(false)">Enregistrer (brouillon)</button>
      <button class="btn btn-pri" onclick="emettre(true)">Valider</button>
    </div>
    <div class="hint">L'envoi par e-mail n'est possible qu'<b>après validation</b>. Conformité 2026 B2B : l'outil retenu devra être <b>Plateforme Agréée DGFiP</b> et émettre du <b>Factur-X</b>.</div>
  </div>
  ${documentsClientsCard()}`+
  suiviFacturesVente()+
  listeFacturesEnvoyees();
}
/* Suivi de TOUTES les factures de vente créées (avec statut paiement issu du règlement) */
function suiviFacturesVente(){
  const facs=db.docs.filter(d=>d.type==='facture').slice().sort((a,b)=>a.date<b.date?1:-1);
  let tHT=0,tTVA=0,tTTC=0;
  const rows=facs.map(d=>{ const c=db.tiers.find(x=>x.id===d.clientId);
    tHT+=d.ht; tTVA+=d.tva; tTTC+=d.ttc;
    // statut de règlement via l'écriture/ la facture comptable liée
    const f=db.factures.find(x=>x.numero===d.numero); const reg=f?reglementDe(f.id):null;
    let pay='<span class="tag t-att">—</span>';
    if(reg){ pay = reg.statut==='regle'?'<span class="tag t-pay">réglée ✓</span>'
      : reg.statut==='partiel'?'<span class="tag t-part">partielle ('+eur(reg.regle)+')</span>'
      : '<span class="tag t-att">à encaisser</span>'; }
    return `<tr><td class="num">${d.numero}</td><td>${c?c.nom:''}</td><td class="num">${d.date}</td><td class="num">${frDate(d.echeance||d.date)}</td>
      <td class="r num">${eur(d.ht)}</td><td class="r num">${eur(d.tva)}</td><td class="r num">${eur(d.ttc)}</td>
      <td>${docEtatTag(d)}</td><td>${pay}</td>
      <td class="r"><button class="btn btn-ghost btn-sm" onclick="voirDoc('${d.id}')">Voir</button></td></tr>`;}).join('');
  return `<div class="card"><h2>Suivi des factures de vente</h2>
    <div class="sub">Toutes les factures de vente créées (${facs.length}) — montants, état d'envoi et statut d'encaissement.</div>
    <div class="grid g3" style="margin-bottom:14px">
      <div class="kpi green"><div class="lbl">Total HT facturé</div><div class="val cre">${eur(r2(tHT))}</div></div>
      <div class="kpi"><div class="lbl">Total TVA</div><div class="val">${eur(r2(tTVA))}</div></div>
      <div class="kpi blue"><div class="lbl">Total TTC</div><div class="val">${eur(r2(tTTC))}</div></div>
    </div>
    ${listeExportBar('vente')}
    <table><thead><tr><th>N°</th><th>Client</th><th>Date</th><th>Échéance</th><th class="r">HT</th><th class="r">TVA</th><th class="r">TTC</th><th>État</th><th>Encaissement</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=10 class=empty>Aucune facture de vente créée</td></tr>'}</tbody></table>
  </div>`;
}
/* Liste des factures (et devis liés) ENVOYÉES au client */
function listeFacturesEnvoyees(){
  const env=db.docs.filter(d=>d.envoye).slice().sort((a,b)=>((a.dateEnvoi||a.date)<(b.dateEnvoi||b.date))?1:-1);
  const rows=env.map(d=>{ const c=db.tiers.find(x=>x.id===d.clientId);
    const dev=d.devisId?db.docs.find(x=>x.id===d.devisId):null;
    const pj=[d.numero+'.pdf'].concat(dev?[dev.numero+'.pdf (devis)']:[]).join(' + ');
    return `<tr><td class="num">${d.numero}</td><td><span class="tag ${d.type==='avoir'?'t-avoir':d.type==='devis'?'t-devis':'t-ven'}">${d.type}</span></td>
      <td>${c?c.nom:''}</td><td>${c&&c.email?c.email:'<span class="deb">e-mail manquant</span>'}</td>
      <td class="num">${d.dateEnvoi?frDate(d.dateEnvoi):'—'}</td><td class="mini">${pj}</td>
      <td class="r num">${eur(d.ttc)}</td>
      <td class="r"><button class="btn btn-ghost btn-sm" onclick="voirDoc('${d.id}')">Voir</button></td></tr>`;}).join('');
  return `<div class="card"><h2>Factures envoyées au client</h2>
    <div class="sub">Historique des pièces transmises par e-mail (${env.length}) — destinataire, date d'envoi et pièces jointes.</div>
    <table><thead><tr><th>N°</th><th>Type</th><th>Client</th><th>Destinataire</th><th>Date d'envoi</th><th>Pièces jointes</th><th class="r">TTC</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=8 class=empty>Aucune facture envoyée pour le moment</td></tr>'}</tbody></table>
  </div>`;
}
function docEtatTag(d){
  if(d.envoye) return '<span class="tag t-pay">envoyé ✓</span>';
  if(d.statut==='valide') return '<span class="tag t-part">validé</span>';
  return '<span class="tag t-att">brouillon</span>';
}
function peutEnvoyer(d){ return d.statut==='valide' && !d.envoye && d.type!=='avoir'?true:(d.statut==='valide'&&!d.envoye); }
function emettre(valider){
  const t=db.tiers.find(x=>x.id===document.getElementById('fa-client').value); if(!t)return toast('Ajoutez un client d\'abord');
  faSync(); const type=document.getElementById('fa-type').value; const tot=faTotaux();
  if(tot.ht<=0 && type!=='avoir') return toast('Renseignez au moins une ligne');
  const date=document.getElementById('fa-date').value, ech=document.getElementById('fa-ech').value;
  const signe=type==='avoir'?-1:1;
  const numero=nextNumUnique(type==='avoir'?'AV':type==='devis'?'DEV':'FAC');
  const doc={ id:uid(), type, clientId:t.id, date, echeance:ech, numero,
    lignes:JSON.parse(JSON.stringify(faLignes)).map(l=>({...l, qte:l.qte*1})),
    ht:r2(tot.ht*signe), tva:r2(tot.tva*signe), ttc:r2(tot.ttc*signe),
    statut: valider?'valide':'brouillon', envoye:false, ecritureId:null, devisId:null, transformeEn:null };
  // si une facture est créée alors qu'un devis validé non transformé existe pour ce client+même total → lier
  if(type==='facture'){ const dev=db.docs.find(x=>x.type==='devis'&&x.clientId===t.id&&!x.transformeEn&&Math.abs(x.ttc-doc.ttc)<0.01);
    if(dev){ doc.devisId=dev.id; dev.transformeEn=doc.id; } }
  if(valider && type==='facture'){
    const f=posterFacture({type:'vente',tiersId:t.id,date,base:tot.ht*signe,baseEst:'HT',taux:(faLignes[0]?faLignes[0].taux:20),
      compteContre:t.compteContre,compteTVA:'44571',numero}); doc.ecritureId=f.ecritureId;
    toast('Facture '+numero+' validée → écriture VTE générée. Vous pouvez maintenant l\'envoyer.');
  } else { toast((valider?'Document ':'Brouillon ')+numero+(valider?' validé':' enregistré')); }
  db.docs.push(doc); faLignes=[{desc:'',qte:1,pu:0,taux:20,unite:''}]; save(); render();
}
function transformerDevis(id){
  const dev=db.docs.find(x=>x.id===id); if(!dev)return; const t=db.tiers.find(x=>x.id===dev.clientId);
  const numero=nextNumUnique('FAC');
  const doc={ id:uid(), type:'facture', clientId:dev.clientId, date:todayStr(), echeance:dev.echeance||todayStr(), numero,
    lignes:JSON.parse(JSON.stringify(dev.lignes||[])), ht:dev.ht, tva:dev.tva, ttc:dev.ttc,
    statut:'valide', envoye:false, ecritureId:null, devisId:dev.id, transformeEn:null };
  const taux=(dev.lignes&&dev.lignes[0]?dev.lignes[0].taux:20);
  const f=posterFacture({type:'vente',tiersId:dev.clientId,date:doc.date,base:dev.ht,baseEst:'HT',taux,compteContre:t.compteContre,compteTVA:'44571',numero});
  doc.ecritureId=f.ecritureId; dev.transformeEn=doc.id; db.docs.push(doc); save(); render();
  toast('Devis '+dev.numero+' transformé en facture '+numero);
}

function telechargerListeFactures(type){
  const id=type==='achat'?'fa-ex':'fv-ex';
  const d0=(document.getElementById(id+'-d')||{}).value||'', d1=(document.getElementById(id+'-f')||{}).value||'';
  let list;
  if(type==='achat'){ list=db.factures.filter(f=>f.type==='achat').map(f=>{const t=db.tiers.find(x=>x.id===f.tiersId);
    return {numero:f.numero,date:f.date,tiers:t?t.nom:'',ht:f.ht,tva:f.tva,ttc:f.ttc};}); }
  else { list=db.docs.filter(x=>x.type==='facture').map(d=>{const c=db.tiers.find(x=>x.id===d.clientId);
    return {numero:d.numero,date:d.date,tiers:c?c.nom:'',ht:d.ht,tva:d.tva,ttc:d.ttc};}); }
  if(d0) list=list.filter(x=>x.date>=d0); if(d1) list=list.filter(x=>x.date<=d1);
  list.sort((a,b)=>a.date<b.date?-1:1);
  if(!list.length) return toast('Aucune facture sur cette période');
  const sep=';'; const head=['Numero','Date','Tiers','HT','TVA','TTC'].join(sep);
  const body=list.map(x=>[x.numero,x.date,'"'+x.tiers.replace(/"/g,'')+'"',x.ht.toFixed(2),x.tva.toFixed(2),x.ttc.toFixed(2)].join(sep)).join('\n');
  const tot=list.reduce((a,x)=>({ht:a.ht+x.ht,tva:a.tva+x.tva,ttc:a.ttc+x.ttc}),{ht:0,tva:0,ttc:0});
  const total=['TOTAL','','',tot.ht.toFixed(2),tot.tva.toFixed(2),tot.ttc.toFixed(2)].join(sep);
  const csv='\ufeff'+head+'\n'+body+'\n'+total;
  const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const lbl=type==='achat'?'fournisseurs':'clients';
  a.download='factures-'+lbl+'-'+(db.societe.dossierCode||'dossier')+(d0?('-'+d0):'')+(d1?('_'+d1):'')+'.csv'; a.click();
  toast(list.length+' facture(s) '+lbl+' exportée(s)');
}

/* ============================================================

   ============================================================ */
let rapMois=null, rapCompte=null, rapOnglet='releve', rapCtxId=null;
function comptesBanque(){ // journaux de trésorerie -> comptes 512
  return (db.journaux||[]).filter(j=>j.type==='Trésorerie'&&j.compte).map(j=>({code:j.compte, lib:j.code+' - '+j.libelle}));
}
function moisExoListe(){ // mois de l'exercice (comme la consultation)
  const out=[]; const d0=new Date(db.societe.exoDebut+'T00:00:00'), d1=new Date(db.societe.exoFin+'T00:00:00');
  let y=d0.getFullYear(), m=d0.getMonth();
  while(y<d1.getFullYear()||(y===d1.getFullYear()&&m<=d1.getMonth())){ out.push(y+'-'+String(m+1).padStart(2,'0')); m++; if(m>11){m=0;y++;} }
  return out;
}
function dernierJourMois(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
function ecrituresBanqueMois(compte, ym){ // lignes d'écritures BQ touchant ce 512 sur le mois
  const out=[];
  db.ecritures.filter(e=>e.journal==='BQ'&&e.date.slice(0,7)===ym).forEach(e=>{
    // la pièce concerne ce compte si une de ses lignes est le 512 visé
    if(!e.lignes.some(l=>c9(l.compte)===c9(compte))) return;
    e.lignes.forEach(l=>{ if(c9(l.compte)===c9(compte)) return; // on liste la contrepartie (le relevé bancaire montre les opérations, pas la ligne 512)
      out.push({ ecritureId:e.id, date:e.date, compte:l.compte, piece:e.libelle.split(' · ')[0], lib:(e.libelle.split(' · ')[1]||e.libelle), debit:l.debit, credit:l.credit }); });
  });
  return out.sort((a,b)=>a.date<b.date?-1:1);
}
function releveDe(compte, ym){ return (db.releves||[]).find(r=>c9(r.compte)===c9(compte)&&r.mois===ym); }
function soldeComptable512(compte, ym){ // solde du compte 512 cumulé jusqu'à fin de mois
  let s=0; db.ecritures.filter(e=>e.date.slice(0,7)<=ym).forEach(e=>e.lignes.forEach(l=>{ if(c9(l.compte)===c9(compte)) s+=l.debit-l.credit; })); return r2(s);
}
function rapStats(rel){
  if(!rel) return null;
  const lignes=ecrituresBanqueMois(rel.compte, rel.mois);
  const rappSet=new Set(rel.rap||[]);
  let totalMvt=0, totalRap=0;
  lignes.forEach(l=>{ const m=l.debit-l.credit; totalMvt+=m; if(rappSet.has(l.ecritureId)) totalRap+=m; });
  const soldeCompta=soldeComptable512(rel.compte, rel.mois);
  const soldeBancaire=rel.solde;
  const justifs=r2((rel.justifs||[]).reduce((a,j)=>a+(j.debit-j.credit),0));
  // écart de rapprochement = solde comptable - solde bancaire (doit être 0 une fois tout rapproché + justifié)
  const ecart=r2(soldeCompta - soldeBancaire);
  const nonRappro=r2(totalMvt-totalRap);
  const ecartAJustifier=r2(ecart - justifs);
  return { lignes, totalMvt:r2(totalMvt), totalRap:r2(totalRap), nonRappro, soldeCompta, soldeBancaire, ecart, justifs, ecartAJustifier, nbLignes:lignes.length, nbRap:(rel.rap||[]).length };
}

function sageNum(n){ return Math.abs(n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function sageCode(t){ const pre=t.type==='client'?'411':'401'; const s=(t.nom||'').toUpperCase().replace(/[^A-Z0-9]/g,''); return pre+(s.slice(0,4)||'XXX'); }
function exoYear(){ return (db.societe&&db.societe.exoDebut?db.societe.exoDebut:'2026-01-01').slice(0,4); }
function monthsExo(){ const y=exoYear(); return Array.from({length:12},(_,i)=>y+'-'+String(i+1).padStart(2,'0')); }
/* filtre CUMULATIF : toutes les écritures jusqu'à la fin du mois sélectionné (déc. = année entière) */
function ecrituresJusqua(per){ return per?db.ecritures.filter(e=>ym(e.date)<=per):db.ecritures.slice(); }
/* mouvements d'un compte auxiliaire (tiers) reconstitués, filtrés par période */
function auxMvt(t, per){
  let deb=0, cre=0, n=0;
  db.factures.filter(f=>f.tiersId===t.id && (!per||ym(f.date)<=per)).forEach(f=>{ n++; if(t.type==='fournisseur') cre+=f.ttc; else deb+=f.ttc; });
  db.banque.filter(b=>b.tiersId===t.id && (!per||ym(b.date)<=per)).forEach(b=>{ n++; (b.alloc||[]).forEach(a=>{ if(t.type==='fournisseur') deb+=a.montant; else cre+=a.montant; }); });
  const debit=r2(deb), credit=r2(cre); const s=r2(debit-credit);
  return {debit, credit, n, soldeD:Math.max(s,0), soldeC:Math.max(-s,0)};
}
function sgGeneraux(per){
  const acc={};
  ecrituresJusqua(per).forEach(e=>e.lignes.forEach(l=>{ const a=acc[l.compte]||(acc[l.compte]={d:0,c:0,n:0}); a.d+=l.debit; a.c+=l.credit; a.n++; }));
  return Object.entries(acc).map(([code,v])=>{ const s=r2(v.d-v.c);
    return {code, code9:c9(code), classe:classeDe(code), lib:COMPTES[code]||code, n:v.n, debit:r2(v.d), credit:r2(v.c),
      solde:Math.abs(s), sens:Math.abs(s)<0.005?'S':(s>0?'D':'C')}; })
    .sort((a,b)=>a.code9<b.code9?-1:1);
}
function sgComptes(tab, per){
  if(tab==='generaux') return sgGeneraux(per);
  if(tab==='fourn')    return db.tiers.filter(t=>t.type==='fournisseur').map(t=>{const m=auxMvt(t,per);return{code:sageCode(t),lib:t.nom,n:m.n,solde:m.soldeC,sens:m.soldeC<0.005?'S':'C'};}).sort((a,b)=>a.code<b.code?-1:1);
  if(tab==='clients')  return db.tiers.filter(t=>t.type==='client').map(t=>{const m=auxMvt(t,per);return{code:sageCode(t),lib:t.nom,n:m.n,solde:m.soldeD,sens:m.soldeD<0.005?'S':'D'};}).sort((a,b)=>a.code<b.code?-1:1);
  if(tab==='personnel')return sgGeneraux(per).map(a=>({code:a.code9,lib:a.lib,n:a.n,solde:a.solde,sens:a.sens})).filter(a=>a.code.startsWith('42'));
  if(tab==='fournImmo')return sgGeneraux(per).map(a=>({code:a.code9,lib:a.lib,n:a.n,solde:a.solde,sens:a.sens})).filter(a=>a.code.startsWith('404'));
  if(tab==='retenue')  return sgGeneraux(per).map(a=>({code:a.code9,lib:a.lib,n:a.n,solde:a.solde,sens:a.sens})).filter(a=>a.code.startsWith('4047'));
  return [];
}
function sgJournaux(per){
  const cnt={}; ecrituresJusqua(per).forEach(e=>cnt[e.journal]=(cnt[e.journal]||0)+1);
  return [['A','ACH','HA ACHATS'],['V','VTE','VT VENTES'],['T','BQ','BQ BANQUE'],['O','ODP','ODP OD PAIE'],['O','ODTVA','ODTVA OD TVA'],['O','OD','OD OPERATIONS DIVERSES']]

function majJournal(i,champ,val){
  const j=db.journaux[i]; if(!j)return; const ancien=j[champ];
  if(champ==='code'){ val=val.trim().toUpperCase(); if(!val)return toast('Code requis');

    j.code=val; }
  else if(champ==='type'){ j.type=val; j.jrn=typeToJrn(val);
    if(val==='Trésorerie' && !j.compte){ j.compte='512'+String((db.journaux.filter(x=>x.type==='Trésorerie').length)).padStart(6,'0'); creerCompteBanque(j.compte, 'Banque '+j.libelle); }
    if(val!=='Trésorerie'){ j.compte=''; } }
  else j[champ]=val;

}
function creerCompteBanque(compte, lib){ const c=c9(compte); COMPTES[compte]=lib||'Banque';
  if(!db.plan.some(x=>c9(x.code)===c)) db.plan.push({code:compte, lib:lib||'Banque', tva:''}); }
/* Modifier le compte 512 d'un journal de banque (même déjà créé) :
   - valide un compte de classe 5 (512…)
   - migre les écritures, les mouvements bancaires et l'entrée de plan de l'ancien vers le nouveau compte */
function majCompteJournal(i, val){
  const j=db.journaux[i]; if(!j) return;
  val=(val||'').trim();
  if(!val){ return toast('Numéro de compte requis pour un journal de banque'); }
  if(classeDe(val)!=='5'){ renderPlanJournaux(); return toast('Le compte d\'un journal de banque doit être un compte de classe 5 (512…)'); }
  if(db.journaux.some((x,k)=>k!==i && x.type==='Trésorerie' && c9(x.compte)===c9(val)))
    { renderPlanJournaux(); return toast('Ce compte est déjà utilisé par un autre journal de banque'); }
  const ancien=j.compte;
  if(ancien && c9(ancien)===c9(val)){ return; }                 // inchangé
  const lib='Banque '+(j.libelle||'');
  // créer/renommer le compte dans le plan
  creerCompteBanque(val, lib);
  if(ancien && c9(ancien)!==c9(val)){
    // migrer les écritures (toutes les lignes pointant l'ancien 512 vers le nouveau)
    let nMaj=0;
    db.ecritures.forEach(e=>e.lignes.forEach(l=>{ if(c9(l.compte)===c9(ancien)){ l.compte=val; if(/^Banque/.test(l.lib))l.lib=lib; nMaj++; } }));
    // migrer les mouvements bancaires qui utilisaient l'ancien compte comme contrepartie
    db.banque.forEach(b=>{ if(b.compte && c9(b.compte)===c9(ancien)) b.compte=val; });
    // retirer l'ancien compte du plan s'il n'est plus utilisé par un autre journal
    const encoreUtilise=db.journaux.some((x,k)=>k!==i && c9(x.compte)===c9(ancien));
    if(!encoreUtilise){ db.plan=db.plan.filter(c=>c9(c.code)!==c9(ancien)); }
    j.compte=val; save(); renderPlanJournaux();
    return toast('Compte du journal modifié : '+c9(ancien)+' → '+c9(val)+(nMaj?(' ('+nMaj+' ligne(s) migrée(s))'):''));
  }
  j.compte=val; save(); renderPlanJournaux(); toast('Compte du journal défini : '+c9(val));
}
function ajoutJournal(){
  const code=(document.getElementById('nj-code').value||'').trim().toUpperCase(); if(!code)return toast('Code requis');
  if(db.journaux.some(x=>x.code===code))return toast('Code déjà utilisé');
  const libelle=(document.getElementById('nj-lib').value||'').trim()||code;
  const type=document.getElementById('nj-type').value; const jrn=typeToJrn(type);
  let compte='';
  if(type==='Trésorerie'){
    compte=(document.getElementById('nj-compte').value||'').trim()||('512'+String(db.journaux.filter(x=>x.type==='Trésorerie').length+1).padStart(6,'0'));
    creerCompteBanque(compte, 'Banque '+libelle);   // génération dans le plan comptable (banque uniquement)
  }
  db.journaux.push({code, libelle, type, jrn, compte});
  save(); renderPlanJournaux();
  toast(type==='Trésorerie'?('Journal '+code+' ajouté + compte '+c9(compte)+' créé dans le plan comptable'):('Journal '+code+' ajouté'));
}
function supprJournal(i){ const j=db.journaux[i]; if(!j)return;
  const nb=db.ecritures.filter(e=>e.journal===j.jrn).length;

/* toutes les lignes d'écriture touchant le compte collectif 401/411 du tiers */
function auxLignes(t){
  const coll = t.type==='fournisseur'?'401':'411';
  const out=[];
  db.ecritures.slice().sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0)).forEach(e=>{
    e.lignes.forEach((l,idx)=>{
      const estColl = (l.compte===coll || c9(l.compte)===c9(coll));
      // une ligne 401/411 appartient à ce tiers si l'écriture est liée à une facture/banque du tiers
      if(!estColl) return;
      const f=e.factureId?db.factures.find(x=>x.id===e.factureId):null;
      const b=db.banque.find(x=>x.ecritureId===e.id);
      const tid = f?f.tiersId : (b?b.tiersId : null);
      if(tid!==t.id) return;
      out.push({ key:e.id+'|'+idx, ecritureId:e.id, idx, date:e.date, journal:e.journal,
        piece:e.libelle.split(' · ')[0], lib:e.libelle, debit:l.debit, credit:l.credit, lettre:l.lettre||'' });
    });
  });
  return out;
}
function auxToggleSel(key){ const i=auxSel.indexOf(key); if(i>=0)auxSel.splice(i,1); else auxSel.push(key); render(); }
function prochaineLettre(t){
  const used=new Set(); auxLignes(t).forEach(l=>{ if(l.lettre) used.add(l.lettre); });
  for(let i=0;i<26;i++){ const L=String.fromCharCode(65+i); if(!used.has(L)) return L; }
  // au-delà de Z : AA, AB…
  for(let i=0;i<26;i++)for(let j=0;j<26;j++){ const L=String.fromCharCode(65+i)+String.fromCharCode(65+j); if(!used.has(L)) return L; }
  return '?';
}
function ligneObj(key){ const [eid,idx]=key.split('|'); const e=db.ecritures.find(x=>x.id===eid); return e?e.lignes[+idx]:null; }
function auxLettrer(){
  const t=db.tiers.find(x=>x.id===auxTiersId); if(!t) return;
  if(auxSel.length<2) return toast('Sélectionnez au moins deux lignes à lettrer');
  let d=0,c=0; auxSel.forEach(k=>{ const l=ligneObj(k); if(l){ d+=l.debit; c+=l.credit; } });
  if(Math.abs(r2(d-c))>=0.005) return toast('Lettrage impossible : débit ('+eur(r2(d))+') ≠ crédit ('+eur(r2(c))+')');
  const L=prochaineLettre(t);
  auxSel.forEach(k=>{ const l=ligneObj(k); if(l) l.lettre=L; });
  auxSel=[]; save(); render();
  toast('Lettrage '+L+' enregistré — '+eur(r2(d))+' équilibré');
}
function auxDelettrer(){
  if(!auxSel.length) return toast('Sélectionnez des lignes lettrées à délettrer');
  let n=0; auxSel.forEach(k=>{ const l=ligneObj(k); if(l&&l.lettre){ l.lettre=''; n++; } });
  auxSel=[]; save(); render(); toast(n+' ligne(s) délettrée(s)');
}
function auxLettrageAuto(){
  const t=db.tiers.find(x=>x.id===auxTiersId); if(!t) return;
  const lignes=auxLignes(t).filter(l=>!l.lettre);
  // rapproche chaque débit avec un crédit de même montant
  let n=0;
  const credits=lignes.filter(l=>l.credit>0), debits=lignes.filter(l=>l.debit>0);
  debits.forEach(dl=>{ const m=credits.find(cl=>!cl._u && Math.abs(cl.credit-dl.debit)<0.005);
    if(m){ const L=prochaineLettre(t); const a=ligneObj(dl.key), b=ligneObj(m.key);
      if(a&&b){ a.lettre=L; b.lettre=L; m._u=true; n++; } } });
  save(); render(); toast(n?(n+' rapprochement(s) lettré(s) automatiquement'):'Aucun couple débit/crédit équilibré trouvé');
}

function auxSolderCompte(){ const t=db.tiers.find(x=>x.id===auxTiersId); if(!t)return;
  // lettre toutes les lignes non lettrées d'un même solde nul ensemble
  const L=auxLignes(t).filter(l=>!l.lettre); let d=0,c=0; L.forEach(l=>{d+=l.debit;c+=l.credit;});

function auxDelettrerDesequilibres(){ const t=db.tiers.find(x=>x.id===auxTiersId); if(!t)return;

/* raccourcis clavier du compte auxiliaire */
function auxKeydown(e){
  if(current!=='compteaux'||!auxTiersId) return;
  if(e.target&&/INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) return;
  if(e.key==='ArrowRight'){ auxCompteSuivant(1); e.preventDefault(); }
  else if(e.key==='ArrowLeft'){ auxCompteSuivant(-1); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ auxAnnee(1); e.preventDefault(); }
  else if(e.key==='ArrowDown'){ auxAnnee(-1); e.preventDefault(); }
  else if(e.key==='F8'){ auxSolderCompte(); e.preventDefault(); }

}

/* ---- BALANCE (Générale / Fournisseurs / Clients / Personnel / Immo / Retenue) ---- */
function balanceLignes(type){
  // renvoie [{code9, lib, debit, credit}] selon le type
  if(type==='fournisseurs'||type==='clients'){
    const wantType=type==='clients'?'client':'fournisseur';
    return db.tiers.filter(t=>t.type===wantType).map(t=>{const m=auxMvt(t,null);
      return {code9:sageCode(t), lib:t.nom, debit:m.debit, credit:m.credit};}).sort((a,b)=>a.code9<b.code9?-1:1);
  }
  // général : tous les comptes mouvementés
  const g=sgGeneraux(null).map(a=>({code9:a.code9, lib:a.lib, debit:a.debit, credit:a.credit}));
  if(type==='personnel') return g.filter(a=>a.code9.startsWith('42'));
  if(type==='immobilisations') return g.filter(a=>a.code9.startsWith('404'));
  if(type==='retenue') return g.filter(a=>a.code9.startsWith('4047'));
  return g; // générale
}
function balanceDoc(type){
  const titres={generale:'BALANCE GENERALE',fournisseurs:'BALANCE FOURNISSEURS DIVERS',
    immobilisations:"BALANCE FOURNISSEURS D'IMMOBILISATIONS",clients:'BALANCE CLIENTS DIVERS',
    retenue:'BALANCE RETENUE DE GARANTIE',personnel:'BALANCE PERSONNEL : REMUNERATIONS DUES'};
  const titre=titres[type]||'BALANCE';
  const lignes=balanceLignes(type);
  const cell=v=>v?sageNum(v):'';
  const sd=l=>Math.max(r2(l.debit-l.credit),0), sc=l=>Math.max(r2(l.credit-l.debit),0);
  let body='', TD=0,TC=0,TSD=0,TSC=0;
  if(type==='generale'){
    // groupé par 2 chiffres puis par classe
    const by2={}; lignes.forEach(l=>{const k=l.code9.slice(0,2);(by2[k]=by2[k]||[]).push(l);});
    const keys=Object.keys(by2).sort();
    let curCls=null, clsD=0,clsC=0,clsSD=0,clsSC=0;
    keys.forEach((k,idx)=>{
      const cls=k[0];
      if(curCls!==null && cls!==curCls){ body+=totalRow('Total '+curCls,clsD,clsC,clsSD,clsSC,'cls'); clsD=clsC=clsSD=clsSC=0; }
      curCls=cls;
      let d2=0,c2=0,sd2=0,sc2=0;
      by2[k].forEach(l=>{ const dd=l.debit,cc=l.credit,a=sd(l),b=sc(l);
        body+=`<tr><td class="l cpt">${l.code9}</td><td class="l">${l.lib}</td><td>${cell(dd)}</td><td>${cell(cc)}</td><td>${cell(a)}</td><td>${cell(b)}</td></tr>`;
        d2+=dd;c2+=cc;sd2+=a;sc2+=b; });
      body+=totalRow('Total '+k,d2,c2,sd2,sc2,'sub');
      clsD+=d2;clsC+=c2;clsSD+=sd2;clsSC+=sc2; TD+=d2;TC+=c2;TSD+=sd2;TSC+=sc2;
      if(idx===keys.length-1){ body+=totalRow('Total '+cls,clsD,clsC,clsSD,clsSC,'cls'); }
    });
  } else {
    lignes.forEach(l=>{ const a=sd(l),b=sc(l);
      body+=`<tr><td class="l cpt">${l.code9}</td><td class="l">${l.lib}</td><td>${cell(l.debit)}</td><td>${cell(l.credit)}</td><td>${cell(a)}</td><td>${cell(b)}</td></tr>`;
      TD+=l.debit;TC+=l.credit;TSD+=a;TSC+=b; });
    const pre=type==='personnel'?'42':type==='immobilisations'?'40':type==='retenue'?'40':(lignes[0]?lignes[0].code9.slice(0,2):'40');
    body+=totalRow('Total '+pre,TD,TC,TSD,TSC,'sub');
    body+=totalRow('Total '+pre[0],TD,TC,TSD,TSC,'cls');
  }
  body+=totalRow('Total Général',TD,TC,TSD,TSC,'tg');
  const res=resultatPer(null);
  return `<div class="doc-page">
    <div class="doc-h1"><span class="doc-soc">${db.societe.raison}</span><span>page</span></div>
    <div class="doc-title">${titre}</div>${docEnteteCourte(titre)}

    <tbody>${body||'<tr><td colspan=6 style="text-align:center;padding:14px">—</td></tr>'}</tbody></table>
    <div class="doc-res">Résultat au ${frDate(db.societe.exoFin)} : ${res>=0?'Bénéfice':'Perte'} de ${sageNum(res)} Euros</div>
    <div class="doc-foot">${db.societe.raison}</div>
  </div>`;
}
function totalRow(lbl,d,c,sd,sc,cls){ const f=v=>v?sageNum(v):'';
  return `<tr class="${cls}"><td></td><td class="l">${lbl}</td><td>${f(d)}</td><td>${f(c)}</td><td>${f(sd)}</td><td>${f(sc)}</td></tr>`; }

/* ---- GRAND LIVRE (général, avec solde progressif) ---- */
function mouvementsCompte(code, per){
  // lignes d'écriture touchant ce compte ; si per fourni, cumul du début jusqu'au mois per inclus
  const short=code.length===9?code.replace(/0+$/,''):code;
  const out=[];
  db.ecritures.slice().sort((a,b)=>a.date<b.date?-1:1).forEach(e=>{ if(per && ym(e.date)>per) return; e.lignes.forEach(l=>{
    if(l.compte===code||l.compte===short||c9(l.compte)===c9(code)){
      out.push({date:e.date, journal:e.journal, piece:e.libelle.split(' · ')[0], lib:e.libelle, debit:l.debit, credit:l.credit, lettre:l.lettre||''});
    }
  }); });
  return out;
}
/* Montants non lettrés sans facture rattachée — à vérifier puis demander au client/fournisseur.
   On parcourt les mouvements bancaires sur des tiers (401/411) qui ne sont reliés à aucune facture. */
function montantsSansFacture(type){
  // type: 'general' | 'fournisseur' | 'client'
  const out=[];
  db.banque.forEach(b=>{
    const t=b.tiersId?db.tiers.find(x=>x.id===b.tiersId):null;
    if(!t) return;
    if(type==='fournisseur' && t.type!=='fournisseur') return;
    if(type==='client' && t.type!=='client') return;
    const alloue=r2((b.alloc||[]).reduce((a,x)=>a+x.montant,0));
    const sansFacture=r2(b.montant-alloue);   // part du mouvement non rattachée à une facture
    if(sansFacture>0.005){
      out.push({ date:b.date, tiers:t.nom, tiersId:t.id, type:t.type, libelle:b.libelle,
        sens:b.sens, montant:sansFacture, email:t.email||'', piece:b.suivi||'' });
    }
  });

function ecrireFEC(rows, fmt, suffixe){
  const siren=(db.societe.siren||'000000000').replace(/\D/g,'').padEnd(9,'0').slice(0,9);

    content='<?xml version="1.0" encoding="UTF-8"?>\n<FEC>\n'+rows.map(r=>'  <Ecriture>'+FEC_COLS.map((c,i)=>`<${c}>${String(r[i]).replace(/[<&>]/g,'')}</${c}>`).join('')+'</Ecriture>').join('\n')+'\n</FEC>';
  } else { ext='txt'; mime='text/plain'; content=FEC_COLS.join('\t')+'\n'+rows.map(r=>r.join('\t')).join('\n'); }

function fecParseDate(s){ s=(s||'').replace(/\D/g,''); if(s.length>=8) return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8); return ''; }
function fecNum(s){ if(s===undefined||s===null||s==='')return 0; s=String(s).trim().replace(/\s/g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; }
function fecJournalMoteur(code, lib){ const u=((code||'')+' '+(lib||'')).toUpperCase();
  if(/^HA|ACHAT/.test(u))return 'ACH'; if(/^VT|VENTE/.test(u))return 'VTE';

/* Parse un FEC (TXT tabulé/;/| ou XML) → tableau d'objets ligne {journal,jcode,num,date,compte,lib,piece,debit,credit,lettre} */
function fecParse(txt){
  const out=[];
  if(/^\s*<\?xml|<FEC/i.test(txt)){
    const blocs=txt.match(/<Ecriture>[\s\S]*?<\/Ecriture>/gi)||[];
    blocs.forEach(b=>{ const g=tag=>{ const m=b.match(new RegExp('<'+tag+'>([\\s\\S]*?)<\\/'+tag+'>','i')); return m?m[1]:''; };
      out.push({ jcode:g('JournalCode'), jlib:g('JournalLib'), num:g('EcritureNum'), date:fecParseDate(g('EcritureDate')),
        compte:g('CompteNum'), clib:g('CompteLib'), compaux:g('CompAuxNum'), compauxlib:g('CompAuxLib'), piece:g('PieceRef'), lib:g('EcritureLib'),
        debit:fecNum(g('Debit')), credit:fecNum(g('Credit')), lettre:g('EcritureLet') }); });
    return out;
  }
  const lignes=txt.split(/\r?\n/).filter(x=>x.trim()); if(!lignes.length) return out;
  const sep=lignes[0].indexOf('\t')>=0?'\t':(lignes[0].indexOf('|')>=0?'|':(lignes[0].indexOf(';')>=0?';':'\t'));
  const header=lignes[0].split(sep).map(h=>h.trim());
  const ix=name=>header.findIndex(h=>new RegExp(name,'i').test(h));
  const col={ jcode:ix('JournalCode'), jlib:ix('JournalLib'), num:ix('EcritureNum'), date:ix('EcritureDate'),
    compte:ix('CompteNum'), clib:ix('CompteLib'), compaux:ix('CompAuxNum'), compauxlib:ix('CompAuxLib'), piece:ix('PieceRef'), lib:ix('EcritureLib'),
    debit:ix('Debit'), credit:ix('Credit'), lettre:ix('EcritureLet') };
  // fallback positionnel si pas d'en-tête reconnu
  const pos={jcode:0,jlib:1,num:2,date:3,compte:4,clib:5,compaux:6,compauxlib:7,piece:8,lib:10,debit:11,credit:12,lettre:13};
  const get=(c,k)=>{ const i=col[k]>=0?col[k]:pos[k]; return c[i]!==undefined?c[i]:''; };
  lignes.slice(1).forEach(ln=>{ const c=ln.split(sep);
    out.push({ jcode:get(c,'jcode').trim(), jlib:get(c,'jlib').trim(), num:get(c,'num').trim(), date:fecParseDate(get(c,'date')),
      compte:get(c,'compte').trim(), clib:get(c,'clib').trim(), compaux:get(c,'compaux').trim(), compauxlib:get(c,'compauxlib').trim(), piece:get(c,'piece').trim(), lib:get(c,'lib').trim(),
      debit:fecNum(get(c,'debit')), credit:fecNum(get(c,'credit')), lettre:(get(c,'lettre')||'').trim() }); });
  return out;
}
let fecPending=null;   // FEC analysé en attente de confirmation d'intégration
function importFEC(e){
  const fmt=document.getElementById('fec-imfmt').value;
  const file=e.target.files[0]; if(!file)return;
  const fr=new FileReader();
  fr.onload=()=>{
    let data; try{ data=fecParse(fr.result); }catch(err){ return toast('Fichier illisible'); }
    if(!data.length) return toast('Aucune ligne exploitable');
    // bornes de dates présentes dans le FEC
    const dates=data.map(l=>l.date).filter(Boolean).sort();
    const dMin=dates[0]||'', dMax=dates[dates.length-1]||'';
    // exercice suggéré : du 1er jour du mois de dMin (souvent 01/01) au dernier jour 12 mois après
    const an=dMin.slice(0,4)||exoYear();
    const exoSuggDebut = an+'-01-01';
    const exoSuggFin = an+'-12-31';
    fecPending={ fmt, fichier:file.name||('FEC.'+(/xml/i.test(fmt)?'xml':'txt')), data, dMin, dMax,
      exoDebut:exoSuggDebut, exoFin:exoSuggFin };
    const dansExoCourant = dMin>=db.societe.exoDebut && dMax<=db.societe.exoFin;
    afficherPropositionFEC(dansExoCourant);
  };
  fr.readAsText(file);
}

/* Intègre les lignes FEC `data` dans le jeu de données courant (db.*), en reconstruisant
   écritures + tiers (401/411) + mouvements de banque (journal BQ). Retourne un compte-rendu. */
function integrerFEC(data, exoD, exoF){
  const groupes={}; data.forEach(l=>{ const k=(l.num||'')+'|'+(l.date||'')+'|'+(l.jcode||''); (groupes[k]=groupes[k]||[]).push(l); });
  let nEcr=0, nLignes=0, rejetsDate=0, rejetsEq=0, nBanque=0, nTiers=0; const datesRejet=[];
  // index tiers par compte auxiliaire OU par compte collectif+libellé
  const tiersParAux={}; db.tiers.forEach(t=>{ if(t.compteAux) tiersParAux[t.compteAux]=t; });
  function trouverOuCreerTiers(compte, compaux, compauxlib, libEcr){
    const estClient=String(compte).startsWith('411');
    const estFourn=String(compte).startsWith('401');
    if(!estClient && !estFourn) return null;
    const cleAux=compaux||(''); const nom=(compauxlib||libEcr||(estClient?'Client':'Fournisseur')).trim();
    // 1) par compte auxiliaire
    if(cleAux && tiersParAux[cleAux]) return tiersParAux[cleAux];
    // 2) par nom déjà existant
    let t=db.tiers.find(x=> x.type===(estClient?'client':'fournisseur') && (x.nom||'').toLowerCase()===nom.toLowerCase());
    if(t){ if(cleAux && !t.compteAux){ t.compteAux=cleAux; tiersParAux[cleAux]=t; } return t; }
    // 3) création
    t={ id:uid(), type:estClient?'client':'fournisseur', categorie:'societe', nom,
        compteContre:estClient?'706000':'606400', compteTVA:estClient?'44571':'44566', taux:20,
        compteAux:cleAux||genAux(estClient?'client':'fournisseur', nom), email:'', tel:'', siret:'', adresse:'' };
    db.tiers.push(t); if(cleAux) tiersParAux[cleAux]=t; nTiers++;
    return t;
  }
  Object.values(groupes).forEach(grp=>{
    const date=grp[0].date;
    if(!date || date<exoD || date>exoF){ rejetsDate++; if(datesRejet.length<5&&date) datesRejet.push(frDate(date)); return; }
    const d=r2(grp.reduce((a,l)=>a+l.debit,0)), c=r2(grp.reduce((a,l)=>a+l.credit,0));
    if(Math.abs(d-c)>=0.01){ rejetsEq++; return; }
    const jrn=fecJournalMoteur(grp[0].jcode, grp[0].jlib);
    let tiersEcr=null;
    const lignes=grp.map(l=>{
      // enrichir le plan comptable
      if(l.compte){ const short=l.compte.replace(/0+$/,'')||l.compte; if(!COMPTES[l.compte]&&!COMPTES[short]) COMPTES[l.compte]=l.clib||l.compte;
        if(!db.plan.some(pp=>c9(pp.code)===c9(l.compte))) db.plan.push({code:l.compte, lib:l.clib||l.compte, tva:''}); }
      // reconstruire / relier le tiers pour les comptes 401 / 411
      if(String(l.compte).startsWith('401')||String(l.compte).startsWith('411')){
        const t=trouverOuCreerTiers(l.compte, l.compaux, l.compauxlib, grp[0].lib);
        if(t) tiersEcr=t;
      }
      nLignes++;
      return { compte:l.compte, lib:l.clib||COMPTES[l.compte]||l.compte, debit:r2(l.debit), credit:r2(l.credit), lettre:l.lettre||'' };
    });
    const ecr={ id:uid(), date, journal:jrn, libelle:(grp[0].piece||grp[0].num||'IMPORT')+' · '+(grp[0].lib||'Import FEC'),
      lignes, importeFEC:true, tiersId:tiersEcr?tiersEcr.id:null };
    db.ecritures.push(ecr);
    nEcr++;
    // RECONSTRUCTION BANQUE : si l'écriture touche un compte 512, créer le mouvement bancaire correspondant
    const l512=lignes.find(l=>String(l.compte).startsWith('512'));
    if(l512){
      const contre=lignes.find(l=>l!==l512) || l512;
      // sens du point de vue banque : débit 512 = encaissement (entrée), crédit 512 = décaissement (sortie)
      const sensBanque = l512.debit>0 ? 'D' : 'C';
      const montant = r2(l512.debit>0 ? l512.debit : l512.credit);
      db.banque.push({ id:uid(), date, jour:+date.slice(8,10)||1, compte:contre.compte,
        libelle:(grp[0].lib||grp[0].piece||'Mouvement'), sens:sensBanque, montant,
        suivi:'', tiersId:tiersEcr?tiersEcr.id:null, ecritureId:ecr.id, alloc:[], importeFEC:true });
      nBanque++;
    }
  });
  return { nEcr, nLignes, rejetsDate, rejetsEq, nBanque, nTiers, datesRejet };
}
function confirmerImportFEC(nouveauDossier){
  const p=fecPending; if(!p) return;
  let cr, dossierNom, exoD, exoF;
  if(nouveauDossier){
    const nom=((document.getElementById('fecnd-nom')||{}).value||'Dossier importé').trim();
    const debut=(document.getElementById('fecnd-debut')||{}).value||p.exoDebut;
    const fin=(document.getElementById('fecnd-fin')||{}).value||p.exoFin;
    if(p.dMin<debut || p.dMax>fin){
      return toast('Les dates du FEC ('+frDate(p.dMin)+'→'+frDate(p.dMax)+') ne tiennent pas dans l\'exercice saisi');
    }
    // créer un NOUVEAU dataset isolé (sans toucher au dossier actif)
    persistActif();
    const soc=Object.assign(societeDefaut(),{ raison:nom, dossierNom:nom, dossierCode:nom.replace(/\s/g,'').slice(0,6).toUpperCase(),
      exoDebut:debut, exoFin:fin, exercices:[debut+'|'+fin, addAnnees(debut,1)+'|'+addAnnees(fin,1)] });
    const ds=datasetVide(soc);
    const newId='d-'+uid();
    db.dossiersData[newId]=ds;
    // intégrer dans CE dataset
    withDataset(ds, ()=>{ chargerPlanBTP(); cr=integrerFEC(p.data, debut, fin);
      logFEC({ sens:'import', fichier:p.fichier, format:p.fmt, nbEcr:cr.nEcr, nbLignes:cr.nLignes, rejets:cr.rejetsDate+cr.rejetsEq,
        nBanque:cr.nBanque, nTiers:cr.nTiers, dossier:nom, exercice:frDate(debut)+'→'+frDate(fin), nouveauDossier:true }); });
    // référencer dans le portefeuille du cabinet
    if(!db.cabinet) db.cabinet=cabinetDefaut();
    if(!db.cabinet.dossiers.some(x=>x.id===newId)){
      db.cabinet.dossiers.push({ id:newId, nom, forme:soc.formeJur, siren:soc.siren, activite:soc.activite, ville:soc.ville,
        actif:true, favori:false, factFourn:ds.factures.filter(f=>f.type==='achat').length, factClient:ds.factures.filter(f=>f.type==='vente').length,
        docsManquants:0, portail:'Qonto', importeFEC:true });
      db.cabinet.total=(db.cabinet.total||db.cabinet.dossiers.length);
      if(db.cabinet.dossiers.length>db.cabinet.total) db.cabinet.total=db.cabinet.dossiers.length;
    }
    // activer le nouveau dossier
    chargerDossier(newId);
    dossierNom=nom; exoD=debut; exoF=fin;
  } else {
    exoD=db.societe.exoDebut; exoF=db.societe.exoFin;
    cr=integrerFEC(p.data, exoD, exoF);
    logFEC({ sens:'import', fichier:p.fichier, format:p.fmt, nbEcr:cr.nEcr, nbLignes:cr.nLignes, rejets:cr.rejetsDate+cr.rejetsEq,
      nBanque:cr.nBanque, nTiers:cr.nTiers, dossier:db.societe.dossierNom, exercice:frDate(exoD)+'→'+frDate(exoF), nouveauDossier:false });
    dossierNom=db.societe.dossierNom;
  }
  save(); snapshotDB(); sgPer=null; fecPending=null;
  const r=document.getElementById('fec-result');
  if(r) r.innerHTML=`<div class="card" style="border-color:var(--credit)"><h2 class="cre">FEC intégré ✓</h2>
    <p>${cr.nEcr} écriture(s) et ${cr.nLignes} ligne(s) intégrées dans le dossier <b>${dossierNom}</b> (${frDate(exoD)} → ${frDate(exoF)})${nouveauDossier?' — nouveau dossier créé':''}.</p>
    ${nouveauDossier?`<p class="cre">Exercice suivant <b>${(parseInt(exoD.slice(0,4))+1)}</b> également ouvert : vous pouvez traiter <b>${exoD.slice(0,4)}</b> et <b>${(parseInt(exoD.slice(0,4))+1)}</b> dans ce dossier (menu Fichier/Exercice → « Exercice suivant »).</p>`:''}
    <p>Reconstruction : <b>${cr.nBanque}</b> mouvement(s) bancaire(s), <b>${cr.nTiers}</b> tiers (fournisseurs / clients) recréés.</p>
    ${cr.rejetsDate?`<p class="deb">${cr.rejetsDate} écriture(s) hors exercice rejetée(s) (ex. ${cr.datesRejet.join(', ')}).</p>`:''}
    ${cr.rejetsEq?`<p class="deb">${cr.rejetsEq} écriture(s) déséquilibrée(s) rejetée(s).</p>`:''}
    <p class="hint">Comptes ajoutés au plan, tiers et banque reconstruits avec les bons montants et libellés. Visible dans le Journal, la Consultation des comptes, la Banque, les Balances et le Grand livre. Lettrage d'origine conservé.</p>
    <div class="right"><button class="btn btn-ghost" onclick="current='banque';render()">Voir la Banque</button>
      <button class="btn btn-pri" onclick="current='compta';sgPer=null;render()">Voir la Consultation des comptes</button></div></div>`;
  render();
  toast('FEC intégré dans « '+dossierNom+' » : '+cr.nEcr+' écritures, '+cr.nBanque+' mvts banque, '+cr.nTiers+' tiers');
}

/* ===== PLAN COMPTABLE — 4 sous-modules (Général / Fournisseur / Client / Salarié) ===== */
let pcTab='general', pcQuery='';
function pcSetTab(t){ pcTab=t; pcQuery=''; render(); }
function pcSearch(v){ pcQuery=v; const el=document.getElementById('pc-list-body'); if(el) el.innerHTML=pcRows(); }
function pcUsedCode(code){ return db.ecritures.some(e=>e.lignes.some(l=>c9(l.compte)===c9(code))); }
function pcTiersUsed(t){ return (db.factures||[]).some(f=>f.tiersId===t.id) || (db.banque||[]).some(b=>b.tiersId===t.id)
  || (t.compteAux && db.ecritures.some(e=>e.lignes.some(l=>c9(l.compte)===c9(t.compteAux)))); }
function pcSalUsed(sal){ const a=salAux(sal); return db.ecritures.some(e=>e.lignes.some(l=>c9(l.compte)===c9(a))); }
function pcData(){
  if(pcTab==='fournisseur') return (db.tiers||[]).filter(t=>t.type==='fournisseur')
    .map(t=>({code:t.compteAux||'401', code9:c9(t.compteAux||'401'), lib:t.nom, classe:'4', tva:'', used:pcTiersUsed(t), kind:'tiers', id:t.id}))
    .sort((a,b)=>a.code9<b.code9?-1:1);
  if(pcTab==='client') return (db.tiers||[]).filter(t=>t.type==='client')
    .map(t=>({code:t.compteAux||'411', code9:c9(t.compteAux||'411'), lib:t.nom, classe:'4', tva:'', used:pcTiersUsed(t), kind:'tiers', id:t.id}))
    .sort((a,b)=>a.code9<b.code9?-1:1);
  if(pcTab==='salarie') return (((db.paie||{}).salaries)||[])
    .map(sal=>({code:salAux(sal), code9:c9(salAux(sal)), lib:sal.nom, classe:'4', tva:'', used:pcSalUsed(sal), kind:'sal', id:sal.id}))
    .sort((a,b)=>a.code9<b.code9?-1:1);
  return planComptableListe().map(c=>({code:c.code, code9:c.code9, lib:c.lib, classe:c.classe, tva:c.tva, used:pcUsedCode(c.code), kind:'cpt'}));
}
function pcRows(){
  const q=(pcQuery||'').trim().toLowerCase();
  let rows=pcData();
  if(q) rows=rows.filter(r=>r.code9.toLowerCase().startsWith(q) || r.code9.includes(q) || (r.lib||'').toLowerCase().includes(q));
  if(!rows.length) return '<tr><td colspan="5" class="empty">Aucun compte ne correspond à « '+(pcQuery||'')+' ».</td></tr>';
  const cap=400, shown=rows.slice(0,cap);
  let html=shown.map(r=>{
    const ren = r.kind==='tiers'?("pcRenameTiers('"+r.id+"',this.value)") : r.kind==='sal'?("pcRenameSal('"+r.id+"',this.value)") : ("majLibCompte('"+r.code+"',this.value)");
    const del = r.kind==='tiers'?("pcDelTiers('"+r.id+"')") : r.kind==='sal'?("pcDelSal('"+r.id+"')") : ("suppCompte('"+r.code+"')");
    const tvaLbl = r.tva?(c9(r.tva)+' <span class="mini">'+((COMPTES[r.tva]||COMPTES[c9(r.tva)]||'').replace('TAXES SUR LE CA ','').replace('TVA ',''))+'</span>'):'—';
    return '<tr><td class="num">'+r.code9+'</td>'
      +'<td><input value="'+(r.lib||'').replace(/"/g,'&quot;')+'" style="padding:5px 8px;width:100%" '+(r.used?'disabled title="Compte mouvementé — modification impossible"':'')+' onchange="'+ren+'"></td>'
      +'<td>'+r.classe+'. '+(CLASSES[r.classe]||'')+'</td>'
      +'<td class="num">'+tvaLbl+'</td>'
      +'<td class="r" style="white-space:nowrap">'+(r.used?'<span class="tag t-part">utilisé</span> ':'')
      +'<button class="btn btn-ghost btn-sm" onclick="sousCompte(\''+r.code+'\')">+ sous-cpte</button> '
      +'<button class="btn btn-ghost btn-sm" '+(r.used?'disabled':'')+' onclick="'+del+'">Suppr.</button></td></tr>';
  }).join('');
  if(rows.length>cap) html+='<tr><td colspan="5" class="mini" style="text-align:center;padding:8px">… '+(rows.length-cap)+' comptes supplémentaires — affinez la recherche.</td></tr>';
  return html;
}
function pcRenameTiers(id,val){ const t=(db.tiers||[]).find(x=>x.id===id); if(!t)return;
  if(pcTiersUsed(t)){ toast('Tiers mouvementé : modification impossible'); render(); return; }
  t.nom=(val||'').trim()||t.nom; if(t.compteAux) COMPTES[c9(t.compteAux)]=t.nom; save(); toast('Compte tiers renommé'); }
function pcDelTiers(id){ const t=(db.tiers||[]).find(x=>x.id===id); if(!t)return;
  if(pcTiersUsed(t)) return toast('Tiers mouvementé : suppression impossible');
  if(!confirm('Supprimer le compte tiers « '+t.nom+' » ?'))return; db.tiers=db.tiers.filter(x=>x.id!==id); save(); render(); toast('Compte tiers supprimé'); }
function pcRenameSal(id,val){ const sal=(((db.paie||{}).salaries)||[]).find(x=>x.id===id); if(!sal)return;
  if(pcSalUsed(sal)){ toast('Salarié mouvementé : modification impossible'); render(); return; }
  sal.nom=(val||'').trim()||sal.nom; save(); toast('Compte salarié renommé'); }
function pcDelSal(id){ const sal=(((db.paie||{}).salaries)||[]).find(x=>x.id===id); if(!sal)return;
  if(pcSalUsed(sal)) return toast('Salarié mouvementé : suppression impossible');
  if(!confirm('Supprimer le compte salarié « '+sal.nom+' » ?'))return; db.paie.salaries=db.paie.salaries.filter(x=>x.id!==id); save(); render(); toast('Compte salarié supprimé'); }
/* --- accord TVA automatique --- */
function pcRateDed(l){ l=l||''; if(/5[.,]5/.test(l))return'445662000'; if(/10\s*%|[^0-9]10[^0-9]/.test(l))return'445666000'; if(/2[.,]1/.test(l))return'445661000'; if(/[^0-9]8\s*%/.test(l))return'445663000'; return'445667000'; }
function pcRateColl(l){ l=l||''; if(/5[.,]5/.test(l))return'445712000'; if(/10\s*%|[^0-9]10[^0-9]/.test(l))return'445716000'; if(/2[.,]1/.test(l))return'445711000'; if(/[^0-9]8\s*%/.test(l))return'445713000'; return'445717000'; }
function pcAutoliq(l){ return /\bUE\b|HORS\s*UE|EXPORT|DOM\s*TOM|AUTOLIQ|EXONER|INTRACOM/i.test(l||''); }
function appliquerTVAauto(verbose){
  if(!db.plan) db.plan=[]; let n=0;
  db.plan.forEach(c=>{ const k=c9(c.code); const lib=c.lib||COMPTES[c.code]||COMPTES[k]||'';
    if(/^(60|61|62)/.test(k)){ c.tva=pcRateDed(lib); n++; }
    else if(/^70/.test(k)){ if(pcAutoliq(lib)){ c.tva=''; } else { c.tva=pcRateColl(lib); n++; } }
  });
  if(verbose){ save(); render(); toast('TVA accordée — charges 60/61/62 → déductible, ventes 70x → collectée (sauf autoliquidées) · '+n+' comptes'); }
}

function planComptableListe(){
  // comptes du plan (BTP + ajouts) + comptes réellement utilisés, dédupliqués par n° à 9 chiffres
  const used=new Set(); db.ecritures.forEach(e=>e.lignes.forEach(l=>used.add(l.compte)));
  const map={};
  [...used].forEach(c=>{ const k=c9(c); map[k]={code:c, code9:k, lib:COMPTES[c]||c, classe:classeDe(c), tva:''}; });
  (db.plan||[]).forEach(c=>{ const k=c9(c.code); map[k]={code:c.code, code9:k, lib:c.lib||COMPTES[c.code]||c.code, classe:classeDe(c.code), tva:c.tva||''}; });
  return Object.values(map).sort((a,b)=>a.code9<b.code9?-1:1);
}
function ajoutCompte(){ const code=document.getElementById('pc-num').value.trim(); if(!code)return toast('N° de compte requis');
  if(/^(401|411|421)/.test(c9(code))) return toast('Compte de tiers : se crée depuis Tiers / Paie au format 401-411 + 4 lettres. Saisie refusée.');
  const lib=document.getElementById('pc-lib').value.trim()||code; const tva=document.getElementById('pc-tva').value;
  COMPTES[code]=lib; db.plan=db.plan.filter(c=>c.code!==code); db.plan.push({code,lib,tva}); save(); render(); toast('Compte '+c9(code)+' ajouté'); }
function majLibCompte(code,lib){ if(db.ecritures.some(e=>e.lignes.some(l=>c9(l.compte)===c9(code)))){ toast('Compte mouvementé : modification impossible'); render(); return; } COMPTES[code]=lib; const e=db.plan.find(c=>c.code===code); if(e)e.lib=lib; else db.plan.push({code,lib,tva:''}); save(); toast('Libellé mis à jour'); }
function sousCompte(code){ if(/^(401|411|421)/.test(c9(code))) return toast('Comptes de tiers : pas de sous-compte (format 401-411 + 4 lettres uniquement).');
  const racine=code.replace(/0+$/,''); const sug=racine+'1';
  const num=prompt('Numéro du sous-compte :', sug.length>code.length?sug:code+'1'); if(!num)return;
  const lib=prompt('Libellé du sous-compte :', COMPTES[code]||''); if(lib===null)return;
  COMPTES[num]=lib; db.plan.push({code:num,lib,tva:''}); save(); render(); toast('Sous-compte '+c9(num)+' créé'); }
function suppCompte(code){ const used=db.ecritures.some(e=>e.lignes.some(l=>l.compte===code));
  if(used)return toast('Compte mouvementé : suppression impossible'); db.plan=db.plan.filter(c=>c.code!==code); delete COMPTES[code]; save(); render(); toast('Compte retiré'); }
function enregistrerParam(){ const g=id=>document.getElementById(id).value; const p=db.parametres;

/* ---------- utilitaires de calcul ---------- */
const imTrunc2 = n => Math.floor((n+1e-9)*100)/100;
function imAddMonths(iso,n){ const [y,m,d]=iso.split('-').map(Number); const dt=new Date(y, m-1+n, d); return dt.toISOString().slice(0,10); }
function imMinusJour(iso){ const dt=new Date(iso+'T00:00:00'); dt.setDate(dt.getDate()-1); return dt.toISOString().slice(0,10); }
function imJours360(a,b){ let [y1,m1,d1]=a.split('-').map(Number),[y2,m2,d2]=b.split('-').map(Number);
  d1=Math.min(d1,30); d2=Math.min(d2,30); return (y2-y1)*360+(m2-m1)*30+(d2-d1)+1; }
function imMax(a,b){ return a>b?a:b; } function imMin(a,b){ return a<b?a:b; }
function imYear(){ return +(db.societe&&db.societe.exoDebut?db.societe.exoDebut:'2026-01-01').slice(0,4); }

/* ---------- moteur d'amortissement ---------- */
function immoFinISO(im){ return imMinusJour(imAddMonths(im.miseEnService, im.dureeMois)); }
function immoBase(im){ return r2(im.montantHT - (im.valResiduelle||0)); }
function immoTauxAnnuel(im){
  if(im.type==='degressif'){ const ans=im.dureeMois/12; const coef = ans<=4?1.25:(ans<=6?1.75:2.25); return r2(100/ans*coef); }
  return 100*12/im.dureeMois;
}
function compteAmortDe(cpt){ const root=String(cpt).replace(/0+$/,'')||String(cpt);
  const r = root[0]==='2' ? '28'+root.slice(1) : '28'+root; return c9(r); }
/* plan annuel : [{annee,debut,fin,base,amortAnt,dotation,cumul,vnc}] */
function immoPlan(im){
  const base=immoBase(im); const annual=r2(base*12/im.dureeMois);
  const fin=immoFinISO(im); const y0=+im.miseEnService.slice(0,4), yE=+fin.slice(0,4);
  const rows=[]; let cumul=0; let crd=base;
  for(let y=y0;y<=yE;y++){
    const ds=imMax(im.miseEnService, y+'-01-01'); const de=imMin(fin, y+'-12-31');
    let dot;
    if(im.type==='degressif'){
      const tx=immoTauxAnnuel(im)/100; const lin=crd/Math.max((imAnnee_remainingMonths(im,y))/12,0.0001);
      let deg=imTrunc2(crd*tx*imJours360(ds,de)/360);
      // bascule vers linéaire quand plus avantageux
      const restAns=(imJours360(im.miseEnService,fin) )/360 - (imJours360(im.miseEnService,de))/360;
      dot = deg; if(y===yE) dot=r2(base-cumul);
    } else {
      if(y===yE) dot=r2(base-cumul);
      else if(y===y0) dot=r2(annual*imJours360(ds,de)/360);
      else dot=annual;
    }
    const amortAnt=cumul; cumul=r2(cumul+dot); crd=r2(base-cumul);
    rows.push({annee:y, debut:ds, fin:de, base, amortAnt, dotation:dot, cumul, vnc:r2(im.montantHT-cumul)});
  }
  return {base, annual, fin, taux:immoTauxAnnuel(im), rows};
}
function imAnnee_remainingMonths(im,y){ const fin=immoFinISO(im); const de=y+'-12-31';
  const a=imMax(im.miseEnService, y+'-01-01'); return Math.max(imJours360(a, imMin(fin,de))/30, 1); }
function immoRowAnnee(im, annee){
  const p=immoPlan(im); const r=p.rows.find(x=>x.annee===annee);
  if(r) return r;
  if(annee < p.rows[0].annee) return {annee, base:p.base, amortAnt:0, dotation:0, cumul:0, vnc:im.montantHT};
  const last=p.rows[p.rows.length-1];
  return {annee, base:p.base, amortAnt:last.cumul, dotation:0, cumul:last.cumul, vnc:r2(im.montantHT-last.cumul)};
}
function immosParCompte(){ const g={}; (db.immos||[]).forEach(im=>{ (g[im.compte]=g[im.compte]||[]).push(im); }); return g; }
function immoAnnees(){ const s=new Set(); (db.immos||[]).forEach(im=>{ immoPlan(im).rows.forEach(r=>s.add(r.annee)); });
  for(let k=-3;k<=1;k++) s.add(imYear()+k); return [...s].sort((a,b)=>a-b); }

      ${imF('Total amorti (hors dérog.) :', eur(row.cumul))}

function imSave(){
  const g=id=>document.getElementById(id); const cpt=g('im-cpt').value;

  const im={ id:uid(), numero:num, nature:(g('im-nat').value||num).trim(), compte:cpt,
    compteAmort:compteAmortDe(cpt), compteDot:(g('im-dot').value||'681120000').trim(),
    montantHT:+g('im-ht').value||0, valResiduelle:+g('im-vr').value||0,
    fournisseur:(g('im-four').value||'').trim(), dateFacture:g('im-df').value, miseEnService:g('im-ms').value,
    dureeMois:+g('im-duree').value||12, type:g('im-mode').value, sortie:null };
  db.immos=db.immos||[]; db.immos.push(im); imSelId=im.id; save(); closeModal(); render(); toast('Immobilisation « '+num+' » créée');
}
function imDel(id){ if(!confirm('Supprimer cette immobilisation ?'))return; db.immos=(db.immos||[]).filter(x=>x.id!==id); imSelId=null; save(); render(); toast('Immobilisation supprimée'); }
function imCeder(id){ const im=(db.immos||[]).find(x=>x.id===id); if(!im)return;
  const d=prompt('Date de cession (AAAA-MM-JJ) :', imYear()+'-12-31'); if(!d)return;
  const prix=prompt('Prix de cession HT (€) :','0'); if(prix===null)return;
  im.sortie={date:d, prix:r2(+prix||0)}; save(); render(); toast('Cession enregistrée — pensez à comptabiliser la VNC (675) et le produit (775)'); }

/* ---------- comptabilisation des dotations (OD) ---------- */
function imComptabiliserDotations(){
  const an=imAnnee; const lignes=[]; let total=0;
  (db.immos||[]).forEach(im=>{ const row=immoRowAnnee(im,an); if(row.dotation>0.005){
    lignes.push({compte:im.compteDot||'681120000', lib:'Dotation '+im.numero, debit:row.dotation, credit:0});
    lignes.push({compte:im.compteAmort||compteAmortDe(im.compte), lib:'Amort. '+im.numero, debit:0, credit:row.dotation});
    total+=row.dotation; } });
  if(!lignes.length) return toast('Aucune dotation à comptabiliser pour '+an);
  const lib='OD DOTATIONS AMORTISSEMENTS '+an;
  if(db.ecritures.some(e=>(e.libelle||'').includes(lib))) return toast('Dotations '+an+' déjà comptabilisées');
  posterOD({date:an+'-12-31', libelle:lib, lignes});
  save(); render(); toast('Dotations '+an+' comptabilisées ('+eur(r2(total))+') → journal OD');
}

/* ============================================================================
   EMPRUNTS (classe 16) — échéancier, ICNE, comptabilité
   ============================================================================ */
function empEcheancier(e){
  const i=(e.tauxAnnuel/100)/12, n=e.dureeMois;
  const mens = i>0 ? r2(e.capital*i/(1-Math.pow(1+i,-n))) : r2(e.capital/n);
  const rows=[]; let crd=e.capital;
  for(let k=1;k<=n;k++){ const date=imAddMonths(e.dateDeblocage,k);
    const interets=r2(crd*i); let amort=r2(mens-interets); if(k===n) amort=crd;
    const crdAvant=crd; crd=r2(crd-amort);
    rows.push({k, date, crdAvant, interets, amort, assurance:r2(e.assuranceMensuelle||0), mensualite:mens, annuite:r2(mens+(e.assuranceMensuelle||0)), crd}); }
  return {mens, rows};
}
function empAnnuel(e){ const ec=empEcheancier(e); const par={};
  ec.rows.forEach(r=>{ const y=+r.date.slice(0,4); const a=par[y]||(par[y]={interets:0,amort:0,assurance:0,annuite:0,crd:r.crd});
    a.interets=r2(a.interets+r.interets); a.amort=r2(a.amort+r.amort); a.assurance=r2(a.assurance+r.assurance); a.annuite=r2(a.annuite+r.annuite); a.crd=r.crd; });
  return par; }
function empICNE(e, an){ const ec=empEcheancier(e);
  // dernière échéance de l'année + 1ère échéance de l'année suivante
  const dansAn=ec.rows.filter(r=>+r.date.slice(0,4)===an);
  const apres=ec.rows.find(r=>r.date> (an+'-12-31'));
  if(!apres) return 0;
  const dernier=dansAn.length?dansAn[dansAn.length-1].date:(e.dateDeblocage);
  const j=imJours360(dernier, an+'-12-31')-1; // jours courus depuis la dernière échéance
  return r2(apres.interets * Math.max(j,0)/30);
}

function cbCompte(cb){ return cb.type==='immobilier'?'612500000':'612200000'; }
function cbLoyersAnnee(cb, an){ let n=0; for(let k=0;k<cb.dureeMois;k++){ const d=imAddMonths(cb.dateDebut,k); if(+d.slice(0,4)===an) n++; } return {nb:n, total:r2(n*cb.loyerMensuel)}; }
function cbEngagement(cb, an){ // loyers restant à courir après le 31/12/an, ventilés
  let a1=0,a15=0,a5=0; for(let k=0;k<cb.dureeMois;k++){ const d=imAddMonths(cb.dateDebut,k); if(d<=an+'-12-31') continue;

/* ============================================================================
   TAXE VÉHICULES DE SOCIÉTÉS (TVS) — aide au calcul CO2 + polluants
   ============================================================================ */
function tvsTarifCO2(co2){ // barème annuel simplifié (g/km WLTP)
  const bareme=[[20,0],[50,28],[60,42],[100,55],[120,70],[140,85],[150,100],[160,120],[170,140],[190,170],[230,220],[270,280],[9999,360]];
  for(const [seuil,t] of bareme){ if(co2<=seuil) return t; } return 360;
}
function tvsTarifPolluant(carburant, annee){ // taxe annuelle polluants atmosphériques
  if(/electr|hydro/i.test(carburant)) return 0;
  if(/diesel|gazole/i.test(carburant)) return annee>=2011?100:500;
  return annee>=2011?0:100; // essence récente : 0
}
function imViewTVS(){

    return `<tr><td>${v.immat||''}</td><td>${v.modele||''}</td><td class="r num">${v.co2} g</td><td>${v.carburant}</td><td class="num">${frDate(v.dateMiseCirc)}</td><td class="r num">${eur(tco2)}</td><td class="r num">${eur(tpoll)}</td><td class="r num">${eur(tot)}</td></tr>`;}).join('')||'<tr><td colspan="8" class="empty">Aucun véhicule</td></tr>';
  const totalTVS=r2((db.vehicules||[]).reduce((a,v)=>a+tvsTarifCO2(v.co2)+tvsTarifPolluant(v.carburant,+(''+v.dateMiseCirc).slice(0,4)),0));
  return `<div class="mod-wrap">${head('Taxe annuelle sur les véhicules de société (TVS)','Fiche d\'aide au calcul : taxe sur les émissions de CO₂ + taxe sur les polluants atmosphériques. Barèmes simplifiés — à confirmer selon l\'année d\'imposition.')}

      <div class="row g4">

        <div class="field"><label>Carburant</label><select id="tvs-carb" onchange="tvsCalc()"><option>Essence</option><option>Diesel</option><option>Hybride</option><option>Électrique</option></select></div>
        <div class="field"><label>Année 1ʳᵉ mise en circulation</label><input type="number" id="tvs-an" value="2022" oninput="tvsCalc()"></div>
        <div class="field" style="display:flex;align-items:flex-end"><button class="btn btn-gold" onclick="tvsAdd()">＋ Ajouter le véhicule</button></div>
      </div>

      <table><thead><tr><th>Immat.</th><th>Modèle</th><th class="r">CO₂</th><th>Carburant</th><th>1ʳᵉ circ.</th><th class="r">Taxe CO₂</th><th class="r">Taxe polluants</th><th class="r">Total/an</th></tr></thead><tbody>${rows}</tbody></table>
    </div></div>`;

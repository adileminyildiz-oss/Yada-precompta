<script id="yada-addon15">
/* ============================================================
   YADA — Achats : scan/OCR → Assistant IA + liste allégée
   - En mode Scan ou Photo/OCR, la facture est déversée dans
     l'Assistant IA (proposition d'écriture à valider), au lieu
     d'une comptabilisation directe.
   - Liste « Factures fournisseurs reçues » allégée.
   Bloc additif.
   ============================================================ */

/* Boutons d'action selon le mode d'entrée */
function acAction(){
  if(acSource==='manuelle'){
    return `<div class="right">
      <button class="btn btn-ghost" onclick="iaProposerAchat()">Proposer via l'IA</button>
      <button class="btn btn-pri" onclick="validerAchat()">Valider l'écriture d'achat</button></div>`;
  }
  return `<div class="right">
    <span class="mini" style="margin-right:auto">La facture ${acSource==='ocr'?'photographiée (OCR)':'scannée'} est déversée automatiquement dans l'Assistant IA pour validation de l'écriture.</span>
    <button class="btn btn-pri" onclick="ocrVersIA()">Envoyer à l'Assistant IA</button></div>`;
}

/* Déversement scan/OCR → Assistant IA */
function ocrVersIA(){
  iaProposerAchat();                       // crée la proposition depuis le formulaire de capture
  const q=iaQueue(); const last=q[q.length-1]; if(last) last.sourceEntree=acSource;
  toast('Facture '+(acSource==='ocr'?'photographiée (OCR)':'scannée')+' → déversée dans l\'Assistant IA');
  current='ia'; render();
}

/* Liste fournisseurs ALLÉGÉE (override) */
function suiviFacturesAchat(){
  const facs=db.factures.filter(f=>f.type==='achat').slice().sort((a,b)=>a.date<b.date?1:-1);
  let tTTC=0;
  const rows=facs.map(f=>{ const t=db.tiers.find(x=>x.id===f.tiersId); const reg=reglementDe(f.id); tTTC+=f.ttc;
    const pay = reg&&reg.statut==='regle' ? '<span class="tag t-pay">payée ✓</span>'
      : reg&&reg.statut==='partiel' ? '<span class="tag t-part">partielle</span>'
      : '<span class="tag t-att">à payer</span>';
    return `<tr><td class="num">${f.numero}</td><td>${t?t.nom:''}</td><td class="num">${f.date}</td>
      <td>${sourceTag(f.source)}</td><td class="r num">${eur(f.ttc)}</td><td>${pay}</td>
      <td class="r"><button class="btn btn-ghost btn-sm" onclick="voirFactureAchat('${f.id}')">Voir</button></td></tr>`;
  }).join('');
  const att = iaQueue ? iaQueue().filter(p=>p.statut==='a_valider'&&p.type==='achat').length : 0;
  return `<div class="card"><h2>Factures fournisseurs reçues</h2>
    <div class="sub">${facs.length} comptabilisée(s) · Total TTC ${eur(r2(tTTC))}${att?(' · '+att+' en attente dans l\'Assistant IA'):''}</div>
    <table><thead><tr><th>N°</th><th>Fournisseur</th><th>Date</th><th>Entrée</th><th class="r">TTC</th><th>Paiement</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="7" class="empty">Aucune facture d\'achat comptabilisée</td></tr>'}</tbody></table>
  </div>`;
}

</script>
<script id="yada-addon16">
/* ============================================================
   YADA — Création d'un dossier depuis l'écran d'ouverture
   Formulaire complet (fiche d'information) + récupération SIREN/SIRET
   + dépôt obligatoire du K-bis et des Statuts, puis création et
   ouverture du dossier dans le portefeuille du cabinet.
   Bloc additif.
   ============================================================ */
var cdDocs = {};

function ouvrirCreationDossier(){
  cdDocs = {};
  let ov=document.getElementById('cd-overlay');
  if(!ov){ ov=document.createElement('div'); ov.id='cd-overlay'; ov.className='cd-ov'; document.body.appendChild(ov); }
  ov.innerHTML=cdFormHTML();
  ov.classList.add('show');
}
function cdFermer(){ const ov=document.getElementById('cd-overlay'); if(ov) ov.classList.remove('show'); }

function cdFormHTML(){
  const formes=['SAS','SASU','SARL','EURL','SA','SCI','SNC','SC','EI','Auto-entrepreneur','Association','Autre'];
  return `<div class="cd-win">
    <div class="cd-bar"><span>Créer un dossier — fiche d'information complète</span>
      <button class="cd-x" onclick="cdFermer()">✕</button></div>
    <div class="cd-body">
      <div class="card"><h2>Identification</h2>
        <div class="sub">Saisissez le SIREN ou le SIRET puis « Récupérer » pour pré-remplir automatiquement la fiche.</div>
        <div class="row g3">
          <div class="field"><label>SIREN (9 chiffres)</label><input id="cd-siren" placeholder="123456789"></div>
          <div class="field"><label>SIRET (14 chiffres)</label><input id="cd-siret" placeholder="12345678900012"></div>
          <div class="field"><label>&nbsp;</label><button class="btn btn-gold" onclick="cdLookup()">Récupérer les informations</button></div>
        </div>
        <div class="hint" id="cd-lookup-status"></div>
        <div class="row g3">
          <div class="field"><label>Dénomination *</label><input id="cd-denom" placeholder="Nom de la société"></div>
          <div class="field"><label>Forme juridique *</label><select id="cd-forme">${formes.map(f=>`<option>${f}</option>`).join('')}</select></div>
          <div class="field"><label>Capital social</label><input id="cd-capital" placeholder="ex : 10 000 €"></div>
        </div>
        <div class="row g3">
          <div class="field"><label>Code APE / NAF</label><input id="cd-ape" placeholder="ex : 4690Z"></div>
          <div class="field"><label>N° TVA intracom.</label><input id="cd-tvaintra"></div>
          <div class="field"><label>Date de création</label><input type="date" id="cd-datecrea"></div>
        </div>
        <div class="row g2">
          <div class="field"><label>Activité</label><input id="cd-activite"></div>
          <div class="field"><label>Convention collective</label><input id="cd-conv"></div>
        </div>
      </div>

      <div class="card"><h2>Coordonnées</h2>
        <div class="field"><label>Adresse *</label><input id="cd-adresse"></div>
        <div class="row g3">
          <div class="field"><label>Code postal *</label><input id="cd-cp"></div>
          <div class="field"><label>Ville *</label><input id="cd-ville"></div>
          <div class="field"><label>Pays</label><input id="cd-pays" value="France"></div>
        </div>
        <div class="row g2">
          <div class="field"><label>Téléphone</label><input id="cd-tel"></div>
          <div class="field"><label>E-mail société</label><input id="cd-mail" type="email"></div>
        </div>
      </div>

      <div class="card"><h2>Dirigeant & associés</h2>
        <div class="row g3">
          <div class="field"><label>Dirigeant *</label><input id="cd-dirigeant"></div>
          <div class="field"><label>E-mail pro dirigeant</label><input id="cd-mailpro" type="email"></div>
          <div class="field"><label>E-mail perso dirigeant</label><input id="cd-mailperso" type="email"></div>
        </div>
        <div class="field"><label>Associés</label><input id="cd-associes" placeholder="Noms et % de détention"></div>
      </div>

      <div class="card"><h2>Coordonnées bancaires</h2>
        <div class="row g3">
          <div class="field"><label>Bénéficiaire</label><input id="cd-banqbenef"></div>
          <div class="field"><label>IBAN</label><input id="cd-iban"></div>
          <div class="field"><label>BIC</label><input id="cd-bic"></div>
        </div>
      </div>

      <div class="card"><h2>Exercice comptable</h2>
        <div class="row g2">
          <div class="field"><label>Début d'exercice</label><input type="date" id="cd-exod" value="2026-01-01"></div>
          <div class="field"><label>Fin d'exercice</label><input type="date" id="cd-exof" value="2026-12-31"></div>
        </div>
      </div>

      <div class="card"><h2>Documents obligatoires</h2>
        <div class="sub">Le K-bis et les Statuts sont requis pour créer le dossier.</div>
        <div class="row g2">
          <div class="field"><label>Extrait K-bis *</label>
            <input type="file" id="cd-kbis" accept="application/pdf,image/*" onchange="cdFichier(event,'kbis')">
            <div class="hint" id="cd-kbis-lbl">Aucun fichier joint.</div></div>
          <div class="field"><label>Statuts *</label>
            <input type="file" id="cd-statuts" accept="application/pdf,image/*" onchange="cdFichier(event,'statuts')">
            <div class="hint" id="cd-statuts-lbl">Aucun fichier joint.</div></div>
        </div>
      </div>

      <div class="cd-foot">
        <button class="btn btn-ghost" onclick="cdFermer()">Annuler</button>
        <button class="btn btn-pri" onclick="creerDossierComplet()">✓ Créer le dossier</button>
      </div>
    </div>
  </div>`;
}

function cdFichier(ev, type){ const f=ev.target.files&&ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ cdDocs[type]={name:f.name, data:r.result};
    const lbl=document.getElementById('cd-'+type+'-lbl'); if(lbl) lbl.textContent='✓ '+f.name; };
  r.readAsDataURL(f);
}

async function cdLookup(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const set=(id,v)=>{ const e=document.getElementById(id); if(e && v!=null && v!=='') e.value=v; };
  const st=document.getElementById('cd-lookup-status');
  const q=(g('cd-siret')||g('cd-siren'));
  if(st) st.textContent='Recherche en cours…';
  try{
    const info=await lookupSiret(q);
    set('cd-denom', info.raison); set('cd-siren', info.siren); set('cd-siret', info.siret);
    set('cd-tvaintra', info.tvaIntra); set('cd-ape', info.codeAPE); set('cd-activite', info.activite);
    set('cd-datecrea', info.dateCreation); set('cd-capital', info.capitalSocial);
    set('cd-adresse', info.adresse); set('cd-cp', info.cp); set('cd-ville', info.ville);
    if(info.formeJuridique){ const sel=document.getElementById('cd-forme');
      if(sel){ const opt=[...sel.options].find(o=>o.value.toUpperCase()===String(info.formeJuridique).toUpperCase()); sel.value=opt?opt.value:'Autre'; } }
    if(st) st.textContent='✓ Informations récupérées — complétez puis joignez le K-bis et les Statuts';
    if(info.siret){ lookupConvention(info.siret).then(cc=>{ if(cc) set('cd-conv', cc); }).catch(()=>{}); }
  }catch(e){ if(st) st.textContent=''+e.message; }
}

function creerDossierComplet(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const raison=g('cd-denom'); if(!raison) return toast('La dénomination est obligatoire');
  const siren=g('cd-siren').replace(/\D/g,''); const siret=g('cd-siret').replace(/\D/g,'');
  if(siren.length!==9 && siret.length!==14) return toast('Renseignez un SIREN (9 chiffres) ou un SIRET (14 chiffres)');
  if(!g('cd-forme')) return toast('Forme juridique obligatoire');
  if(!g('cd-adresse')||!g('cd-cp')||!g('cd-ville')) return toast('Adresse complète obligatoire (adresse, code postal, ville)');
  if(!g('cd-dirigeant')) return toast('Le dirigeant est obligatoire');
  if(!cdDocs.kbis) return toast('Veuillez joindre le K-bis');
  if(!cdDocs.statuts) return toast('Veuillez joindre les Statuts');
  const sirenFinal = siren.length===9 ? siren : siret.slice(0,9);
  const exoDebut=g('cd-exod')||'2026-01-01', exoFin=g('cd-exof')||'2026-12-31';
  const id='d-'+uid();
  const soc=Object.assign(societeDefaut(),{
    raison, dossierNom:raison, dossierCode:(raison.replace(/\s/g,'').slice(0,6)||'DOSS').toUpperCase(),
    formeJur:g('cd-forme'), siren:sirenFinal, siret:siret,
    tvaIntra:g('cd-tvaintra')||tvaFromSiren(sirenFinal),
    codeAPE:g('cd-ape'), capitalSocial:g('cd-capital'), dateCreation:g('cd-datecrea'),
    activite:g('cd-activite'), conventionCollective:g('cd-conv'),
    adresse:g('cd-adresse'), cp:g('cd-cp'), ville:g('cd-ville'), pays:g('cd-pays')||'France',
    telSociete:g('cd-tel'), mailSociete:g('cd-mail'), dirigeant:g('cd-dirigeant'),
    mailProDir:g('cd-mailpro'), mailPersoDir:g('cd-mailperso'), associes:g('cd-associes'),
    banqueBenef:g('cd-banqbenef'), iban:g('cd-iban'), bic:g('cd-bic'),
    exoDebut, exoFin, exercices:[exoDebut+'|'+exoFin], source:'Création',
    kbisRecu:true, kbisNom:cdDocs.kbis.name, kbisPdf:cdDocs.kbis.data,
    statutsRecu:true, statutsNom:cdDocs.statuts.name, statutsPdf:cdDocs.statuts.data
  });
  if(!db.dossiersData) db.dossiersData={};
  db.dossiersData[id]=datasetVide(soc);
  try{ withDataset(db.dossiersData[id], ()=>{ if(typeof chargerPlanBTP==='function') chargerPlanBTP(); }); }catch(e){}
  if(!db.cabinet) db.cabinet=cabinetDefaut();
  db.cabinet.dossiers.unshift({ id, nom:raison, forme:g('cd-forme'), activite:g('cd-activite'),
    ville:g('cd-ville'), siren:sirenFinal, actif:true, favori:false });
  save(); cdFermer();
  chargerDossier(id); connecte=true; current='dash'; if(typeof sgPer!=='undefined') sgPer=null; render();
  toast('Dossier « '+raison+' » créé — fiche, K-bis et Statuts enregistrés');
}

</script>
<script id="yada-addon17">
/* ============================================================
   YADA — Gestion des dossiers : suppression depuis
   « Société & création du dossier »
   Liste les dossiers du cabinet avec Ouvrir / Supprimer.
   Suppression sécurisée (confirme, efface le dataset + l'entrée
   portefeuille, et revient à l'accueil si le dossier ouvert est
   supprimé).
   Bloc additif.
   ============================================================ */
function dossiersGestionCard(){
  const list=(db.cabinet&&db.cabinet.dossiers)||[];
  const rows=list.map(d=>`<tr>
      <td><b>${d.nom||'—'}</b>${d.id===db.activeId?' <span class="tag t-pay">ouvert</span>':''}</td>
      <td>${d.forme||'—'}</td><td>${d.ville||'—'}</td><td class="num">${d.siren||'—'}</td>
      <td class="r" style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="ouvrirDossierDepuisGestion('${d.id}')">Ouvrir</button>
        <button class="btn btn-ghost btn-sm" onclick="supprimerDossier('${d.id}')">Supprimer</button>
      </td></tr>`).join('') || '<tr><td colspan="5" class="empty">Aucun dossier dans le portefeuille</td></tr>';
  return `<div class="card"><h2>Dossiers du cabinet</h2>
    <div class="sub">Ouvrir ou supprimer un dossier. La suppression efface définitivement toutes les données du dossier (écritures, factures, tiers, banque…).</div>
    <table><thead><tr><th>Nom</th><th>Forme</th><th>Ville</th><th>SIREN</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function ouvrirDossierDepuisGestion(id){ if(typeof choisirDossier==='function') choisirDossier(id); }

function supprimerDossier(id){
  const d=(db.cabinet&&db.cabinet.dossiers)?db.cabinet.dossiers.find(x=>x.id===id):null;
  const nom=d?d.nom:((db.dossiersData&&db.dossiersData[id]&&db.dossiersData[id].societe&&db.dossiersData[id].societe.dossierNom)||id);
  if(!confirm("Supprimer définitivement le dossier « "+nom+" » ?\n\nToutes ses données (écritures, factures, tiers, banque…) seront perdues. Cette action est irréversible.")) return;
  const etaitActif = (db.activeId===id);
  if(db.cabinet&&db.cabinet.dossiers) db.cabinet.dossiers = db.cabinet.dossiers.filter(x=>x.id!==id);
  if(db.dossiersData) delete db.dossiersData[id];
  if(etaitActif){
    db.activeId=null; connecte=false; if(typeof selRecherche!=='undefined') selRecherche='';
    save(); render(); toast('Dossier « '+nom+' » supprimé');
    return;
  }
  save(); render(); toast('Dossier « '+nom+' » supprimé');
}

/* Greffe : ajoute la carte de gestion en bas de la page Société & création du dossier */
(function(){
  if(typeof pageDossier==='function'){
    const _pd=pageDossier;
    pageDossier=function(){ return _pd()+dossiersGestionCard(); };
  }
})();

</script>

      <td class="r" style="white-space:nowrap">
        <button class="btn btn-gold btn-sm" onclick="iaComptabiliser('${p.id}')">Comptabiliser</button>

      </td></tr>`;
  }).join('');
  return `<div class="card ia-card">
    <div class="ia-head"><span class="ia-spark"></span><b>Assistant IA — propositions fournisseurs (${props.length})</b>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="current='ia';render()">Ouvrir l'Assistant IA →</button></div>

    <table><thead><tr><th>Fournisseur</th><th>Date</th><th>Compte</th><th class="r">HT</th><th class="r">TVA</th><th class="r">TTC</th><th></th></tr></thead>

/* Greffe : panneau IA en bas du module Factures Fournisseurs */
(function(){

<script id="yada-addon19">
/* ============================================================
   YADA — Espace Client
   Vue orientée client regroupant : chiffres clés, dépôt de pièces
   (→ OCR / Assistant IA), gestion commerciale (devis & factures),
   encours & relances, et suivi par client. Réutilise les moteurs
   existants (analytique, TVA, documents, règlements, relances).
   Bloc additif (nouveau module).
   ============================================================ */
function ecTresorerie(){
  const enc=r2(db.reglements.filter(r=>r.sens==='a_encaisser'&&r.statut!=='regle').reduce((s,r)=>s+(+r.restant||0),0));
  const pay=r2(db.reglements.filter(r=>r.sens==='a_payer'&&r.statut!=='regle').reduce((s,r)=>s+(+r.restant||0),0));
  return {enc, pay, net:r2(enc-pay)};
}
function ecEncoursParClient(){
  const map={};
  db.reglements.filter(r=>r.sens==='a_encaisser'&&r.statut!=='regle').forEach(r=>{
    const f=db.factures.find(x=>x.id===r.factureId); if(!f)return; const t=db.tiers.find(x=>x.id===f.tiersId);
    const nom=t?t.nom:'—'; map[nom]=r2((map[nom]||0)+(+r.restant||0));
  });
  return map;
}

function pageEspaceClient(){
  const a=analytique(); const mois=moisDisponibles(); const m=mois[0]||ym(todayStr()); const tva=tvaDuMois(m);
  const tr=ecTresorerie(); const enc=ecEncoursParClient();
  const clients=db.tiers.filter(t=>t.type==='client');

  // Documents récents (devis / factures / avoirs)
  const docs=db.docs.slice().reverse().slice(0,12).map(d=>{ const c=db.tiers.find(x=>x.id===d.clientId);
    return `<tr><td class="num">${d.numero}</td>
      <td><span class="tag ${d.type==='avoir'?'t-avoir':d.type==='devis'?'t-devis':'t-ven'}">${d.type}</span></td>
      <td>${c?c.nom:''}</td><td class="num">${d.date}</td><td class="r num">${eur(d.ttc)}</td>
      <td>${(typeof docEtatTag==='function')?docEtatTag(d):''}</td>
      <td class="r" style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="voirDoc('${d.id}')">Voir</button>
        <button class="btn btn-ghost btn-sm" onclick="telechargerDoc('${d.id}')">PDF</button></td></tr>`;
  }).join('') || '<tr><td colspan="7" class="empty">Aucun document — créez un devis ou une facture.</td></tr>';

  // Suivi par client : CA HT + encours
  const noms=[...new Set([...Object.keys(a.parClient), ...Object.keys(enc)])];
  const suivi=noms.map(nom=>({nom, ca:r2(a.parClient[nom]||0), enc:r2(enc[nom]||0)}))
    .sort((x,y)=>y.ca-x.ca)
    .map(x=>`<tr><td><b>${x.nom}</b></td><td class="r num cre">${eur(x.ca)}</td><td class="r num ${x.enc>0?'deb':''}">${x.enc>0?eur(x.enc):'—'}</td></tr>`).join('')
    || '<tr><td colspan="3" class="empty">Aucun client facturé</td></tr>';

  return head('Espace Client','Vue côté client : ses chiffres clés, le dépôt de ses pièces (qui alimentent l\'OCR et l\'Assistant IA), ses devis & factures, ses encours et relances, et le suivi par client.')+
  flow(['Dépôt de pièces','OCR / Assistant IA','Comptabilité','Devis & factures','Encaissement / relances'])+

  `<div class="grid g4">
    <div class="kpi green"><div class="lbl">Chiffre d'affaires HT</div><div class="val cre">${eur(a.ca)}</div><div class="meta">Comptes 70x</div></div>
    <div class="kpi red"><div class="lbl">Charges HT</div><div class="val deb">${eur(a.achats)}</div><div class="meta">Comptes 60x</div></div>
    <div class="kpi blue"><div class="lbl">Résultat</div><div class="val">${eur(a.resultat)}</div><div class="meta">marge ${a.ca?Math.round(a.resultat/a.ca*100):0}%</div></div>
    <div class="kpi"><div class="lbl">TVA ${moisLabel(m)}</div><div class="val">${eur(tva.aDecaisser||tva.credit)}</div><div class="meta">${tva.aDecaisser?'à décaisser':'crédit à reporter'}</div></div>
  </div>
  <div class="grid g3">
    <div class="kpi green"><div class="lbl">À encaisser (clients)</div><div class="val cre">${eur(tr.enc)}</div></div>
    <div class="kpi red"><div class="lbl">À payer (fournisseurs)</div><div class="val deb">${eur(tr.pay)}</div></div>
    <div class="kpi blue"><div class="lbl">Position nette</div><div class="val">${eur(tr.net)}</div></div>
  </div>

  <div class="card"><h2>Déposer une pièce</h2>
    <div class="sub">Le client dépose ses justificatifs : ils partent en OCR puis dans l'Assistant IA pour générer l'écriture.</div>
    <div class="grid g2">
      <div class="field"><label>Facture / justificatif fournisseur (achat)</label>
        <button class="btn btn-pri" style="width:100%" onclick="dashRoute('achat','pièce déposée')">Déposer une facture fournisseur → OCR / Assistant IA</button></div>
      <div class="field"><label>Document de vente (client)</label>

  <div class="card"><h2>Mes devis & factures</h2>

  (typeof relancesCard==='function'?relancesCard():'')+

  `<div class="card"><h2>Suivi par client</h2><div class="sub">Chiffre d'affaires et encours par client</div>

}

</script>
<script id="yada-addon20">
/* ============================================================
   YADA — Facturation électronique : opérateur relié (PPF / PDP)
   Intégré à la page Facturation client. Simulation conforme à
   l'esprit de la réforme : connexion d'un opérateur agréé,
   transmission des factures, statuts du cycle de vie e-invoicing,
   flux horodaté et génération d'un Factur-X (XML CII) téléchargeable.
   Bloc additif.
   ============================================================ */
const EFACT_ETAPES = ['Déposée','Émise par la plateforme','Mise à disposition du client','Approuvée','Encaissée'];

function efactCfg(){
  if(!db.parametres) db.parametres={};
  if(!db.parametres.efact) db.parametres.efact={operateur:'', idOp:'', mode:'PDP', connecte:false};
  return db.parametres.efact;
}
function efactStatutTag(s){
  if(!s) return '<span class="tag t-att">à transmettre</span>';
  if(s==='Refusée') return '<span class="tag t-ecart">refusée</span>';
  if(s==='Encaissée'||s==='Approuvée') return '<span class="tag t-pay">'+s.toLowerCase()+'</span>';
  return '<span class="tag t-part">'+s.toLowerCase()+'</span>';
}

function efacturationCard(){
  const c=efactCfg();
  const facts=db.docs.filter(d=>d.type==='facture' && d.statut==='valide').slice().reverse();
  const transmises=facts.filter(d=>d.efact).length;

  const config = c.connecte
    ? `<div class="ef-on">
         <div><b>✓ Opérateur relié :</b> ${c.operateur||'(non nommé)'} <span class="mini">— mode ${c.mode}${c.idOp?' · ID '+c.idOp:''}</span></div>
         <button class="btn btn-ghost btn-sm" onclick="efactDeconnecter()">Déconnecter</button>
       </div>`
    : `<div class="row g3">
         <div class="field"><label>Type de plateforme</label><select id="ef-mode">
           <option value="PDP">PDP — Plateforme de Dématérialisation Partenaire</option>
           <option value="PPF">PPF — Portail Public de Facturation</option></select></div>
         <div class="field"><label>Nom de l'opérateur</label><input id="ef-op" placeholder="Ex : mon opérateur agréé"></div>
         <div class="field"><label>Identifiant / SIRET opérateur</label><input id="ef-id" placeholder="N° d'immatriculation"></div>
       </div>
       <div class="right"><button class="btn btn-gold" onclick="efactConnecter()">Relier l'opérateur</button></div>`;

  const rows = facts.map(d=>{ const cl=db.tiers.find(x=>x.id===d.clientId); const s=d.efact?d.efact.statut:'';
    const term = (s==='Encaissée'||s==='Refusée');
    const actions = !c.connecte
      ? `<span class="mini">opérateur non relié</span>`
      : (!d.efact
          ? `<button class="btn btn-gold btn-sm" onclick="efactTransmettre('${d.id}')">Transmettre</button>`
          : `${!term?`<button class="btn btn-ghost btn-sm" onclick="efactAvancer('${d.id}')">▸ Étape suivante</button>
               <button class="btn btn-ghost btn-sm" onclick="efactRefuser('${d.id}')" title="Simuler un refus">✖</button>`:''}
             <button class="btn btn-ghost btn-sm" onclick="efactFlux('${d.id}')">Flux</button>
             <button class="btn btn-ghost btn-sm" onclick="efactXML('${d.id}')">Factur-X</button>`);
    return `<tr><td class="num">${d.numero}</td><td>${cl?cl.nom:''}</td><td class="num">${d.date}</td>
      <td class="r num">${eur(d.ttc)}</td><td>${efactStatutTag(s)}</td>
      <td class="r" style="white-space:nowrap">${actions}</td></tr>`;
  }).join('') || '<tr><td colspan="6" class="empty">Aucune facture validée à transmettre. Validez une facture pour l\'envoyer via l\'opérateur.</td></tr>';

  return `<div class="card"><h2>Facturation électronique — opérateur relié</h2>
    <div class="sub">Connectez votre opérateur agréé (PPF ou PDP) puis transmettez vos factures au format <b>Factur-X</b>. Le cycle de vie (dépôt → mise à disposition → approbation → encaissement) est suivi ici.</div>
    ${config}
    <div class="hint">Réforme de la facturation électronique B2B : un PDF par e-mail ne suffira plus — les factures devront transiter par une <b>plateforme agréée (PPF/PDP)</b> au format structuré (Factur-X / XML). Le calendrier officiel a été décalé plusieurs fois : vérifiez les dates en vigueur avant la mise en production.</div>
    <table style="margin-top:12px"><thead><tr><th>N° facture</th><th>Client</th><th>Date</th><th class="r">TTC</th><th>Statut e-invoice</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table>
    <div class="mini" style="margin-top:8px">${transmises}/${facts.length} facture(s) transmise(s) à l'opérateur.</div>
  </div>`;
}

function efactConnecter(){
  const c=efactCfg();
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  c.mode=g('ef-mode')||'PDP'; c.operateur=g('ef-op'); c.idOp=g('ef-id');
  if(!c.operateur) return toast('Indiquez le nom de l\'opérateur');
  c.connecte=true; save(); render(); toast('Opérateur relié : '+c.operateur+' ('+c.mode+')');
}
function efactDeconnecter(){ const c=efactCfg(); c.connecte=false; save(); render(); toast('Opérateur déconnecté'); }

function efactTransmettre(id){
  const c=efactCfg(); if(!c.connecte) return toast('Reliez d\'abord un opérateur');
  const d=db.docs.find(x=>x.id===id); if(!d) return;
  if(d.statut!=='valide') return toast('La facture doit être validée');
  const now=todayStr();
  d.efact={ statut:'Émise par la plateforme', operateur:c.operateur, mode:c.mode,
    flux:[{etape:'Déposée', date:now},{etape:'Émise par la plateforme', date:now}] };
  save(); render(); toast('Facture '+d.numero+' transmise via '+c.operateur+' (Factur-X)');
}
function efactAvancer(id){
  const d=db.docs.find(x=>x.id===id); if(!d||!d.efact) return;
  const i=EFACT_ETAPES.indexOf(d.efact.statut);
  if(i<0||i>=EFACT_ETAPES.length-1) return;
  const suiv=EFACT_ETAPES[i+1]; d.efact.statut=suiv; d.efact.flux.push({etape:suiv, date:todayStr()});
  save(); render(); toast('Statut e-invoice : '+suiv);
}
function efactRefuser(id){
  const d=db.docs.find(x=>x.id===id); if(!d||!d.efact) return;
  d.efact.statut='Refusée'; d.efact.flux.push({etape:'Refusée par le destinataire', date:todayStr()});
  save(); render(); toast('Facture marquée « refusée » par le destinataire');
}
function efactFlux(id){
  const d=db.docs.find(x=>x.id===id); if(!d||!d.efact) return;
  const items=d.efact.flux.map((f,i)=>`<div class="ef-step ${i===d.efact.flux.length-1?'ef-last':''}">
    <span class="ef-dot"></span><div><b>${f.etape}</b><div class="mini">${frDate?frDate(f.date):f.date}</div></div></div>`).join('');
  document.getElementById('modal-c').innerHTML=`<div class="modal-h"><h3>Flux e-invoice — ${d.numero}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-b"><div class="sub">Opérateur : ${d.efact.operateur||''} (${d.efact.mode||''})</div>
      <div class="ef-timeline">${items}</div></div>`;
  document.getElementById('modal').classList.add('show');
}

/* Génération Factur-X (XML Cross Industry Invoice, profil simplifié) */
function efactXML(id){
  const d=db.docs.find(x=>x.id===id); if(!d) return;
  const s=db.societe||{}; const cl=db.tiers.find(x=>x.id===d.clientId)||{};
  const esc=t=>String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const d2=(d.date||todayStr()).replace(/-/g,'');
  const lignes=(d.lignes||[]).map((l,i)=>{
    const q=+l.qte||1, pu=+l.pu||0, taux=+l.taux||0, ht=r2(q*pu);
    return `    <ram:IncludedSupplyChainTradeLineItem>
      <ram:AssociatedDocumentLineDocument><ram:LineID>${i+1}</ram:LineID></ram:AssociatedDocumentLineDocument>
      <ram:SpecifiedTradeProduct><ram:Name>${esc(l.desc||'Prestation')}</ram:Name></ram:SpecifiedTradeProduct>
      <ram:SpecifiedLineTradeAgreement><ram:NetPriceProductTradePrice><ram:ChargeAmount>${pu.toFixed(2)}</ram:ChargeAmount></ram:NetPriceProductTradePrice></ram:SpecifiedLineTradeAgreement>
      <ram:SpecifiedLineTradeDelivery><ram:BilledQuantity unitCode="C62">${q}</ram:BilledQuantity></ram:SpecifiedLineTradeDelivery>
      <ram:SpecifiedLineTradeSettlement>
        <ram:ApplicableTradeTax><ram:TypeCode>VAT</ram:TypeCode><ram:CategoryCode>S</ram:CategoryCode><ram:RateApplicablePercent>${taux.toFixed(2)}</ram:RateApplicablePercent></ram:ApplicableTradeTax>
        <ram:SpecifiedTradeSettlementLineMonetarySummation><ram:LineTotalAmount>${ht.toFixed(2)}</ram:LineTotalAmount></ram:SpecifiedTradeSettlementLineMonetarySummation>
      </ram:SpecifiedLineTradeSettlement>
    </ram:IncludedSupplyChainTradeLineItem>`;
  }).join('\n');
  const xml=`<?xml version="1.0" encoding="UTF-8"?>
<rsm:CrossIndustryInvoice xmlns:rsm="urn:un:unece:uncefact:data:standard:CrossIndustryInvoice:100" xmlns:ram="urn:un:unece:uncefact:data:standard:ReusableAggregateBusinessInformationEntity:100" xmlns:udt="urn:un:unece:uncefact:data:standard:UnqualifiedDataType:100">
  <rsm:ExchangedDocumentContext>
    <ram:GuidelineSpecifiedDocumentContextParameter><ram:ID>urn:factur-x.eu:1p0:basicwl</ram:ID></ram:GuidelineSpecifiedDocumentContextParameter>
  </rsm:ExchangedDocumentContext>
  <rsm:ExchangedDocument>
    <ram:ID>${esc(d.numero)}</ram:ID>
    <ram:TypeCode>380</ram:TypeCode>
    <ram:IssueDateTime><udt:DateTimeString format="102">${d2}</udt:DateTimeString></ram:IssueDateTime>
  </rsm:ExchangedDocument>
  <rsm:SupplyChainTradeTransaction>
${lignes}
    <ram:ApplicableHeaderTradeAgreement>
      <ram:SellerTradeParty>
        <ram:Name>${esc(s.raison)}</ram:Name>
        <ram:SpecifiedLegalOrganization><ram:ID schemeID="0002">${esc(s.siret||s.siren)}</ram:ID></ram:SpecifiedLegalOrganization>
        <ram:PostalTradeAddress><ram:PostcodeCode>${esc(s.cp)}</ram:PostcodeCode><ram:LineOne>${esc(s.adresse)}</ram:LineOne><ram:CityName>${esc(s.ville)}</ram:CityName><ram:CountryID>FR</ram:CountryID></ram:PostalTradeAddress>
        <ram:SpecifiedTaxRegistration><ram:ID schemeID="VA">${esc(s.tvaIntra)}</ram:ID></ram:SpecifiedTaxRegistration>
      </ram:SellerTradeParty>
      <ram:BuyerTradeParty>
        <ram:Name>${esc(cl.nom)}</ram:Name>
        <ram:SpecifiedLegalOrganization><ram:ID schemeID="0002">${esc(cl.siret||cl.siren||'')}</ram:ID></ram:SpecifiedLegalOrganization>
      </ram:BuyerTradeParty>
    </ram:ApplicableHeaderTradeAgreement>
    <ram:ApplicableHeaderTradeDelivery/>
    <ram:ApplicableHeaderTradeSettlement>
      <ram:InvoiceCurrencyCode>EUR</ram:InvoiceCurrencyCode>
      <ram:ApplicableTradeTax><ram:CalculatedAmount>${(+d.tva||0).toFixed(2)}</ram:CalculatedAmount><ram:TypeCode>VAT</ram:TypeCode><ram:BasisAmount>${(+d.ht||0).toFixed(2)}</ram:BasisAmount></ram:ApplicableTradeTax>
      <ram:SpecifiedTradeSettlementHeaderMonetarySummation>
        <ram:LineTotalAmount>${(+d.ht||0).toFixed(2)}</ram:LineTotalAmount>
        <ram:TaxBasisTotalAmount>${(+d.ht||0).toFixed(2)}</ram:TaxBasisTotalAmount>
        <ram:TaxTotalAmount currencyID="EUR">${(+d.tva||0).toFixed(2)}</ram:TaxTotalAmount>
        <ram:GrandTotalAmount>${(+d.ttc||0).toFixed(2)}</ram:GrandTotalAmount>
        <ram:DuePayableAmount>${(+d.ttc||0).toFixed(2)}</ram:DuePayableAmount>
      </ram:SpecifiedTradeSettlementHeaderMonetarySummation>
    </ram:ApplicableHeaderTradeSettlement>
  </rsm:SupplyChainTradeTransaction>
</rsm:CrossIndustryInvoice>`;
  const blob=new Blob([xml],{type:'application/xml'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=esc(d.numero)+'-facturx.xml'; a.click();
  toast('Factur-X généré : '+d.numero+'-facturx.xml');
}

<script id="yada-addon21">
/* ============================================================
   T1 — Clôture de l'exercice : OD de résultat + report des À-Nouveaux
   Continuité comptable : 1) solder charges/produits (6/7) dans le résultat
   (120 bénéfice / 129 perte) ; 2) reporter les soldes de bilan (classes 1→5)
   au 1ᵉ jour de l'exercice suivant. Écritures équilibrées via posterOD.
   Greffe : carte ajoutée à pageEditions. 100% additif.
   ============================================================ */
(function(){
  if(typeof posterOD!=='function') return;
  const CPT_BEN='120000000', CPT_PER='129000000';
  function jPlus(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  /* soldes par compte (clé c9) sur une plage de dates, pour des classes données */
  function soldesPlage(classes, d0, d1){
    const acc={};
    (db.ecritures||[]).forEach(e=>{ if(d0 && e.date<d0) return; if(d1 && e.date>d1) return;
      (e.lignes||[]).forEach(l=>{ const cl=String(l.compte)[0]; if(classes.indexOf(cl)<0) return;
        const k=c9(l.compte); const a=acc[k]||(acc[k]={d:0,c:0,lib:l.lib||COMPTES[l.compte]||COMPTES[k]||k});
        a.d+=(+l.debit||0); a.c+=(+l.credit||0); }); });
    return acc;
  }
  function libResultat(){ return 'OD RÉSULTAT '+db.societe.exoDebut.slice(0,4); }
  function anStart(){ return jPlus(db.societe.exoFin,1); }
  function libAN(){ return 'À-NOUVEAUX '+anStart().slice(0,4); }
  window.t1ResultatPoste=function(){ return (db.ecritures||[]).some(e=>(e.libelle||'').indexOf(libResultat())>=0); };
  window.t1ANPoste=function(){ return (db.ecritures||[]).some(e=>(e.libelle||'').indexOf(libAN())>=0); };

  window.t1ResultatLignes=function(){
    const s=db.societe; const acc=soldesPlage(['6','7'], s.exoDebut, s.exoFin);
    const lignes=[]; let prod=0, charge=0;
    Object.keys(acc).sort().forEach(k=>{ const a=acc[k]; const solde=r2(a.d-a.c); if(Math.abs(solde)<0.005) return;
      if(solde>0) lignes.push({compte:k, lib:'Solde '+(a.lib||k), debit:0, credit:solde});   // charge → on crédite pour solder
      else lignes.push({compte:k, lib:'Solde '+(a.lib||k), debit:-solde, credit:0});           // produit → on débite pour solder
      if(k[0]==='7') prod+=r2(a.c-a.d); else charge+=r2(a.d-a.c);
    });
    const res=r2(prod-charge);
    if(res>0) lignes.push({compte:CPT_BEN, lib:"Résultat de l'exercice (bénéfice)", debit:0, credit:res});
    else if(res<0) lignes.push({compte:CPT_PER, lib:"Résultat de l'exercice (perte)", debit:-res, credit:0});
    return {lignes, prod:r2(prod), charge:r2(charge), res};
  };
  window.t1ANLignes=function(){
    const acc=soldesPlage(['1','2','3','4','5'], null, db.societe.exoFin);
    const lignes=[]; let td=0, tc=0;
    Object.keys(acc).sort().forEach(k=>{ const a=acc[k]; const sd=r2(a.d-a.c); if(Math.abs(sd)<0.005) return;
      lignes.push({compte:k, lib:'À-nouveau '+(a.lib||k), debit:sd>0?sd:0, credit:sd<0?-sd:0});
      td+=sd>0?sd:0; tc+=sd<0?-sd:0; });
    return {lignes, td:r2(td), tc:r2(tc)};
  };

  window.t1GenererResultat=function(){
    if(t1ResultatPoste()) return toast('OD de résultat déjà générée pour '+db.societe.exoDebut.slice(0,4));
    const R=t1ResultatLignes(); if(!R.lignes.length) return toast('Aucun compte de charge/produit à solder');
    posterOD({date:db.societe.exoFin, libelle:libResultat(), lignes:R.lignes, journal:'OD'});
    save(); render(); toast('OD de résultat générée — '+(R.res>=0?'bénéfice ':'perte ')+eur(Math.abs(R.res)));
  };
  window.t1GenererAN=function(){

  };
  window.t1SupprimerCloture=function(){

    const libs=[libResultat(), libAN()];

    db.ecritures=db.ecritures.filter(e=>ids.indexOf(e.id)<0);

  };

  window.t1Card=function(){
    const R=t1ResultatLignes(); const A=t1ANLignes();
    const resPoste=t1ResultatPoste(), anPoste=t1ANPoste();

      <div class="sub">Continuité comptable : 1) solder les comptes de charges/produits dans le résultat (120 bénéfice / 129 perte) ; 2) reporter les soldes de bilan (classes 1→5) au 1ᵉ jour de l'exercice suivant (${anStart().slice(0,4)}). Écritures équilibrées générées en journal OD.</div>
      <div class="grid g3" style="margin-bottom:10px">

        <div class="kpi blue"><div class="lbl">Résultat ${db.societe.exoDebut.slice(0,4)}</div><div class="val">${eur(R.res)}</div><div class="meta">${R.res>=0?'bénéfice (120)':'perte (129)'}</div></div>
      </div>

        ${(resPoste||anPoste)?`<button class="btn btn-ghost btn-sm" onclick="t1SupprimerCloture()">Annuler la clôture</button>`:''}
      </div>
      <div class="hint">Report d'ouverture N+1 : Σ débit ${eur(A.td)} = Σ crédit ${eur(A.tc)} ${eqAN?'✓ équilibré':'(générez le résultat avant)'}. Les à‑nouveaux apparaissent dans l'exercice ${anStart().slice(0,4)} (Consultation, Journal, Balance).</div>

<script id="yada-addon22">
/* ============================================================
   T2 — Cohérence des comptes (TVA) : normalisation c9 (9 chiffres)
   Problème résolu : les factures alimentaient 44571/44566 (codes courts)
   tandis que l'OD TVA soldait 445710000/445660000 — comptes distincts en
   stockage → la déclaration ne soldait pas réellement les comptes de TVA.
   Solution : normaliser TOUS les comptes d'écriture en c9. Après quoi
   44571→445710000 = compte de l'OD TVA, donc l'OD solde réellement la TVA.
   100% additif (+ 1 correctif chirurgical du solde banque, ligne ~3390).
   ============================================================ */
(function(){
  if(typeof c9!=='function') return;
  function normDS(){ /* normalise le dataset courant (db.*) */
    (db.ecritures||[]).forEach(e=>(e.lignes||[]).forEach(l=>{ if(l && l.compte!=null) l.compte=c9(l.compte); }));
    (db.banque||[]).forEach(b=>{ if(b && b.compte!=null) b.compte=c9(b.compte); });
  }
  window.t2Normaliser=normDS;
  /* Migration unique : dossier actif + tous les autres dossiers du portefeuille */
  (function migrate(){ try{
    normDS();
    if(db.dossiersData) Object.keys(db.dossiersData).forEach(id=>{ const d=db.dossiersData[id]; if(!d) return;
      (d.ecritures||[]).forEach(e=>(e.lignes||[]).forEach(l=>{ if(l && l.compte!=null) l.compte=c9(l.compte); }));
      (d.banque||[]).forEach(b=>{ if(b && b.compte!=null) b.compte=c9(b.compte); }); });
  }catch(e){} })();
  /* Normalisation continue : à chaque enregistrement (toute source d'écriture) */
  if(typeof save==='function'){ const _s=save; save=function(){ try{ normDS(); }catch(e){} return _s.apply(this,arguments); }; }
  /* tvaDuMois : comparer en c9 (44571→445710000, 44566→445660000, 44562→445620000) */
  if(typeof tvaDuMois==='function'){
    tvaDuMois=function(m){ let col=0,ded=0;
      (db.ecritures||[]).filter(e=>ym(e.date)===m && e.journal!=='BQ').forEach(e=>e.lignes.forEach(l=>{
        const k=c9(l.compte);
        if(k==='445710000') col+=(+l.credit||0);
        if(k==='445660000'||k==='445620000') ded+=(+l.debit||0);
      }));
      col=r2(col); ded=r2(ded); const net=r2(col-ded);
      return {col, ded, net, aDecaisser:net>0?net:0, credit:net<0?-net:0};
    };
  }
  /* Verrouille la migration en mémoire dans le stockage */
  try{ if(typeof save==='function') save(); }catch(e){}
})();
</script>

<script id="yada-addon23">
/* ============================================================
   T4 — États de synthèse : Bilan + Compte de résultat
   Calculés depuis les soldes (comptes normalisés c9). Le compte de résultat
   est calculé HORS « OD RÉSULTAT » (valable avant comme après clôture).
   Le bilan est toujours équilibré (Actif = Passif), le résultat non encore
   affecté en 120/129 étant ajouté en capitaux propres. Greffe : carte +
   états imprimables dans la page Éditions. 100% additif.
   ============================================================ */
(function(){
  if(typeof pageEditions!=='function' || typeof sageNum!=='function') return;
  const S=()=>db.societe;
  function soldes(classes, d0, d1, excludeLib){
    const acc={};
    (db.ecritures||[]).forEach(e=>{ if(d0&&e.date<d0)return; if(d1&&e.date>d1)return;
      if(excludeLib && (e.libelle||'').indexOf(excludeLib)>=0) return;
      (e.lignes||[]).forEach(l=>{ const cl=String(l.compte)[0]; if(classes.indexOf(cl)<0)return;
        const k=c9(l.compte); const a=acc[k]||(acc[k]={d:0,c:0,lib:l.lib||COMPTES[l.compte]||COMPTES[k]||k});
        a.d+=(+l.debit||0); a.c+=(+l.credit||0); }); });
    return acc;
  }
  function netCredit(code){ let n=0; (db.ecritures||[]).forEach(e=>{ if(e.date>S().exoFin)return;
    (e.lignes||[]).forEach(l=>{ if(c9(l.compte)===code) n+=(+l.credit||0)-(+l.debit||0); }); }); return r2(n); }

  function etatCR(){
    const acc=soldes(['6','7'], S().exoDebut, S().exoFin, 'OD RÉSULTAT');
    const prod=[], charge=[]; let tp=0,tc=0;
    Object.keys(acc).sort().forEach(k=>{ const a=acc[k];
      if(k[0]==='7'){ const v=r2(a.c-a.d); if(Math.abs(v)>0.005){ prod.push({k,lib:a.lib,v}); tp+=v; } }
      else { const v=r2(a.d-a.c); if(Math.abs(v)>0.005){ charge.push({k,lib:a.lib,v}); tc+=v; } } });
    return {prod, charge, tp:r2(tp), tc:r2(tc), res:r2(tp-tc)};
  }
  function etatBilan(){
    const acc=soldes(['1','2','3','4','5'], null, S().exoFin);
    const actif=[], passif=[]; let ta=0,tp=0;
    Object.keys(acc).sort().forEach(k=>{ const a=acc[k]; const sd=r2(a.d-a.c); if(Math.abs(sd)<0.005)return;
      if(sd>0){ actif.push({k,lib:a.lib,v:sd}); ta+=sd; } else { passif.push({k,lib:a.lib,v:-sd}); tp+=(-sd); } });
    const cr=etatCR();
    const resDejaBooked=r2(netCredit('120000000')+netCredit('129000000'));
    const resAjout=r2(cr.res-resDejaBooked);
    const totP=r2(tp + (Math.abs(resAjout)>0.005?resAjout:0));
    return {actif, passif, ta:r2(ta), tp:r2(tp), totP, res:cr.res, resAjout};
  }

  function crDocHTML(){
    const C=etatCR(); const f=v=>sageNum(v);
    const ch=C.charge.map(x=>`<tr><td class="l cpt">${x.k}</td><td class="l">${x.lib}</td><td>${f(x.v)}</td></tr>`).join('');
    const pr=C.prod.map(x=>`<tr><td class="l cpt">${x.k}</td><td class="l">${x.lib}</td><td>${f(x.v)}</td></tr>`).join('');
    return `<div class="doc-page">
      <div class="doc-h1"><span class="doc-soc">${S().raison}</span><span>page</span></div>
      <div class="doc-title">COMPTE DE RÉSULTAT</div>${docEnteteCourte()}
      <table class="doc-t"><thead><tr><th class="l">Compte</th><th class="l">CHARGES (classe 6)</th><th>Montant</th></tr></thead><tbody>${ch||'<tr><td colspan=3 style="text-align:center;padding:8px">—</td></tr>'}
        <tr class="tg"><td></td><td class="l">Total des charges</td><td>${f(C.tc)}</td></tr></tbody></table>
      <table class="doc-t" style="margin-top:14px"><thead><tr><th class="l">Compte</th><th class="l">PRODUITS (classe 7)</th><th>Montant</th></tr></thead><tbody>${pr||'<tr><td colspan=3 style="text-align:center;padding:8px">—</td></tr>'}
        <tr class="tg"><td></td><td class="l">Total des produits</td><td>${f(C.tp)}</td></tr></tbody></table>
      <div class="doc-res">${C.res>=0?'Bénéfice':'Perte'} de l'exercice : ${f(Math.abs(C.res))} Euros</div>
      <div class="doc-foot">${S().raison}</div></div>`;
  }
  function bilanDocHTML(){
    const B=etatBilan(); const f=v=>sageNum(v);
    const arows=B.actif.map(x=>`<tr><td class="l cpt">${x.k}</td><td class="l">${x.lib}</td><td>${f(x.v)}</td></tr>`).join('');
    let prows=B.passif.map(x=>`<tr><td class="l cpt">${x.k}</td><td class="l">${x.lib}</td><td>${f(x.v)}</td></tr>`).join('');
    if(Math.abs(B.resAjout)>0.005) prows+=`<tr><td class="l"></td><td class="l"><b>Résultat de l'exercice (à affecter)</b></td><td>${f(B.resAjout)}</td></tr>`;
    return `<div class="doc-page">
      <div class="doc-h1"><span class="doc-soc">${S().raison}</span><span>page</span></div>
      <div class="doc-title">BILAN</div>${docEnteteCourte()}
      <table class="doc-t"><thead><tr><th class="l">Compte</th><th class="l">ACTIF</th><th>Net</th></tr></thead><tbody>${arows||'<tr><td colspan=3 style="text-align:center;padding:8px">—</td></tr>'}
        <tr class="tg"><td></td><td class="l">TOTAL ACTIF</td><td>${f(B.ta)}</td></tr></tbody></table>
      <table class="doc-t" style="margin-top:14px"><thead><tr><th class="l">Compte</th><th class="l">PASSIF</th><th>Net</th></tr></thead><tbody>${prows||'<tr><td colspan=3 style="text-align:center;padding:8px">—</td></tr>'}
        <tr class="tg"><td></td><td class="l">TOTAL PASSIF</td><td>${f(B.totP)}</td></tr></tbody></table>
      <div class="doc-res">${Math.abs(B.ta-B.totP)<0.01?'Bilan équilibré ✓ (Actif = Passif)':'Écart de bilan : '+f(Math.abs(B.ta-B.totP))}</div>
      <div class="doc-foot">${S().raison}</div></div>`;
  }
  window.t4Afficher=function(kind){
    const html=kind==='bilan'?bilanDocHTML():crDocHTML();
    try{ lastDocHTML='<div class="doc">'+html+'</div>'; }catch(e){}
    const pv=document.getElementById('doc-preview'); if(pv) pv.innerHTML='<div class="doc">'+html+'</div>';
    toast(kind==='bilan'?'Bilan généré':'Compte de résultat généré');
  };
  window.t4Card=function(){
    const C=etatCR(); const B=etatBilan(); const eq=Math.abs(B.ta-B.totP)<0.01;
    return `<div class="card"><h2>États de synthèse — Bilan & Compte de résultat</h2>
      <div class="sub">Calculés depuis les soldes (comptes normalisés c9). Le compte de résultat est établi hors « OD RÉSULTAT » (valable avant comme après clôture). Le bilan est équilibré : le résultat non encore affecté en 120/129 est ajouté en capitaux propres.</div>
      <div class="grid g3" style="margin-bottom:10px">
        <div class="kpi green"><div class="lbl">Total produits (7)</div><div class="val cre">${eur(C.tp)}</div></div>
        <div class="kpi red"><div class="lbl">Total charges (6)</div><div class="val deb">${eur(C.tc)}</div></div>
        <div class="kpi blue"><div class="lbl">Résultat</div><div class="val">${eur(C.res)}</div></div>
      </div>
      <div class="docbar">
        <button class="btn btn-gold" onclick="t4Afficher('cr')">Générer le compte de résultat</button>
        <button class="btn btn-gold" onclick="t4Afficher('bilan')">Générer le bilan</button>
        <span style="margin-left:auto"></span>
        <button class="btn btn-pri" onclick="imprimerDoc()">Imprimer / PDF</button>
      </div>
      <div class="hint">Total actif ${eur(B.ta)} · total passif ${eur(B.totP)} — ${eq?'équilibré ✓':'écart à vérifier'}.</div>
    </div>`;
  };
  const _p=pageEditions; pageEditions=function(){ return _p()+t4Card(); };
})();
</script>

<script id="yada-addon24">
/* ============================================================
   T3 — Lettrage unifié
   Moteur de lettrage commun (champ l.lettre), avec contrôle d'équilibre
   Σ débit = Σ crédit. Branché sur l'éditeur d'écritures (colonne L) :
   on clique les lignes du compte à rapprocher, puis « Lettrer ». Le même
   champ l.lettre est utilisé par le compte auxiliaire (données partagées).
   100% additif.
   ============================================================ */
(function(){
  if(typeof c9!=='function') return;
  function lineOf(ref){ const e=(db.ecritures||[]).find(x=>x.id===ref.e); return e? e.lignes[ref.i] : null; }
  window.lzProchaineLettre=function(cptC9){ const used={};
    (db.ecritures||[]).forEach(e=>e.lignes.forEach(l=>{ if(c9(l.compte)===cptC9 && l.lettre) used[l.lettre]=1; }));
    for(let i=0;i<26;i++){ const x=String.fromCharCode(65+i); if(!used[x]) return x; }
    for(let i=0;i<26;i++)for(let j=0;j<26;j++){ const x=String.fromCharCode(65+i)+String.fromCharCode(65+j); if(!used[x]) return x; }
    return '?'; };
  window.lzLettrer=function(refs){
    if(!refs||refs.length<2){ toast('Sélectionnez au moins deux lignes à lettrer'); return false; }
    let d=0,c=0; const ls=[]; refs.forEach(r=>{ const l=lineOf(r); if(l){ ls.push(l); d+=(+l.debit||0); c+=(+l.credit||0); } });
    if(ls.length<2){ toast('Lignes introuvables'); return false; }
    if(Math.abs(r2(d-c))>=0.005){ toast('Lettrage impossible : débit ('+eur(r2(d))+') ≠ crédit ('+eur(r2(c))+')'); return false; }
    const cpt=c9(ls[0].compte); const L=lzProchaineLettre(cpt);
    ls.forEach(l=>l.lettre=L); save(); toast('Lettrage '+L+' — '+eur(r2(d))+' équilibré'); return true;
  };
  window.lzDelettrer=function(refs){ let n=0; (refs||[]).forEach(r=>{ const l=lineOf(r); if(l&&l.lettre){ l.lettre=''; n++; } }); if(n){ save(); toast(n+' ligne(s) délettrée(s)'); } return n; };

  /* ---- intégration éditeur d'écritures (colonne L cliquable) ---- */
  if(typeof ecRender==='function'){
    window.ecSel = window.ecSel || [];
    window.ecToggleSel=function(key){ const i=ecSel.indexOf(key); if(i>=0) ecSel.splice(i,1); else ecSel.push(key); ecRender(); };
    window.ecLettrerSel=function(){ const refs=ecSel.map(k=>{const p=k.split('|');return {e:p[0],i:+p[1]};}); if(lzLettrer(refs)){ ecSel=[]; ecRender(); } };
    window.ecDelettrerSel=function(){ const refs=ecSel.map(k=>{const p=k.split('|');return {e:p[0],i:+p[1]};}); lzDelettrer(refs); ecSel=[]; ecRender(); };
    if(typeof ouvrirEcrituresCompte==='function'){ const _o=ouvrirEcrituresCompte; ouvrirEcrituresCompte=function(code){ window.ecSel=[]; return _o(code); }; }
    const _er=ecRender;
    ecRender=function(){
      _er();
      try{
        const win=document.getElementById('ec-win'); if(!win) return;
        const tb=win.querySelector('.ec-toolbar');
        if(tb && !win.querySelector('.ec-letbar')){
          const bar=document.createElement('div'); bar.className='ec-letbar'; const n=(window.ecSel||[]).length;
          bar.innerHTML='<span class="ec-llbl">Lettrage :</span>'
            +'<button class="ec-lbtn" onclick="ecLettrerSel()">Lettrer la sélection'+(n?(' ('+n+')'):'')+'</button>'
            +'<button class="ec-lbtn" onclick="ecDelettrerSel()">Délettrer</button>'
            +'<span class="ec-lhint">Cliquez les lignes de ce compte à rapprocher (Σ débit = Σ crédit), puis « Lettrer ».</span>';
          tb.parentNode.insertBefore(bar, tb.nextSibling);
        }
        const list=ecEcritures(); const flat=[];
        list.forEach(e=>e.lignes.forEach((l,i)=>flat.push({e:e.id,i,mine:ecMatch(l.compte,ecCode)})));
        const rows=win.querySelectorAll('.ec-table tbody tr.ec-r');
        rows.forEach((tr,idx)=>{ const f=flat[idx]; if(!f||!f.mine) return; const key=f.e+'|'+f.i;
          if((window.ecSel||[]).indexOf(key)>=0) tr.classList.add('ec-lsel');
          tr.style.cursor='pointer';
          tr.addEventListener('click', function(ev){ const tg=ev.target; if(tg && (tg.tagName==='INPUT'||tg.tagName==='BUTTON')) return; ecToggleSel(key); });
        });
      }catch(e){}
    };
  }
})();
</script>

<script id="yada-addon25">
/* ============================================================
   Règlements ↔ Banque : un règlement génère l'écriture de trésorerie
   Avant : « Validé ✓ » changeait le statut sans mouvement 512 → la
   créance (411) / dette (401) restait ouverte. Désormais : encaissement
   client = crédit 411 / débit 512 ; paiement fournisseur = débit 401 /
   crédit 512, puis lettrage de la facture. Continuité trésorerie garantie.
   100% additif (override de marquerRegle / ecart).
   ============================================================ */
(function(){
  if(typeof posterBanque!=='function' || typeof db==='undefined') return;
  function regInfo(r){ const f=(db.factures||[]).find(x=>x.id===r.factureId); const t=f?(db.tiers||[]).find(x=>x.id===f.tiersId):null; return {f,t}; }
  function passerBanqueReglement(r, montant, libPrefixe){
    const {f,t}=regInfo(r); if(!f) return null;
    const client = r.sens==='a_encaisser';
    const compte = client?'411':'401';
    const sens = client?'C':'D';   // encaissement client : crédit 411 ; paiement fournisseur : débit 401
    const rec=posterBanque({ mois:ym(todayStr()), jour:(+todayStr().slice(8,10))||1, compte,
      libelle:(libPrefixe||(client?'ENCAISSEMENT ':'PAIEMENT '))+(t?t.nom:'')+' '+f.numero,
      sens, montant:r2(montant), suivi:(typeof nextNum==='function'?nextNum('BQ'):''), tiersId:f.tiersId });
    if(typeof lettrer==='function' && rec) lettrer(rec.id, f.id, r2(montant));
    return rec;
  }
  window.marquerRegle=function(id){
    const r=(db.reglements||[]).find(x=>x.id===id); if(!r) return; const {f}=regInfo(r); if(!f) return;
    const montant=r2(r.restant>0?r.restant:f.ttc);
    if(montant<=0.005){ r.statut='regle'; r.restant=0; save(); render(); return; }
    passerBanqueReglement(r, montant);
    if(!(typeof lettrer==='function')){ r.statut='regle'; r.regle=f.ttc; r.restant=0; r.echelonne=false; }
    r.notes=r.notes||[]; r.notes.push('Paiement validé le '+todayStr()+' — écriture banque (512) générée ('+eur(montant)+')');
    save(); render(); toast('Règlement validé ✓ — écriture de banque (512) générée');
  };
  window.ecart=function(id){
    const r=(db.reglements||[]).find(x=>x.id===id); if(!r) return; const {f}=regInfo(r); if(!f) return;
    const part=prompt('Montant déjà réglé (paiement partiel / échelonné) :', r2((r.restant||f.ttc)/2)); if(part===null) return;
    let m=r2(+part||0); if(m<=0) return toast('Montant invalide'); if(m>r.restant+0.005) m=r.restant;

(function(){

  COMPTES['675000000']=COMPTES['675000000']||"Valeurs comptables des éléments d'actif cédés";

<script id="yada-addon36">
/* ============================================================
   Cohérence des KPI de synthèse : Tableau de bord & Espace Client
   alignent CA / Charges / Résultat sur les ÉCRITURES (classe 7/6, hors
   « OD RÉSULTAT ») — comme le Compte de résultat. Avant, ces KPI lisaient
   les factures (`analytique()`) et ignoraient paie/dotations/frais bancaires.
   L'Analytique reste basé sur les factures (analyse par pièce). 100% additif.
   ============================================================ */
(function(){
  if(typeof c9!=='function') return;
  function resEcr(){ let prod=0,ch=0; (db.ecritures||[]).forEach(e=>{ if((e.libelle||'').indexOf('OD RÉSULTAT')>=0) return;
    e.lignes.forEach(l=>{ const cl=c9(l.compte)[0]; if(cl==='7') prod+=(+l.credit||0)-(+l.debit||0); if(cl==='6') ch+=(+l.debit||0)-(+l.credit||0); }); });
    prod=r2(prod); ch=r2(ch); return {ca:prod, ch:ch, res:r2(prod-ch)}; }
  window.resEcritures=resEcr;
  function setKpi(h, marker, val){ const i=h.indexOf(marker); if(i<0) return h; const s=i+marker.length; const e=h.indexOf('</div>', s); if(e<0) return h; return h.slice(0,s)+val+h.slice(e); }
  function alignKpi(h){ const x=resEcr();
    h=setKpi(h, "affaires HT</div><div class=\"val cre\">", eur(x.ca));     // CA (dashboard / espace client)

(function(){

  var CLIENT_DOSSIER='d-ama'; /* dossier exclusif du portail Client */

  var KR='yada-remember';
  function ssGet(k){ try{ return sessionStorage.getItem(k); }catch(e){ return null; } }

<script id="yada-addon44">
/* Dépôts de factures — workflow d'approbation cabinet.
   Client dépose (Facturation=vente / Achats=achat) → notification cabinet →
   le cabinet valide la RÉCEPTION puis la COMPTABILISATION (saisie auto via
   posterFacture). Doublon repéré dès la réception (même fichier dans le
   dossier) : vert = unique, rouge = doublon. Visible côté client et cabinet. */
(function(){
  if(typeof render!=='function') return;
  function gstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.pieces))db.parametres.pieces=[]; return db.parametres.pieces; }
  function dstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.depots))db.parametres.depots=[]; return db.parametres.depots; }
  function nstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.notifsDepot))db.parametres.notifsDepot=[]; return db.parametres.notifsDepot; }
  function normName(n){ return String(n||'').trim().toLowerCase(); }
  function gico(p){ var n=(p&&p.nom||'').toLowerCase(); var m=(p&&p.mime||''); if(m.indexOf('pdf')>=0||n.endsWith('.pdf'))return ''; if(m.indexOf('image')>=0||/\.(jpe?g|png|gif|webp)$/.test(n))return ''; return ''; }
  function markNotifLu(depotId){ nstore().forEach(function(n){ if(n.depotId===depotId)n.lu=true; }); }
  function notifNonLus(cat){ return nstore().filter(function(n){ return !n.lu && (!cat||n.cat===cat); }).length; }
  window.depotNotifNonLus=notifNonLus;
  window.notifMarquerLu=function(cat){ nstore().forEach(function(n){ if(!cat||n.cat===cat)n.lu=true; }); save(); render(); };

  /* Dépôt par le client : fichier → pièce + dépôt + notification cabinet (+ contrôle doublon) */
  window.factDepotAdd=function(file,cat){ return new Promise(function(res){ var r=new FileReader();
    r.onload=function(){ try{
      var nom=file.name;
      var dup=gstore().some(function(p){ return p.cat===cat && normName(p.nom)===normName(nom); });
      var piece={ id:uid(), nom:nom, mime:file.type||'', taille:file.size||0, data:r.result, date:todayStr(), cat:cat };
      gstore().push(piece);
      var dep={ id:uid(), cat:cat, fichierId:piece.id, nom:nom, date:todayStr(), statut:'deposee',
        doublon:dup, doublonRaison:dup?('Fichier « '+nom+' » déjà déposé dans le dossier'):'',
        tiersId:'', numero:'', dateFacture:'', ht:0, tva:0, ttc:0, taux:20, ecritureId:null, factureId:null };
      dstore().push(dep);
      nstore().push({ id:uid(), date:todayStr(), cat:cat, depotId:dep.id, nom:nom, doublon:dup, lu:false });
      save(); res(true);
    }catch(e){ toast('Fichier trop volumineux'); res(false); } };
    r.onerror=function(){res(false);}; r.readAsDataURL(file); }); };

  function statutTagDep(s){
    if(s==='recue')return '<span class="tag t-part">réception validée</span>';
    if(s==='comptabilisee')return '<span class="tag t-pay">comptabilisée ✓</span>';
    if(s==='refusee')return '<span class="tag t-late">refusée</span>';
    return '<span class="tag t-att">déposée · à valider</span>';
  }

  /* Liste de réception (client ou cabinet), colorée vert/rouge */
  window.depotsListe=function(cat,role){
    var deps=dstore().filter(function(d){return d.cat===cat;}).slice().reverse();
    if(!deps.length) return '<div class="hint">Aucune facture déposée pour l\'instant.</div>';
    var tiersList=(db.tiers||[]).filter(function(t){return t.type===(cat==='achat'?'fournisseur':'client');});
    return deps.map(function(d){
      var cls=d.doublon?'dep-dup':'dep-ok';
      var dbl=d.doublon?' <span class="tag t-late" title="'+String(d.doublonRaison||'').replace(/"/g,'&quot;')+'">doublon</span>':' <span class="tag t-pay">✓ unique</span>';
      var file=d.fichierId?'<button class="btn btn-ghost btn-xs" onclick="gedVoir(\''+d.fichierId+'\')">Ouvrir</button> <button class="btn btn-ghost btn-xs" onclick="gedDl(\''+d.fichierId+'\')">⤓</button>':'';
      var info=(d.statut==='comptabilisee')?(' <span class="ged-mt">'+(d.numero||'')+' · '+eur(d.ttc)+'</span>'):'';
      var actions='';
      if(role==='cabinet'){
        if(d.statut==='deposee') actions='<button class="btn btn-gold btn-xs" onclick="depotRecevoir(\''+d.id+'\')">✔ Valider la réception</button> <button class="btn btn-ghost btn-xs" onclick="depotRefuser(\''+d.id+'\')">Refuser</button>';
        else if(d.statut==='recue') actions='<button class="btn btn-ghost btn-xs" onclick="depotRefuser(\''+d.id+'\')">Refuser</button>';

        +'<span style="white-space:nowrap">'+file+(actions?(' '+actions):'')+'</span></div>';
      if(role==='cabinet' && d.statut==='recue'){
        var opts=tiersList.map(function(t){return '<option value="'+t.id+'">'+t.nom+'</option>';}).join('')||'<option value="">— aucun tiers —</option>';
        row+='<div class="dep-cmp"><div class="row g4">'

          +'<div class="field"><label>TVA %</label><select id="cmp-taux-'+d.id+'"><option>20</option><option>10</option><option>5.5</option><option>0</option></select></div>'
          +'<div></div><div></div>'
          +'<div class="field" style="align-self:end"><button class="btn btn-pri" style="width:100%" onclick="depotComptabiliser(\''+d.id+'\')">Valider la comptabilisation</button></div>'
          +'</div></div>';
      }
      return row;
    }).join('');
  };

  /* Actions cabinet */
  window.depotRecevoir=function(id){ var d=dstore().find(function(x){return x.id===id;}); if(!d)return; if(d.statut!=='deposee')return; d.statut='recue'; markNotifLu(id); save(); toast('Réception validée — comptabilisez la facture.'); render(); };
  window.depotRefuser=function(id){ var d=dstore().find(function(x){return x.id===id;}); if(!d)return; if(d.statut==='comptabilisee')return toast('Déjà comptabilisée.'); if(!confirm('Refuser ce dépôt ?'))return; d.statut='refusee'; markNotifLu(id); save(); toast('Dépôt refusé.'); render(); };
  window.depotComptabiliser=function(id){ var d=dstore().find(function(x){return x.id===id;}); if(!d)return;
    if(d.statut==='comptabilisee')return toast('Déjà comptabilisée.');
    if(d.statut!=='recue')return toast('Validez d\'abord la réception.');
    var g=function(x){return document.getElementById(x);};
    var tiersId=(g('cmp-tiers-'+id)||{}).value||'';
    var numero=(g('cmp-num-'+id)||{}).value||'';
    var date=(g('cmp-date-'+id)||{}).value||d.date;
    var ttc=+((g('cmp-ttc-'+id)||{}).value)||0;
    var taux=+((g('cmp-taux-'+id)||{}).value)||20;
    if(!tiersId)return toast(d.cat==='achat'?'Sélectionnez le fournisseur':'Sélectionnez le client');
    if(ttc<=0)return toast('Indiquez le montant TTC');
    var t=(db.tiers||[]).find(function(x){return x.id===tiersId;}); if(!t)return toast('Tiers introuvable.');
    var contre=t.compteContre||(d.cat==='achat'?'606000':'706000');
    var tva=(d.cat==='achat'?'44566':'44571');
    var f=posterFacture({ type:d.cat, tiersId:tiersId, date:date, base:ttc, baseEst:'TTC', taux:taux, compteContre:contre, compteTVA:tva, numero:(numero||undefined), source:'depot' });
    d.statut='comptabilisee'; d.tiersId=tiersId; d.numero=f.numero; d.dateFacture=date; d.ttc=f.ttc; d.ht=f.ht; d.tva=f.tva; d.taux=taux; d.ecritureId=f.ecritureId; d.factureId=f.id; markNotifLu(id);
    save(); toast('Facture '+f.numero+' comptabilisée ('+(d.cat==='achat'?'journal ACH':'journal VTE')+').'); render(); };

  /* Action client */
  window.depotSupprimer=function(id){ var s=dstore(); var i=s.findIndex(function(x){return x.id===id;}); if(i<0)return;
    if(s[i].statut!=='deposee')return toast('Déjà traitée par le cabinet — non supprimable.');
    if(!confirm('Retirer ce dépôt ?'))return;
    var fid=s[i].fichierId; if(fid){ var gp=gstore(); var j=gp.findIndex(function(p){return p.id===fid;}); if(j>=0)gp.splice(j,1); }
    markNotifLu(id); s.splice(i,1); save(); render(); };

  /* Carte de dépôt côté CLIENT (zone glisser-déposer + liste colorée) */
  window.depotFacturesCard=function(cat,titre,sub){
    return '<div class="card"><h2>'+titre+'</h2><div class="sub">'+sub+' Chaque dépôt notifie votre cabinet ; un doublon s\'affiche en rouge. La réception et la comptabilisation sont validées par le cabinet.</div>'
      +'<div class="ged-drop" onclick="factPick(\''+cat+'\')" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="factDrop(event,\''+cat+'\')">'
      +'<div style="font-size:24px"></div><div style="font-weight:700">Déposez vos factures ici</div><div class="hint">ou cliquez — PDF, JPG, PNG</div>'
      +'<input type="file" id="fdep-'+cat+'" hidden multiple accept=".pdf,.jpg,.jpeg,.png,image/*" onchange="factFile(event,\''+cat+'\')"></div>'
      +depotsListe(cat,'client')+'</div>';
  };

  /* Carte de réception côté CABINET (liste + notification + validation) */
  window.depotsCabinetCard=function(cat){
    var titre=cat==='achat'?'Factures fournisseurs déposées par le client':'Factures client déposées par le client';
    var n=notifNonLus(cat);
    var ban=n?'<div class="dep-notif">'+n+' nouveau(x) dépôt(s) du client à traiter <button class="btn btn-ghost btn-xs" onclick="notifMarquerLu(\''+cat+'\')">Marquer comme lu</button></div>':'';
    return '<div class="card"><h2>'+titre+'</h2><div class="sub">Validez la <b>réception</b> puis la <b>comptabilisation</b> (saisie). Vert = unique · Rouge = doublon repéré dans le dossier.</div>'+ban+depotsListe(cat,'cabinet')+'</div>';
  };

  /* Greffes : afficher la réception côté cabinet sous Facturation (vente) et Achats (achat) */
  if(typeof pageFacturation==='function'){ var _f=pageFacturation; pageFacturation=function(){ var h=_f(); if((window.sessionRole||'cabinet')!=='client') h+=depotsCabinetCard('vente'); return h; }; }
  if(typeof pageAchats==='function'){ var _a=pageAchats; pageAchats=function(){ var h=_a(); if((window.sessionRole||'cabinet')!=='client') h+=depotsCabinetCard('achat'); return h; }; }

  /* Pastille de notification sur le menu cabinet (Facturation / Achats) */
  function addBadge(nav,lblPart,n){ if(!n)return; var btns=nav.querySelectorAll('.nav-btn'); for(var i=0;i<btns.length;i++){ if((btns[i].textContent||'').indexOf(lblPart)>=0){ var s=document.createElement('span'); s.className='nav-badge-dep'; s.textContent=n; btns[i].appendChild(s); break; } } }
  if(typeof buildNav==='function'){ var _bn=buildNav; buildNav=function(){ var r=_bn.apply(this,arguments);
    try{ if((window.sessionRole||'cabinet')!=='client'){ var nav=document.getElementById('nav'); if(nav){ addBadge(nav,'Facturation client',notifNonLus('vente')); addBadge(nav,'Factures fournisseurs',notifNonLus('achat')); } } }catch(e){}
    return r; }; }
})();

<script id="yada-addon45">
/* Fournisseur inconnu → fiche d'information.
   Au dépôt d'une facture d'achat, le client indique le fournisseur ; s'il est
   « inconnu / nouveau », une fiche d'information est demandée (proposition

   valide → création du fournisseur (db.tiers) puis comptabilisation du dépôt. */
(function(){
  if(typeof render!=='function') return;
  function gstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.pieces))db.parametres.pieces=[]; return db.parametres.pieces; }
  function dstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.depots))db.parametres.depots=[]; return db.parametres.depots; }
  function nstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.notifsDepot))db.parametres.notifsDepot=[]; return db.parametres.notifsDepot; }
  function fstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.fichesTiers))db.parametres.fichesTiers=[]; return db.parametres.fichesTiers; }
  function normName(n){ return String(n||'').trim().toLowerCase(); }
  function v(s){ return String(s||'').replace(/"/g,'&quot;'); }

  /* Override du dépôt : prend en compte le fournisseur indiqué (achat) + fiche si inconnu */
  window.factDepotAdd=function(file,cat){ return new Promise(function(res){ var r=new FileReader();
    r.onload=function(){ try{
      var nom=file.name;
      var dup=gstore().some(function(p){ return p.cat===cat && normName(p.nom)===normName(nom); });
      var piece={ id:uid(), nom:nom, mime:file.type||'', taille:file.size||0, data:r.result, date:todayStr(), cat:cat };
      gstore().push(piece);
      var tiersId='', inconnu=false;
      if(cat==='achat'){ var selv=(document.getElementById('dep-four-achat')||{}).value||'';
        if(selv && selv!=='__inconnu__'){ tiersId=selv; } else { inconnu=true; } }
      var dep={ id:uid(), cat:cat, fichierId:piece.id, nom:nom, date:todayStr(), statut:'deposee',
        doublon:dup, doublonRaison:dup?('Fichier « '+nom+' » déjà déposé dans le dossier'):'',
        tiersId:tiersId, tiersInconnu:inconnu, numero:'', dateFacture:'', ht:0, tva:0, ttc:0, taux:20,
        ecritureId:null, factureId:null, ficheId:null };
      dstore().push(dep);
      nstore().push({ id:uid(), date:todayStr(), cat:cat, depotId:dep.id, nom:nom, doublon:dup, lu:false });
      if(inconnu){ var fiche={ id:uid(), type:'fournisseur', depotId:dep.id, statut:'a_remplir', date:todayStr(),
        raison:'', siret:'', tvaIntra:'', adresse:'', cp:'', ville:'', email:'', tel:'', iban:'', tiersId:null };
        fstore().push(fiche); dep.ficheId=fiche.id; }
      save(); res(true);
    }catch(e){ toast('Fichier trop volumineux'); res(false); } };
    r.onerror=function(){res(false);}; r.readAsDataURL(file); }); };

  /* Override de la carte de dépôt client : ajoute le sélecteur fournisseur (achat) */
  if(typeof window.depotFacturesCard==='function'){
    window.depotFacturesCard=function(cat,titre,sub){
      var selHtml='';
      if(cat==='achat'){ var fourns=(db.tiers||[]).filter(function(t){return t.type==='fournisseur';});
        selHtml='<div class="field" style="margin-bottom:10px"><label>Fournisseur de cette facture</label>'
          +'<select id="dep-four-achat"><option value="">— Sélectionner —</option>'
          +fourns.map(function(t){return '<option value="'+t.id+'">'+t.nom+'</option>';}).join('')
          +'<option value="__inconnu__">Fournisseur inconnu / nouveau</option></select>'
          +'<div class="hint">Fournisseur inconnu ? Une fiche d\'information vous sera demandée après le dépôt.</div></div>'; }
      return '<div class="card"><h2>'+titre+'</h2><div class="sub">'+sub+' Chaque dépôt notifie votre cabinet ; un doublon s\'affiche en rouge. La réception et la comptabilisation sont validées par le cabinet.</div>'
        +selHtml
        +'<div class="ged-drop" onclick="factPick(\''+cat+'\')" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="factDrop(event,\''+cat+'\')">'
        +'<div style="font-size:24px"></div><div style="font-weight:700">Déposez vos factures ici</div><div class="hint">ou cliquez — PDF, JPG, PNG</div>'
        +'<input type="file" id="fdep-'+cat+'" hidden multiple accept=".pdf,.jpg,.jpeg,.png,image/*" onchange="factFile(event,\''+cat+'\')"></div>'
        +depotsListe(cat,'client')+'</div>';
    };
  }

  /* Fiche : remplissage par le client (modale) */
  window.ficheRemplir=function(id){ var f=fstore().find(function(x){return x.id===id;}); if(!f)return;
    var d=dstore().find(function(x){return x.id===f.depotId;});
    document.getElementById('modal-c').innerHTML=
      '<h2 style="margin-top:0">Fiche d\'information '+(f.type==='client'?'client':'fournisseur')+'</h2>'

      +'<div class="row g2"><div class="field"><label>SIRET (14 chiffres)</label><input id="fi-siret" value="'+v(f.siret)+'" placeholder="ex. 552 081 317 00024"></div>'

      +'<div class="field"><label>Raison sociale *</label><input id="fi-raison" value="'+v(f.raison)+'"></div>'
      +'<div class="row g2"><div class="field"><label>N° TVA intracom.</label><input id="fi-tva" value="'+v(f.tvaIntra)+'"></div>'

      +'<div class="right" style="margin-top:10px"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button> <button class="btn btn-pri" onclick="ficheEnregistrer(\''+id+'\')">Transmettre au cabinet</button></div>';
    document.getElementById('modal').classList.add('show');
  };
  /* Complétion automatique de la fiche via le SIRET (annuaire officiel des entreprises) */
  window.ficheCompletSiret=function(){
    var g=function(x){return document.getElementById(x);};
    var siret=((g('fi-siret')||{}).value||'').replace(/\D/g,'');
    if(siret.length!==14 && siret.length!==9) return toast('Saisissez un SIRET (14 chiffres) ou un SIREN (9).');
    if(typeof lookupSiret!=='function') return toast('Service de recherche indisponible.');
    toast('Recherche de l\'entreprise…');
    Promise.resolve(lookupSiret(siret)).then(function(info){
      if(!info) return toast('Aucune entreprise trouvée.');
      if(info.raison && g('fi-raison')) g('fi-raison').value=info.raison;
      if(info.tvaIntra && g('fi-tva')) g('fi-tva').value=info.tvaIntra;

<script id="yada-addon50">
/* Lecture automatique de la facture déposée (achat) : le système « saisit » les
   montants (TTC lu du fichier → HT et TVA calculés) et pré-remplit la
   comptabilisation ; le cabinet n'a plus qu'à VALIDER. Hors-ligne : lecture
   simulée (montant détecté dans le nom du fichier, sinon valeur simulée). */
(function(){
  if(typeof render!=='function') return;
  function gstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.pieces))db.parametres.pieces=[]; return db.parametres.pieces; }
  function dstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.depots))db.parametres.depots=[]; return db.parametres.depots; }
  function nstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.notifsDepot))db.parametres.notifsDepot=[]; return db.parametres.notifsDepot; }
  function fstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.fichesTiers))db.parametres.fichesTiers=[]; return db.parametres.fichesTiers; }
  function normName(n){ return String(n||'').trim().toLowerCase(); }

  /* Extraction simulée des montants depuis le fichier (nom de fichier) */
  function extractFromFile(nom){
    var base=String(nom||'').replace(/\.[a-z0-9]+$/i,'');
    var ttc=0; var mDec=base.match(/(\d{1,7}[.,]\d{2})(?!\d)/);
    if(mDec){ ttc=parseFloat(mDec[1].replace(',','.')); }
    else { var nums=(base.match(/\d{2,7}/g)||[]).map(Number); if(nums.length){ ttc=Math.max.apply(null,nums); } }
    if(!ttc || ttc<=0){ var h=0; for(var i=0;i<base.length;i++){ h=(h*31+base.charCodeAt(i))>>>0; } ttc=r2(60+(h%1900)+((h%100)/100)); }
    var numero=''; var mN=base.match(/\b((?:fac|inv|fa|f)[-_ ]?[a-z0-9]*\d[a-z0-9-]*)\b/i);
    if(mN){ numero=mN[1].replace(/[ _]/g,'').toUpperCase(); }
    return { ttc:r2(ttc), numero:numero, taux:20 };
  }

  /* Dépôt : le système lit et saisit les montants (achat) */
  window.factDepotAdd=function(file,cat){ return new Promise(function(res){ var r=new FileReader();
    r.onload=function(){ try{
      var nom=file.name;
      var dup=gstore().some(function(p){return p.cat===cat && normName(p.nom)===normName(nom);});
      var piece={ id:uid(), nom:nom, mime:file.type||'', taille:file.size||0, data:r.result, date:todayStr(), cat:cat };
      gstore().push(piece);
      var tiersId='', inconnu=false;
      if(cat==='achat'){ var selv=(document.getElementById('dep-four-achat')||{}).value||''; if(selv && selv!=='__inconnu__') tiersId=selv; else inconnu=true; }
      var dep={ id:uid(), cat:cat, fichierId:piece.id, nom:nom, date:todayStr(), statut:'deposee',
        doublon:!!dup, doublonRaison:dup?('Fichier « '+nom+' » déjà déposé dans le dossier'):'',
        tiersId:tiersId, tiersInconnu:inconnu, numero:'', dateFacture:'', htBrut:0, remise:0, taux:20,
        ht:0, tva:0, ttc:0, ecritureId:null, factureId:null, ficheId:null, auto:false };
      if(cat==='achat'){ var ex=extractFromFile(nom); var net=r2(ex.ttc/(1+ex.taux/100)); var tva=r2(ex.ttc-net);
        dep.numero=ex.numero; dep.dateFacture=todayStr(); dep.taux=ex.taux; dep.ht=net; dep.tva=tva; dep.ttc=ex.ttc; dep.auto=true; }
      dstore().push(dep);
      nstore().push({ id:uid(), date:todayStr(), cat:cat, depotId:dep.id, nom:nom, doublon:dep.doublon, lu:false });
      if(inconnu){ var fiche={ id:uid(), type:'fournisseur', depotId:dep.id, statut:'a_remplir', date:todayStr(), raison:'', siret:'', tvaIntra:'', adresse:'', cp:'', ville:'', email:'', tel:'', iban:'', tiersId:null }; fstore().push(fiche); dep.ficheId=fiche.id; }
      save(); res(true);
    }catch(e){ toast('Fichier trop volumineux'); res(false); } };
    r.onerror=function(){res(false);}; r.readAsDataURL(file); }); };

  /* Carte de dépôt client : achat = dépôt fichier (lecture auto) ; vente = dépôt fichier */
  window.depotFacturesCard=function(cat,titre,sub){
    if(cat==='achat'){

      return '<div class="card"><h2>'+titre+'</h2><div class="sub">'+sub+' Déposez simplement la facture : le système lit automatiquement le montant TTC et calcule la TVA et le HT. Le cabinet n\'a plus qu\'à valider la saisie (après comparaison avec le fichier).</div>'
        +'<div class="field" style="margin-bottom:10px"><label>Fournisseur (facultatif)</label><select id="dep-four-achat">'+opts+'</select>'+(pend?'<div class="hint">→ Rattaché par défaut au nouveau fournisseur en cours (modifiable) — les factures du même fournisseur restent regroupées.</div>':'')+'</div>'
        +'<div class="ged-drop" onclick="factPick(\'achat\')" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="factDrop(event,\'achat\')">'
        +'<div style="font-size:24px"></div><div style="font-weight:700">Déposez la facture ici</div><div class="hint">ou cliquez — PDF, JPG, PNG · lecture automatique des montants</div>'
        +'<input type="file" id="fdep-achat" hidden multiple accept=".pdf,.jpg,.jpeg,.png,image/*" onchange="factFile(event,\'achat\')"></div>'
        +depotsListe('achat','client')+'</div>';
    }
    var selCli='';
    if(cat==='vente'){ var clients=(db.tiers||[]).filter(function(t){return t.type==='client';});
      var cpend=(typeof window.fichePendOptions==='function')?window.fichePendOptions('client'):'';
      var copts='<option value="">— Sélectionner (ou laisser : client inconnu) —</option>'+clients.map(function(t){return '<option value="'+t.id+'">'+t.nom+'</option>';}).join('')+'<option value="__inconnu__">Client inconnu / nouveau</option>'+(cpend?('<optgroup label="Nouveaux clients en cours">'+cpend+'</optgroup>'):'');
      selCli='<div class="field" style="margin-bottom:10px"><label>Client (facultatif)</label><select id="dep-client-vente">'+copts+'</select><div class="hint">'+(cpend?'→ Rattaché par défaut au nouveau client en cours (modifiable) — factures du même client regroupées.':'Client inconnu ? Une fiche d\'information sera demandée puis validée par le cabinet.')+'</div></div>'; }
    return '<div class="card"><h2>'+titre+'</h2><div class="sub">'+sub+' Chaque dépôt notifie votre cabinet ; un doublon s\'affiche en rouge. La comptabilisation est validée par le cabinet.</div>'
      +selCli
      +'<div class="ged-drop" onclick="factPick(\''+cat+'\')" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="factDrop(event,\''+cat+'\')">'
      +'<div style="font-size:24px"></div><div style="font-weight:700">Déposez vos factures ici</div><div class="hint">ou cliquez — PDF, JPG, PNG</div>'
      +'<input type="file" id="fdep-'+cat+'" hidden multiple accept=".pdf,.jpg,.jpeg,.png,image/*" onchange="factFile(event,\''+cat+'\')"></div>'
      +depotsListe(cat,'client')+'</div>';
  };
})();

  function fstore(){ if(!db.parametres)db.parametres={}; if(!Array.isArray(db.parametres.fichesTiers))db.parametres.fichesTiers=[]; return db.parametres.fichesTiers; }

    if(!el){ if(!document.body) return; el=document.createElement('div'); el.id='m-tabbar'; document.body.appendChild(el); }
    var cur=(typeof current!=='undefined')?current:'';
    var tabs=[['facturation','','Facture client','act-strong'],['achats','','Facture fournisseur','act-strong']];
    el.innerHTML=tabs.map(function(t){
      return '<button class="'+(cur===t[0]?'active ':'')+t[3]+'" onclick="current=\''+t[0]+'\';render()"><span class="ic">'+t[1]+'</span>'+t[2]+'</button>';
    }).join('');
  }
  var _r=render; render=function(){ var x=_r.apply(this,arguments); try{ tabbar(); }catch(e){} return x; };
  if(document.body) tabbar(); else document.addEventListener('DOMContentLoaded', tabbar);
})();
</script>

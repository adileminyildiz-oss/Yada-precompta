<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pré-Compta — Système intégré</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="YADA">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f2e9; --paper-2:#efe9db; --card:#fffdf8; --ink:#1c2a33; --ink-soft:#475862;
    --line:#ddd4c2; --line-strong:#c8bda4;
    --debit:#9c3024; --credit:#1f6b4f; --accent:#b6792a; --gold:#a8801f;
    --blue:#3a6600; --shadow:0 1px 2px rgba(28,42,51,.06),0 8px 24px rgba(28,42,51,.06);
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .deb{color:var(--debit)} .cre{color:var(--credit)}
  .layout{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .layout.solo{grid-template-columns:1fr}

  aside{background:var(--ink);color:#e9e2d2;padding:22px 14px 14px;position:sticky;top:0;height:100vh;
    display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .brand{font-family:'Fraunces',serif;font-weight:900;font-size:21px;line-height:1.05;
    color:#f6f2e9;padding:4px 10px 2px;flex:0 0 auto}
  .brand small{display:block;font-family:'IBM Plex Sans';font-weight:400;font-size:10.5px;
    letter-spacing:.16em;text-transform:uppercase;color:#9aa49a;margin-top:5px}
  nav{margin-top:14px;display:flex;flex-direction:column;gap:2px;flex:1 1 auto;min-height:0;
    overflow-y:auto;overflow-x:hidden;padding-right:4px;scrollbar-width:thin}
  nav::-webkit-scrollbar{width:7px}
  nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:6px}
  nav::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.3)}
  .nav-sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#7f9089;padding:14px 12px 5px}
  .nav-sec:first-child{padding-top:0}
  .nav-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
    border:none;color:#c9d3cf;font:inherit;font-size:13.5px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:.12s}
  .nav-btn:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-btn.active{background:var(--gold);color:#241c05;font-weight:600}
  .nav-btn .ico{width:16px;text-align:center;opacity:.9}
  .side-foot{flex:0 0 auto;margin-top:8px;display:flex;flex-direction:column;gap:6px;padding-top:12px;
    border-top:1px solid rgba(255,255,255,.12)}
  .side-foot button{font:inherit;font-size:11.5px;background:rgba(255,255,255,.07);color:#dfe6e2;
    border:1px solid rgba(255,255,255,.1);padding:7px;border-radius:7px;cursor:pointer}
  .side-foot button:hover{background:rgba(255,255,255,.14)}

  main{padding:26px 30px 60px;max-width:1180px}
  main.fullbleed{padding:0;max-width:none}
  main.fullbleed .sg-app{margin:0;border:none;border-radius:0;box-shadow:none;height:100vh;display:flex;flex-direction:column}
  main.fullbleed .sg-body{flex:1;min-height:0}
  main.fullbleed .sg-grid{max-height:none}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1.5px solid var(--line-strong);padding-bottom:14px;margin-bottom:22px;flex-wrap:wrap;gap:10px}
  .page-head h1{font-family:'Fraunces',serif;font-weight:600;font-size:27px;letter-spacing:-.01em}
  .page-head p{color:var(--ink-soft);font-size:13px;margin-top:3px;max-width:660px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px}
  .card h2{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:3px}
  .card .sub{color:var(--ink-soft);font-size:12px;margin-bottom:14px}

  .grid{display:grid;gap:16px}
  .g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}

  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi:before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
  .kpi.green:before{background:var(--credit)} .kpi.red:before{background:var(--debit)} .kpi.blue:before{background:var(--blue)}
  .kpi .lbl{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
  .kpi .val{font-family:'IBM Plex Mono';font-size:24px;font-weight:600;margin-top:6px;letter-spacing:-.03em}
  .kpi .meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px}

  label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
  input,select{width:100%;font:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line-strong);
    border-radius:8px;background:#fffefb;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(168,128,31,.15)}
  .field{margin-bottom:14px}
  .row{display:grid;gap:14px}
  .btn{font:inherit;font-weight:600;font-size:13.5px;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;transition:.12s}
  .btn-pri{background:var(--ink);color:#f6f2e9} .btn-pri:hover{background:#0f1a21}
  .btn-gold{background:var(--gold);color:#241c05} .btn-gold:hover{filter:brightness(1.06)}
  .btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink)}
  .btn-ghost:hover{background:var(--paper-2)}
  .btn-sm{padding:5px 11px;font-size:12px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);
    padding:9px 10px;border-bottom:1.5px solid var(--line-strong);font-weight:600;white-space:nowrap}
  td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  td.r,th.r{text-align:right} tr:hover td{background:#fbf8f1}
  .tag{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.02em}
  .t-ach{background:#f3e3df;color:var(--debit)} .t-ven{background:#dcefe6;color:var(--credit)}
  .t-pay{background:#dcefe6;color:var(--credit)} .t-att{background:#f7eccd;color:#8a6a12}
  .t-part{background:#e0e9f1;color:var(--blue)} .t-bq{background:#e0e9f1;color:var(--blue)}
  .t-devis{background:#ece6f1;color:#6a4f8a} .t-avoir{background:#f7eccd;color:#8a6a12}
  .t-org{background:#ede7da;color:#7a6320}

  .balance-ok{color:var(--credit);font-weight:600} .balance-ko{color:var(--debit);font-weight:600}
  .ecr{border:1px solid var(--line);border-radius:9px;margin-bottom:12px;overflow:hidden}
  .ecr-h{display:flex;justify-content:space-between;align-items:center;background:var(--paper-2);padding:9px 13px;font-size:12.5px}
  .empty{text-align:center;color:var(--ink-soft);padding:34px;font-style:italic}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#f6f2e9;padding:12px 20px;border-radius:10px;font-size:13px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:90;font-weight:500}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-soft);
    background:var(--paper-2);border:1px dashed var(--line-strong);border-radius:9px;padding:11px 14px;margin-bottom:18px}
  .flow b{color:var(--ink)} .flow .arr{color:var(--gold);font-weight:700}
  .mini{font-size:11px;color:var(--ink-soft)}
  .right{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
  .bar{height:9px;background:var(--paper-2);border-radius:5px;overflow:hidden} .bar i{display:block;height:100%;background:var(--gold)}
  .totrow td{border-top:2px solid var(--ink);font-weight:600}

  /* Recherche + fiche détaillée */
  .linkname{background:none;border:none;font:inherit;color:var(--blue);font-weight:600;cursor:pointer;
    padding:0;text-decoration:underline;text-underline-offset:2px}
  .search-res{border:1px solid var(--line);border-radius:9px;margin-top:10px;max-height:260px;overflow:auto}
  .search-res button{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;
    background:none;border:none;border-bottom:1px solid var(--line);padding:10px 13px;font:inherit;cursor:pointer}
  .search-res button:last-child{border-bottom:none}
  .search-res button:hover{background:var(--paper-2)}
  .modal-bg{position:fixed;inset:0;background:rgba(28,42,51,.5);display:none;align-items:flex-start;
    justify-content:center;z-index:80;padding:40px 16px;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--card);border-radius:14px;max-width:760px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal-h{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;
    border-bottom:1px solid var(--line);background:var(--paper-2)}
  .modal-h h3{font-family:'Fraunces',serif;font-size:21px}
  .modal-b{padding:20px 22px;max-height:72vh;overflow:auto}
  .x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink-soft);line-height:1}
  .kv{display:grid;grid-template-columns:175px 1fr;gap:7px 12px;font-size:13px;margin:12px 0}
  .kv>span{color:var(--ink-soft)}
  optgroup{font-style:normal;font-weight:700;color:var(--ink)}

  /* ===== Habillage « consultation comptable » (style logiciel bureau) ===== */
  .sg-app{font-family:'Segoe UI',Tahoma,Geneva,system-ui,sans-serif;font-size:12.5px;color:#1b1b1b;
    border:1px solid #6f6f6f;border-radius:5px;overflow:hidden;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.16);margin-bottom:14px}
  .sg-app *{box-sizing:border-box}
  .sg-title{background:linear-gradient(#9a9a9a,#8a8a8a);color:#fff;text-align:center;padding:6px 10px;font-size:12.5px;position:relative;letter-spacing:.01em}
  .sg-win{position:absolute;right:10px;top:5px;display:flex;gap:13px;font-size:12px;opacity:.95}
  .sg-menu{display:flex;gap:18px;padding:6px 13px;background:#fafafa;border-bottom:1px solid #dcdcdc;font-size:12.5px}
  .sg-menu span{cursor:default;color:#222}
  .sg-menu .mi{position:relative;cursor:pointer}
  .sg-menu .mi:hover{color:#000}
  .sg-dd{position:absolute;left:-6px;top:22px;background:#fff;border:1px solid #b8b8b8;box-shadow:0 8px 24px rgba(0,0,0,.18);
    border-radius:3px;min-width:268px;z-index:60;padding:5px 0;display:none}
  .sg-dd.open{display:block}
  .sg-dd button{display:block;width:100%;text-align:left;background:none;border:none;font:inherit;font-size:12.5px;
    padding:7px 16px;cursor:pointer;color:#1b1b1b;white-space:nowrap}
  .sg-dd button:hover{background:#6fb800;color:#fff}
  .sg-dd .sep{height:1px;background:#e0e0e0;margin:5px 0}
  .sg-dd .danger:hover{background:#9c3024}
  .sg-tools{display:flex;gap:15px;padding:8px 14px;background:#fff;border-bottom:1px solid #dcdcdc;font-size:17px;color:#444}
  .sg-tools span{cursor:default;opacity:.8;line-height:1}
  .sg-body{display:grid;grid-template-columns:300px 1fr;min-height:540px}
  .sg-left{display:grid;grid-template-columns:66px 1fr;border-right:1px solid #dcdcdc;min-height:0}
  .sg-col{display:flex;flex-direction:column;border-right:1px solid #e2e2e2;min-height:0}
  .sg-col:last-child{border-right:none}
  .sg-colh{background:#ededed;border-bottom:1px solid #cfcfcf;padding:6px 7px;font-weight:600;font-size:11.5px;color:#333}
  .sg-jrnh{background:#3c3c3c;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:6px 9px;font-weight:600;font-size:12px}
  .sg-jrnh .sg-caret{background:#555;border:1px solid #6a6a6a;border-radius:3px;padding:0 6px;font-size:10px}
  .sg-perlist,.sg-jrnlist{overflow:auto;flex:1;
    background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 26px,#f0f0f0 26px,#f0f0f0 27px)}
  .sg-peritem{padding:5px 4px;text-align:center;border-bottom:1px solid #f0f0f0;cursor:pointer;color:#333}
  .sg-peritem:hover{background:#f1f1f1}
  .sg-peritem.on{background:#57b88b;color:#fff;font-weight:700}
  .sg-jrnitem{padding:5px 9px;border-bottom:1px solid #f4f4f4;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#222}
  .sg-jrnitem:hover{background:#f1f1f1}
  .sg-jrnitem.on{background:#d2eede}
  .sg-jrnitem.zero{color:#9a9a9a}
  .sg-right{display:flex;flex-direction:column;min-width:0}
  .sg-tabs{display:flex;background:#e7e7e7;border-bottom:1px solid #cfcfcf;overflow:hidden}
  .sg-tab{padding:9px 16px;cursor:pointer;border-right:1px solid #d3d3d3;color:#333;white-space:nowrap;font-size:12px;background:#e2e2e2}
  .sg-tab:hover{background:#ececec}
  .sg-tab.on{background:#fff;font-weight:700;border-top:2px solid #2fa46a;color:#111}
  .sg-tabnav{margin-left:auto;display:flex;gap:3px;align-items:center;padding:0 6px;color:#666}
  .sg-tabnav span{border:1px solid #c7c7c7;background:#f3f3f3;border-radius:3px;padding:1px 6px;cursor:default;font-size:11px}
  .sg-grid{flex:1;overflow:auto;
    background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 27px,#efefef 27px,#efefef 28px)}
  table.sg-tbl{width:100%;border-collapse:collapse;font-size:12px;font-family:inherit;background:#fff}
  .sg-tbl thead th{position:sticky;top:0;background:#fff;border-bottom:1px solid #bdbdbd;text-align:left;
    padding:7px 11px;font-weight:600;color:#222;text-transform:none;letter-spacing:0;font-size:12px;white-space:nowrap}
  .sg-tbl thead th.r{text-align:right}
  .sg-tbl td{padding:4px 11px;border-bottom:1px solid #efefef;white-space:nowrap;vertical-align:middle;color:#1b1b1b}
  .sg-tbl tbody tr:nth-child(even) td{background:#f7f7f7}
  .sg-tbl tbody tr:hover td{background:#eef6f1}
  .sg-tbl tbody tr.on td{background:#79c6a0 !important;color:#0e2b1d}
  .sg-amt{text-align:right;color:#9c2a2a;font-variant-numeric:tabular-nums}
  .sg-sens{text-align:center;width:30px;color:#111}
  .sg-status{display:flex;align-items:center;gap:26px;background:#f0f0f0;border-top:1px solid #d3d3d3;padding:6px 13px;font-size:11.5px;color:#333}
  .sg-status .sp{margin-left:auto}
  .sg-dot{width:10px;height:10px;border-radius:50%;background:#5bbf6a;display:inline-block;margin-right:6px}
  .sg-brand{font-weight:700;color:#2fa46a}

  /* ===== Écran de connexion / sélection de dossier ===== */
  main.login-bleed{padding:0;max-width:none}
  .login-wrap{min-height:100vh;background:radial-gradient(1200px 600px at 70% -10%, #16313f 0%, #0e1a22 55%, #0b141a 100%);
    color:#eef2f0;padding:42px 6vw 60px;font-family:'IBM Plex Sans',system-ui,sans-serif}
  .login-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:38px}
  .login-brand{font-family:'Fraunces',serif;font-weight:900;font-size:26px;color:#fff}
  .login-brand small{display:block;font-family:'IBM Plex Sans';font-weight:400;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#8fa6a0;margin-top:4px}
  .login-cab{text-align:right;font-size:13px;color:#cdd8d4}.login-cab b{display:block;color:#fff;font-size:15px}
  .login-cab span{font-size:12px;color:#90a39d}
  .login-title{font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:#fff}
  .login-sub{color:#9fb0ab;font-size:14px;margin-top:6px;max-width:640px}
  .login-search{width:100%;max-width:560px;margin:22px 0 26px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    border-radius:11px;padding:13px 16px;color:#fff;font:inherit;font-size:14px}
  .login-search::placeholder{color:#84968f}
  .login-search:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(168,128,31,.25)}
  .dossier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
  .dossier-card{text-align:left;background:#14222b;border:1px solid #24373f;border-radius:14px;padding:20px;cursor:pointer;
    color:#eef2f0;font:inherit;transition:.15s;display:flex;flex-direction:column;gap:6px}
  .dossier-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .dc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .dc-av{width:42px;height:42px;border-radius:11px;background:#6fb800;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
  .dc-star{font-size:18px;color:#5d7079;cursor:pointer}.dc-star.on{color:#e8b84b}
  .dc-nom{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:#fff}
  .dc-meta{font-size:12.5px;color:#9fb0ab}
  .dc-siren{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#7f938c;letter-spacing:.02em}
  .dc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #22343c}
  .dc-badge{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:20px;background:#33454d;color:#9fb0ab}
  .dc-badge.on{background:#163a2c;color:#5bbf8a}
  .dc-open{font-size:12.5px;color:var(--gold);font-weight:600}
  .login-empty{color:#9fb0ab;font-style:italic;padding:30px}
  .login-actions{margin-top:30px;display:flex;gap:10px}
  .login-actions .btn-ghost{border-color:rgba(255,255,255,.18);color:#dfe6e2}
  .login-actions .btn-ghost:hover{background:rgba(255,255,255,.08)}

  /* ===== Tableau de bord cabinet (style Regate, sombre) ===== */
  .rg{background:#0e0e10;border-radius:14px;padding:26px 28px;margin-bottom:20px;color:#ededed;
    font-family:'Inter','IBM Plex Sans',system-ui,sans-serif}
  .rg-hi{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:#fff}
  .rg-sub{color:#9a9a9f;font-size:13px;margin-top:2px}
  .rg-sec{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#8a8a90;margin:24px 0 12px}
  .rg-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  @media(max-width:760px){.rg-kpis{grid-template-columns:1fr}}
  .rg-kpi{background:#1a1a1d;border:1px solid #2a2a2e;border-radius:12px;padding:20px 22px}
  .rg-kpi .l{color:#9a9a9f;font-size:13px}
  .rg-kpi .v{font-size:30px;font-weight:700;color:#fff;margin-top:8px}
  .rg-kpi .v small{font-size:15px;color:#8a8a90;font-weight:400}
  .rg-toolbar{display:flex;align-items:center;gap:12px;margin:6px 0 14px;flex-wrap:wrap}
  .rg-search{flex:1;min-width:200px;background:#1a1a1d;border:1px solid #2a2a2e;border-radius:9px;
    padding:9px 13px;color:#ededed;font:inherit;font-size:13px}
  .rg-search::placeholder{color:#777}

  table.bj td.bang{background:#bfeef2;text-align:center;color:#b00;font-weight:700;width:22px;border-right:1px solid #e3ddcf}

  table.bj tr.sep td{border-bottom:1.5px solid #c8453a}

  /* ===== Facture client imprimable (style épuré) ===== */
  .inv{font-family:'Helvetica Neue',Arial,sans-serif;color:#1a1a1a;background:#fff;font-size:12px;line-height:1.5}
  .inv-page{background:#fff;border:1px solid #ddd;max-width:760px;margin:0 auto 16px;padding:40px 44px;box-shadow:0 3px 16px rgba(0,0,0,.08);min-height:1000px;position:relative}
  .inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:34px}
  .inv-h1{font-size:34px;font-weight:800;letter-spacing:-.02em}
  .inv-logo{font-size:30px;font-weight:800;letter-spacing:.04em}
  .inv-meta{display:grid;grid-template-columns:auto auto;gap:4px 26px;font-size:12px;margin-bottom:30px}

  table.inv-t thead th.l{text-align:left}
  table.inv-t td{padding:9px 10px;border-bottom:1px solid #eee;text-align:right}
  table.inv-t td.l{text-align:left}
  .inv-tot{margin-left:auto;width:280px;font-size:12px}
  .inv-tot div{display:flex;justify-content:space-between;padding:5px 10px}
  .inv-tot .lbl{font-weight:700}
  .inv-tot .ttc{border-top:1px solid #ccc;margin-top:2px;padding-top:7px}
  .inv-cond{font-size:10.5px;color:#333;margin-top:14px;line-height:1.7}
  .inv-pay{background:#f4f4f4;border-radius:6px;padding:16px 20px;margin-top:30px;font-size:11px}
  .inv-pay .lbl{font-weight:700;margin-bottom:6px}
  .inv-pay .kv{display:grid;grid-template-columns:150px 1fr;gap:3px 10px}

  .li-row{display:grid;grid-template-columns:1fr 70px 90px 70px 100px 30px;gap:6px;align-items:center;margin-bottom:6px}
  .li-row input,.li-row select{font:inherit;font-size:12.5px;padding:6px 7px;border:1px solid var(--line-strong);border-radius:6px;width:100%}
  .li-head{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}

  /* =====================================================================
     LIQUID GLASS — thème translucide, fluide « goutte d'eau »
     Activé via body[data-theme="liquid-clair"|"liquid-teinte"].
     N'affecte pas la logique métier ; les écrans « logiciel Sage »
     (.sg-app, .lx-app, .rb-app, .cp-wrap) gardent leur lisibilité.
     ===================================================================== */
  @keyframes lqFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,-4%) scale(1.08)}100%{transform:translate(0,0) scale(1)}}
  @keyframes lqFloat2{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-4%,3%) scale(1.12)}100%{transform:translate(0,0) scale(1)}}
  @keyframes lqDrop{0%{transform:scale(.96);opacity:0}60%{transform:scale(1.015)}100%{transform:scale(1);opacity:1}}
  @keyframes lqSheen{0%{background-position:-160% 0}100%{background-position:260% 0}}

  body[data-theme^="liquid"]{
    --paper:transparent; --paper-2:rgba(255,255,255,.30); --card:rgba(255,255,255,.46);
    --line:rgba(255,255,255,.55); --line-strong:rgba(255,255,255,.7);
    --shadow:0 1px 1px rgba(255,255,255,.5) inset, 0 10px 34px rgba(40,60,90,.16);
    --glass-blur:22px; --glass-stroke:rgba(26,52,92,.28);
    --edge-dark:#121212; --edge-blue:#3a6600;
    position:relative; min-height:100vh;
    background:linear-gradient(120deg,#dfeaff 0%,#eef3ff 30%,#fbeefa 62%,#e7f7f2 100%);
    background-attachment:fixed;
  }
  body[data-theme="liquid-teinte"]{
    --ink:#0f1722; --ink-soft:#3a4757;
    background:linear-gradient(125deg,#0c1830 0%,#162a4d 34%,#3a2350 66%,#0e2b3a 100%);
    color:#eaf0f7;
    --card:rgba(30,46,72,.46); --paper-2:rgba(255,255,255,.10);
    --line:rgba(255,255,255,.16); --line-strong:rgba(255,255,255,.26);
    --shadow:0 1px 1px rgba(255,255,255,.18) inset, 0 14px 40px rgba(0,0,0,.42);
    --glass-stroke:rgba(255,255,255,.22);
  }
  body[data-theme="liquid-teinte"]{color:#eaf0f7}
  body[data-theme="liquid-teinte"] .page-head h1,
  body[data-theme="liquid-teinte"] .card h2,
  body[data-theme="liquid-teinte"] .kpi .val,
  body[data-theme="liquid-teinte"] .cp-k .v{color:#f3f7ff}
  body[data-theme="liquid-teinte"] .kpi .lbl,
  body[data-theme="liquid-teinte"] .cp-k .l,
  body[data-theme="liquid-teinte"] th,
  body[data-theme="liquid-teinte"] label{color:#c2cfe0}
  body[data-theme="liquid-teinte"] td{color:#e2e9f3}
  body[data-theme="liquid-teinte"] .kpi .meta,
  body[data-theme="liquid-teinte"] .page-head p,
  body[data-theme="liquid-teinte"] .card .sub,
  body[data-theme="liquid-teinte"] .mini,
  body[data-theme="liquid-teinte"] .hint{color:#9fb0c6}

  /* =====================================================================
     THÈME NOIR — fond proche du noir, TOUT le texte en blanc,
     TOUS les contours en bleu. Lisibilité maximale.
     ===================================================================== */
  body[data-theme="noir"]{
    --ink:#ffffff; --ink-soft:#cfe0f5;
    --paper:#05080d; --paper-2:rgba(155,239,0,.14); --card:rgba(16,26,42,.72);
    --line:#6fb800; --line-strong:#9bef00;
    --gold:#9bef00; --accent:#9bef00; --blue:#9bef00;
    --glass-blur:14px; --glass-stroke:#6fb800; --edge-dark:#2c4a00; --edge-blue:#9bef00;
    --shadow:0 0 0 1px rgba(155,239,0,.25), 0 14px 40px rgba(0,0,0,.6);
    background:radial-gradient(1100px 700px at 75% -10%, #121212 0%, #070b12 55%, #0a0a0a 100%) fixed;
    color:#ffffff;
  }
  /* fond presque uni : on calme les nappes animées */
  body[data-theme="noir"]::before{background:radial-gradient(circle at 30% 30%,rgba(155,239,0,.30),transparent 70%)}
  body[data-theme="noir"]::after{background:radial-gradient(circle at 60% 40%,rgba(155,239,0,.25),transparent 70%)}

  /* TOUT le texte en blanc */
  body[data-theme="noir"],
  body[data-theme="noir"] h1,body[data-theme="noir"] h2,body[data-theme="noir"] h3,
  body[data-theme="noir"] p,body[data-theme="noir"] span,body[data-theme="noir"] div,
  body[data-theme="noir"] td,body[data-theme="noir"] th,body[data-theme="noir"] label,
  body[data-theme="noir"] a,body[data-theme="noir"] li,body[data-theme="noir"] b,
  body[data-theme="noir"] .num,body[data-theme="noir"] .cpt,
  body[data-theme="noir"] .mini,body[data-theme="noir"] .hint,
  body[data-theme="noir"] .card .sub,body[data-theme="noir"] .page-head p,
  body[data-theme="noir"] .kpi .lbl,body[data-theme="noir"] .kpi .val,body[data-theme="noir"] .kpi .meta,
  body[data-theme="noir"] .cp-k .l,body[data-theme="noir"] .cp-k .v,
  body[data-theme="noir"] input,body[data-theme="noir"] select,body[data-theme="noir"] textarea{
    color:#ffffff !important;
  }
  /* débit / crédit : restent identifiables mais clairs */
  body[data-theme="noir"] .deb,body[data-theme="noir"] .num.deb,body[data-theme="noir"] td.deb{color:#ff8f8f !important}
  body[data-theme="noir"] .cre,body[data-theme="noir"] .num.cre,body[data-theme="noir"] td.cre{color:#7fe3b4 !important}

  /* TOUS les contours en bleu */
  body[data-theme="noir"] .card,body[data-theme="noir"] .kpi,body[data-theme="noir"] .cp-k,
  body[data-theme="noir"] .cp-panel,body[data-theme="noir"] .ecr,body[data-theme="noir"] .seg,
  body[data-theme="noir"] .pill,body[data-theme="noir"] .flow,body[data-theme="noir"] .cp-chk,
  body[data-theme="noir"] #modal-c,body[data-theme="noir"] .sel-card,
  body[data-theme="noir"] input,body[data-theme="noir"] select,body[data-theme="noir"] textarea,
  body[data-theme="noir"] .btn-ghost,body[data-theme="noir"] table,
  body[data-theme="noir"] .cp-monthbar .cp-mtab,body[data-theme="noir"] .theme-switch button{
    border-color:#9bef00 !important;
  }
  body[data-theme="noir"] td,body[data-theme="noir"] th{border-bottom-color:rgba(155,239,0,.4) !important}
  body[data-theme="noir"] .card,body[data-theme="noir"] .cp-panel,body[data-theme="noir"] .kpi,
  body[data-theme="noir"] .cp-k,body[data-theme="noir"] .ecr,body[data-theme="noir"] #modal-c{
    background-image:linear-gradient(var(--card),var(--card)),linear-gradient(135deg,#2c4a00,#9bef00 50%,#2c4a00) !important;
    border:1.5px solid transparent !important;
  }
  body[data-theme="noir"] input,body[data-theme="noir"] select,body[data-theme="noir"] textarea{background:rgba(10,18,32,.8)}
  body[data-theme="noir"] aside{background:linear-gradient(180deg,#0a0a0a,#05080d) !important;border-right:1.5px solid #9bef00 !important}
  body[data-theme="noir"] .nav-btn{color:#dCEAFB}
  body[data-theme="noir"] .nav-btn.active{background:linear-gradient(120deg,#6fb800,#2c4a00);color:#fff;border:1px solid #9bef00}
  body[data-theme="noir"] .nav-sec{color:#aef36a}

  /* écrans « logiciel » (Sage) en noir + texte blanc + contours bleus */
  body[data-theme="noir"] .sg-app,body[data-theme="noir"] .lx-app,
  body[data-theme="noir"] .rb-app,body[data-theme="noir"] .cp-wrap{background:#05080d;color:#fff}
  body[data-theme="noir"] .sg-tbl,body[data-theme="noir"] table.lx,body[data-theme="noir"] table.sgj,
  body[data-theme="noir"] table.rb{background:transparent;color:#fff}
  body[data-theme="noir"] .sg-tbl td,body[data-theme="noir"] table.lx td,
  body[data-theme="noir"] table.sgj td{color:#fff !important;border-bottom-color:rgba(155,239,0,.32)}
  body[data-theme="noir"] .sg-tbl thead th,body[data-theme="noir"] table.sgj thead th{background:#121212;color:#fff !important;border-bottom-color:#9bef00}
  body[data-theme="noir"] .sg-tbl tbody tr:nth-child(even) td,
  body[data-theme="noir"] table.sgj tbody tr:nth-child(even) td{background:transparent}
  body[data-theme="noir"] .sg-tbl tbody tr:hover td{background:rgba(155,239,0,.10)}
  body[data-theme="noir"] .sg-tbl tbody tr.on td,
  body[data-theme="noir"] .sg-tbl tbody tr.on:hover td{background:rgba(155,239,0,.16) !important;color:#fff !important}
  body[data-theme="noir"] .sg-amt{color:#ff8f8f}
  body[data-theme="noir"] .sg-left,body[data-theme="noir"] .sg-col,
  body[data-theme="noir"] .sg-body,body[data-theme="noir"] .sg-right{border-color:#9bef00 !important}
  body[data-theme="noir"] .sg-colh,body[data-theme="noir"] .sg-jrnh{background:#121212;color:#fff;border-color:#9bef00}
  body[data-theme="noir"] .sg-peritem,body[data-theme="noir"] .sg-jrnitem{color:#e7ecde;border-bottom-color:rgba(155,239,0,.22)}
  body[data-theme="noir"] .sg-peritem.on{background:#6fb800;color:#fff}
  body[data-theme="noir"] .sg-jrnitem.on{background:rgba(155,239,0,.28)}
  body[data-theme="noir"] .sg-tab{background:#121212;color:#cfe0f5;border-color:#9bef00}
  body[data-theme="noir"] .sg-tab.on{background:#1c1c1c;color:#fff;border-top-color:#9bef00}
  body[data-theme="noir"] .sg-status,body[data-theme="noir"] .lx-status,
  body[data-theme="noir"] .lx-foot,body[data-theme="noir"] .lx-tot,body[data-theme="noir"] .lx-bar{background:#121212;color:#fff;border-color:#9bef00}
  body[data-theme="noir"] .sg-title,body[data-theme="noir"] .lx-title,body[data-theme="noir"] .sg-menu,
  body[data-theme="noir"] .lx-menu{background:#121212;color:#fff;border-color:#9bef00}
  body[data-theme="noir"] .sgj-grid,body[data-theme="noir"] .sg-grid,
  body[data-theme="noir"] .lx-wrap,body[data-theme="noir"] .sg-perlist,body[data-theme="noir"] .sg-jrnlist{
    background-color:#05080d;background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 26px,rgba(155,239,0,.18) 26px,rgba(155,239,0,.18) 27px)}
  body[data-theme="noir"] .sgj-head,body[data-theme="noir"] .sgj-tot{background:#121212;color:#fff;border-top:1px solid #9bef00}
  body[data-theme="noir"] table.sgj tbody tr:nth-child(even) td{background:transparent}
  body[data-theme="noir"] table.lx tbody tr.sel td,
  body[data-theme="noir"] table.lx tbody tr.sel:hover td{background:rgba(155,239,0,.18) !important;color:#fff}
  body[data-theme="noir"] table.lx tbody tr.lettre-on td{background:rgba(70,211,154,.12)}
  body[data-theme="noir"] table.lx tbody tr:hover td{background:rgba(155,239,0,.10)}
  body[data-theme="noir"] table.sgj tbody tr:hover td{background:rgba(155,239,0,.10)}
  /* documents imprimables restent sur fond clair pour l'impression PDF */
  body[data-theme="noir"] .lx-foot .fld .v{background:rgba(10,18,32,.85) !important;border-color:#9bef00 !important;color:#fff !important}
  body[data-theme="noir"] .lx-foot .fld label{color:#9aa49a}
  body[data-theme="noir"] .doc,body[data-theme="noir"] .inv{color:#1c2a33}

  /* === Colonnes uniformes jusqu'au bas (pas de "bloc" distinct) === */
  /* La page entière partage un fond uni ; chaque colonne descend d'un seul
     tenant jusqu'en bas, sidebar et contenu compris. */
  body[data-theme="noir"]{background:#0a0a0a fixed}
  body[data-theme="noir"]::before,body[data-theme="noir"]::after{display:none}      /* on retire les nappes qui créaient des halos */
  body[data-theme="noir"] .layout{min-height:100vh;background:#0a0a0a}
  body[data-theme="noir"] aside{background:#0a0a0a !important;min-height:100vh;border-right:1.5px solid #6fb800 !important}
  body[data-theme="noir"] main{background:#0a0a0a;min-height:100vh}
  body[data-theme="noir"] main:not(.fullbleed){min-height:100vh}
  body[data-theme="noir"] .dash-wrap{background:#0a0a0a !important}
  body[data-theme="noir"] .mod-wrap{background:#0a0a0a}

  /* =====================================================================
     FINITION NOIR — palette accordée, badges, espacements réguliers,
     correction des petites imperfections esthétiques.
     ===================================================================== */
  body[data-theme="noir"]{
    --n-bg:#0a0a0a; --n-surface:rgba(16,26,42,.72); --n-stroke:#6fb800; --n-stroke-soft:rgba(155,239,0,.35);
    --n-accent:#9bef00; --n-ok:#46d39a; --n-danger:#ff8f8f; --n-warn:#f0c674;
  }
  /* barres d'accent KPI : harmonisées sur le bleu, nuances douces */
  body[data-theme="noir"] .kpi:before,body[data-theme="noir"] .cp-k:before{background:linear-gradient(180deg,#9bef00,#6fb800);box-shadow:0 0 12px rgba(155,239,0,.5)}
  body[data-theme="noir"] .kpi.green:before,body[data-theme="noir"] .cp-k.green:before{background:linear-gradient(180deg,#46d39a,#1f8d63);box-shadow:0 0 12px rgba(70,211,154,.5)}
  body[data-theme="noir"] .kpi.red:before,body[data-theme="noir"] .cp-k.red:before{background:linear-gradient(180deg,#ff9a9a,#c85a5a);box-shadow:0 0 12px rgba(255,143,143,.4)}
  body[data-theme="noir"] .kpi.blue:before{background:linear-gradient(180deg,#9bef00,#6fb800)}

  /* badges / tags : pastilles translucides lisibles, accordées */
  body[data-theme="noir"] .tag{border:1px solid transparent;backdrop-filter:blur(4px)}
  body[data-theme="noir"] .t-att{background:rgba(240,198,116,.18);color:#f4d493 !important;border-color:rgba(240,198,116,.45)}
  body[data-theme="noir"] .t-pay,body[data-theme="noir"] .t-ven{background:rgba(70,211,154,.16);color:#7fe3b4 !important;border-color:rgba(70,211,154,.45)}
  body[data-theme="noir"] .t-ach,body[data-theme="noir"] .t-ecart,body[data-theme="noir"] .t-avoir{background:rgba(255,143,143,.16);color:#ffadad !important;border-color:rgba(255,143,143,.4)}
  body[data-theme="noir"] .t-part,body[data-theme="noir"] .t-bq{background:rgba(155,239,0,.18);color:#d6ff7a !important;border-color:rgba(155,239,0,.5)}
  body[data-theme="noir"] .t-devis{background:rgba(170,140,220,.2);color:#d6c4ff !important;border-color:rgba(170,140,220,.5)}

  /* en-têtes de section colorés (inline) neutralisés en teintes accordées */
  body[data-theme="noir"] tr[style*="background:#dcefe6"]{background:rgba(70,211,154,.14) !important}
  body[data-theme="noir"] tr[style*="background:#f3e3df"]{background:rgba(255,143,143,.13) !important}
  body[data-theme="noir"] tr[style*="background:#dcefe6"] b,
  body[data-theme="noir"] tr[style*="background:#f3e3df"] b{color:#fff !important}
  body[data-theme="noir"] tr[style*="background:#eef1f4"]{background:rgba(155,239,0,.12) !important}
  body[data-theme="noir"] tr[style*="background:#eef1f4"] td{color:#d6ff7a !important}
  body[data-theme="noir"] tr[style*="background:#f4f4f4"],body[data-theme="noir"] tr[style*="background:#f7f7f7"]{background:rgba(255,255,255,.04) !important}

  /* segmented control (régime TVA) + theme-switch : contraste correct */
  body[data-theme="noir"] .seg{border-color:var(--n-stroke)}
  body[data-theme="noir"] .seg button{background:rgba(10,18,32,.6);color:#cfe0f5;border-right-color:var(--n-stroke-soft)}
  body[data-theme="noir"] .seg button.on{background:linear-gradient(120deg,#6fb800,#2c4a00);color:#fff}
  body[data-theme="noir"] .theme-switch button{background:rgba(10,18,32,.7);color:#cfe0f5;border-color:var(--n-stroke-soft)}
  body[data-theme="noir"] .theme-switch button.on{background:linear-gradient(120deg,#9bef00,#6fb800);color:#0a0a0a;border-color:transparent}
  body[data-theme="noir"] .cp-mtab{background:rgba(10,18,32,.6);color:#cfe0f5;border-color:var(--n-stroke-soft)}
  body[data-theme="noir"] .cp-mtab.on{background:linear-gradient(120deg,#6fb800,#2c4a00);color:#fff;border-color:transparent}
  body[data-theme="noir"] .cp-mtab .v{color:#7fe3b4}

  /* boutons accordés */
  body[data-theme="noir"] .btn-pri{background:linear-gradient(125deg,#6fb800,#1a1a1a)}
  body[data-theme="noir"] .btn-gold{background:linear-gradient(125deg,#9bef00,#6fb800);color:#0a0a0a}
  body[data-theme="noir"] .btn-ghost{background:rgba(155,239,0,.10);color:#e7ecde}
  body[data-theme="noir"] .btn-ghost:hover{background:rgba(155,239,0,.2)}

  /* hover de lignes : bleu discret (plus de bande blanche éblouissante) */
  body[data-theme="noir"] main:not(.fullbleed) tr:hover td{background:rgba(155,239,0,.12) !important}
  body[data-theme="noir"] .dash-wrap tr:hover td{background:rgba(155,239,0,.10) !important}
  body[data-theme="noir"] tr:hover td{background:rgba(155,239,0,.10) !important}
  body[data-theme="noir"] .rg-link{color:#c4ff3d}
  body[data-theme="noir"] .rg-star.on{color:#f4d493}

<style id="ui-polish">
/* ===== Rafraîchissement visuel (additif, sûr) — n'affecte pas les écrans logiciel Sage ===== */
/* garde-fous anti-débordement (disposition) */
html,body{max-width:100%;overflow-x:hidden}
main:not(.fullbleed) .card,main:not(.fullbleed) .kpi,.mod-wrap .card,.dash-wrap .card{max-width:100%}
.mod-wrap .card,.dash-wrap .card{overflow-x:auto}
.modal-b{overflow-x:auto}
@keyframes yfx-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes yfx-pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
@keyframes yfx-fade{from{opacity:0}to{opacity:1}}
/* entrée douce de l'écran de connexion */
#sec-lock .sec-card{animation:yfx-pop .38s cubic-bezier(.2,1.15,.3,1) both}
#sec-lock .sec-btn{transition:transform .12s ease,filter .15s ease,box-shadow .2s ease}
#sec-lock .sec-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(155,239,0,.45)}
#sec-lock .sec-btn:active{transform:translateY(0) scale(.98)}
@media (prefers-reduced-motion: no-preference){
  /* entrée des modules à chaque navigation (classe posée par addon39) */
  main.yfx-anim{animation:yfx-fade .25s ease both}
  main.yfx-anim .card,main.yfx-anim .kpi,main.yfx-anim .cp-k,main.yfx-anim .rg-kpi{animation:yfx-in .34s ease both}
  main.yfx-anim .grid>*{animation:yfx-in .40s ease both}
  /* léger décalé (stagger) sur les 4 premières cartes */
  main.yfx-anim .grid>*:nth-child(2){animation-delay:.04s}
  main.yfx-anim .grid>*:nth-child(3){animation-delay:.08s}
  main.yfx-anim .grid>*:nth-child(4){animation-delay:.12s}
}
/* retour tactile boutons (tous thèmes) */
.btn{transition:transform .12s ease,filter .15s ease,box-shadow .18s ease}
.btn:active{transform:translateY(1px) scale(.985)}
/* survol doux des cartes/KPI hors pages "figées" et hors écrans logiciel */
main:not(.fullbleed) .card{transition:transform .18s ease,box-shadow .18s ease}
.dash-wrap .kpi,.dash-wrap .card{transition:transform .18s ease,box-shadow .2s ease}
.dash-wrap .kpi:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(0,0,0,.18)}
/* liens & lignes : transition discrète */
tr{transition:background .15s ease}
.nav-btn{transition:background .18s ease,transform .18s ease,color .18s ease}
/* toast un peu plus présent */
.toast{box-shadow:0 14px 38px rgba(0,0,0,.4)}
</style>

<style id="yada-design-refine">
/* ===== Raffinement global (additif, multi-thèmes, repli gracieux) =====
   Ne touche ni à la logique métier ni aux écrans « logiciel » (.sg-app…).
   N'introduit aucune couleur qui combat les thèmes : variables + survol/focus. */

/* Défilement plus doux dans toute l'app */
html{scroll-behavior:smooth}

/* Sélection de texte harmonisée à l'accent du thème */
::selection{background:rgba(155,239,0,.30);color:inherit}
body[data-theme="liquid-clair"] ::selection,
body[data-theme="liquid-teinte"] ::selection{background:rgba(155,239,0,.22)}

/* Barres de défilement discrètes et cohérentes (zones de contenu) */
.mod-wrap,.dash-wrap,.modal-b,.modal,.search-res{scrollbar-width:thin;scrollbar-color:rgba(127,127,127,.35) transparent}
.mod-wrap::-webkit-scrollbar,.dash-wrap::-webkit-scrollbar,.modal-b::-webkit-scrollbar,.search-res::-webkit-scrollbar{width:10px;height:10px}
.mod-wrap::-webkit-scrollbar-track,.dash-wrap::-webkit-scrollbar-track,.modal-b::-webkit-scrollbar-track{background:transparent}
.mod-wrap::-webkit-scrollbar-thumb,.dash-wrap::-webkit-scrollbar-thumb,.modal-b::-webkit-scrollbar-thumb,.search-res::-webkit-scrollbar-thumb{
  background:rgba(127,127,127,.32);border-radius:7px;border:2px solid transparent;background-clip:padding-box}
.mod-wrap::-webkit-scrollbar-thumb:hover,.dash-wrap::-webkit-scrollbar-thumb:hover{background:rgba(127,127,127,.52);background-clip:padding-box}

/* Accessibilité : anneau de focus clavier homogène (sans gêner le clic) */
.btn:focus-visible,.nav-btn:focus-visible,.ec-tile:focus-visible,.linkname:focus-visible,.x:focus-visible{
  outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}

/* KPI : liseré en dégradé doux (repli auto sur la couleur pleine si color-mix absent) */
.kpi:before{background:linear-gradient(180deg,var(--gold),color-mix(in srgb,var(--gold) 45%,transparent))}
.kpi.green:before{background:linear-gradient(180deg,var(--credit),color-mix(in srgb,var(--credit) 45%,transparent))}
.kpi.red:before{background:linear-gradient(180deg,var(--debit),color-mix(in srgb,var(--debit) 45%,transparent))}
.kpi.blue:before{background:linear-gradient(180deg,var(--blue),color-mix(in srgb,var(--blue) 45%,transparent))}
/* Survol KPI homogène partout (pas uniquement sur le tableau de bord) */
main:not(.fullbleed) .kpi,.mod-wrap .kpi{transition:transform .18s ease,box-shadow .2s ease}
main:not(.fullbleed) .kpi:hover,.mod-wrap .kpi:hover{transform:translateY(-3px)}

/* Pastilles (tags) : un peu plus nettes et lisibles */
.tag{line-height:1.7;border:1px solid rgba(0,0,0,.05)}

/* Modale : léger flou de fond + entrée animée (réutilise yfx-pop d'ui-polish) */
.modal-bg{-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
@media (prefers-reduced-motion: no-preference){
  .modal-bg.show .modal{animation:yfx-pop .30s cubic-bezier(.2,1.1,.3,1) both}
}

/* En-tête de page : rythme typographique resserré */
.page-head h1{letter-spacing:-.015em}

/* État vide : un peu plus discret */
.empty{opacity:.85}

/* Affordance : curseur main sur les lignes cliquables */
tr[onclick],tr[ondblclick],.linkname{cursor:pointer}
</style>

/* ============================================================
   MOTEUR COMPTABLE  — écriture équilibrée à 3 lignes (factures)
   ACHAT : 60x (HT) D + 44566 (TVA) D  → 401 (TTC) C
   VENTE : 411 (TTC) D → 70x (HT) C + 44571 (TVA) C
   ============================================================ */
function calcMontants(base, taux, baseEst){
  taux=+taux; let ht,tva,ttc;
  if(baseEst==='TTC'){ ttc=r2(base); ht=r2(ttc/(1+taux/100)); tva=r2(ttc-ht); }
  else { ht=r2(base); tva=r2(ht*taux/100); ttc=r2(ht+tva); }
  return {ht,tva,ttc};
}
function genEcriture(f){
  const t=db.tiers.find(x=>x.id===f.tiersId); const lignes=[];
  if(f.type==='achat'){
    lignes.push({compte:f.compteContre, lib:COMPTES[f.compteContre]||'Charge', debit:f.ht, credit:0});
    lignes.push({compte:f.compteTVA, lib:COMPTES[f.compteTVA], debit:f.tva, credit:0});
    lignes.push({compte:'401', lib:'Fournisseur '+(t?t.nom:''), debit:0, credit:f.ttc});
  } else {
    lignes.push({compte:'411', lib:'Client '+(t?t.nom:''), debit:f.ttc, credit:0});
    lignes.push({compte:f.compteContre, lib:COMPTES[f.compteContre]||'Produit', debit:0, credit:f.ht});
    lignes.push({compte:f.compteTVA, lib:COMPTES[f.compteTVA], debit:0, credit:f.tva});
  }
  return { id:uid(), factureId:f.id, date:f.date, journal:f.type==='achat'?'ACH':'VTE', libelle:f.numero+' · '+(t?t.nom:''), lignes };
}
function posterFacture({type, tiersId, date, base, baseEst, taux, compteContre, compteTVA, numero, echeance, source, modeReglement}){
  const m=calcMontants(base, taux, baseEst);
  const f={ id:uid(), type, tiersId, date, numero:numero||nextNumUnique(type==='achat'?'ACH':'FAC'),
    taux:+taux, ht:m.ht, tva:m.tva, ttc:m.ttc, compteContre, compteTVA,
    source:source||(type==='achat'?'manuelle':'vente'), modeReglement:modeReglement||'', recuLe:date };
  const ecr=genEcriture(f); f.ecritureId=ecr.id;
  const reg={ id:uid(), factureId:f.id, type, sens:type==='achat'?'a_payer':'a_encaisser',
    statut:'attente', echeance:echeance||date, regle:0, restant:m.ttc, notes:[], echelonne:false };
  db.factures.push(f); db.ecritures.push(ecr); db.reglements.push(reg); save();
  return f;
}

/* ============================================================
   MOTEUR BANQUE — écriture à 2 lignes soldée par 512
   Ligne 1 : compte tiers / organisme / charge (Débit OU Crédit)
   Ligne 2 : 512 Banque (sens opposé), montant identique
   ============================================================ */
function posterBanque({mois, jour, compte, libelle, sens, montant, suivi, tiersId}){
  const j=Math.min(Math.max(+jour||1,1),31);
  const date=mois+'-'+String(j).padStart(2,'0');
  const m=r2(montant);
  const t=tiersId?db.tiers.find(x=>x.id===tiersId):null;
  const l1={ compte, lib:(t?t.nom:(COMPTES[compte]||compte)), debit:sens==='D'?m:0, credit:sens==='C'?m:0 };
  const l2={ compte:'512', lib:'Banque', debit:sens==='C'?m:0, credit:sens==='D'?m:0 };
  const ecr={ id:uid(), date, journal:'BQ', libelle:(suivi?suivi+' · ':'')+libelle, lignes:[l1,l2], banque:true };
  db.ecritures.push(ecr);
  const rec={ id:uid(), date, jour:j, compte, libelle, sens, montant:m, suivi, tiersId:tiersId||null, ecritureId:ecr.id, alloc:[] };
  db.banque.push(rec); save(); return rec;
}

/* ============================================================
   MOTEUR OD — opérations diverses (écriture multi-lignes équilibrée)
   ============================================================ */
function posterOD({date, libelle, lignes, numero, journal}){
  const num=numero||nextNum('OD');
  const L=lignes.map(l=>({compte:l.compte, lib:l.lib||COMPTES[l.compte]||l.compte, debit:r2(+l.debit||0), credit:r2(+l.credit||0)}));
  const ecr={ id:uid(), date, journal:journal||'OD', libelle:num+' · '+libelle, lignes:L, od:true };
  db.ecritures.push(ecr);
  db.odiv.push({ id:uid(), date, numero:num, libelle, ecritureId:ecr.id });
  save(); return ecr;
}

/* ============================================================
   PAIE & CHARGES PATRONALES — calcul automatique depuis les
   salaires bruts, écritures OD au dernier jour du mois.
   Pièce = MM/AAAA · Libellés « OD PAIE MM/AAAA » / « OD CHARGES MM/AAAA »
   ============================================================ */
function dernierJourMoisISO(ym){ const [y,m]=ym.split('-').map(Number); const j=new Date(y,m,0).getDate(); return ym+'-'+String(j).padStart(2,'0'); }
function pieceMois(ym){ return ym.slice(5)+'/'+ym.slice(0,4); }   // 2026-12 -> 12/2026
function salAux(s){ // compte auxiliaire salarié : 421 + 4 lettres du nom (ex 421BARR)
  const base=(s.nom||'').toUpperCase().replace(/[^A-Z]/g,''); return '421'+(base.slice(0,4)||'XXXX'); }
function calcPaie(ym){
  const P=db.paie||paieDefaut(); const t=P.taux;
  const salaries=(P.salaries||[]);
  const brut=r2(salaries.reduce((a,s)=>a+(+s.brut||0),0));
  // net par salarié (pour les lignes 421 individuelles)
  const parSalarie=salaries.map(s=>{ const b=+s.brut||0;
    const net=r2(b - b*t.sal_urssaf/100 - b*t.sal_retraite/100);
    return { id:s.id, nom:s.nom, aux:salAux(s), brut:r2(b), net }; });
  const salUrssaf=r2(brut*t.sal_urssaf/100), salRetraite=r2(brut*t.sal_retraite/100);
  const net=r2(parSalarie.reduce((a,s)=>a+s.net,0));
  const patUrssaf=r2(brut*t.pat_urssaf/100), patRetraite=r2(brut*t.pat_retraite/100),
    patChomage=r2(brut*t.pat_chomage/100), patAutres=r2(brut*t.pat_autres/100),
    patDivers=r2(brut*t.pat_divers/100), appr=r2(brut*t.apprentissage/100), form=r2(brut*t.formation/100);
  const totalPat=r2(patUrssaf+patRetraite+patChomage+patAutres+patDivers+appr+form);
  const org431=r2(patUrssaf+patChomage);
  const org437300=r2(patRetraite);
  const org437500=r2(patAutres+patDivers+appr+form);
  return { brut, parSalarie, salUrssaf, salRetraite, net, patUrssaf, patRetraite, patChomage, patAutres, patDivers, appr, form,
    totalPat, org431, org437300, org437500, coutTotal:r2(brut+totalPat) };
}
function paieDejaPostee(ym, type){ // type: 'PAIE' | 'CHARGES'
  const lib='OD '+type+' '+pieceMois(ym);
  return db.ecritures.some(e=>e.journal==='ODP' && (e.libelle||'').includes(lib));
}
function posterPaieMois(ym){
  const c=calcPaie(ym); if(c.brut<=0) return false;
  const date=dernierJourMoisISO(ym); const piece=pieceMois(ym);
  // ---- OD PAIE (journal ODP) : 641 brut (D) = cotis. salariales (C) + net par salarié (C 421+nom)
  if(!paieDejaPostee(ym,'PAIE')){
    const L=[
      {compte:'641000000', debit:c.brut, credit:0},
      {compte:'645100000', debit:0, credit:c.salUrssaf},
      {compte:'645300000', debit:0, credit:c.salRetraite},
    ];
    c.parSalarie.forEach(s=>{ COMPTES[s.aux]='Personnel : '+s.nom; if(!db.plan.some(p=>p.code===s.aux)) db.plan.push({code:s.aux,lib:'Personnel : '+s.nom,tva:''});
      L.push({compte:s.aux, lib:'Personnel '+s.nom, debit:0, credit:s.net}); });
    posterOD({ journal:'ODP', date, numero:piece, libelle:'OD PAIE '+piece, lignes:L });
  }
  // ---- OD CHARGES (journal ODP) : charges patronales (D) = organismes à payer (C)
  if(!paieDejaPostee(ym,'CHARGES')){
    posterOD({ journal:'ODP', date, numero:piece, libelle:'OD CHARGES '+piece, lignes:[
      {compte:'645100000', debit:c.patUrssaf, credit:0},
      {compte:'645300000', debit:c.patRetraite, credit:0},
      {compte:'645400000', debit:c.patChomage, credit:0},
      {compte:'645500000', debit:c.patAutres, credit:0},
      {compte:'648000000', debit:c.patDivers, credit:0},
      {compte:'631200000', debit:c.appr, credit:0},
      {compte:'631300000', debit:c.form, credit:0},
      {compte:'431000000', debit:0, credit:c.org431},
      {compte:'437300000', debit:0, credit:c.org437300},
      {compte:'437500000', debit:0, credit:c.org437500},
    ]});
  }
  return true;
}

/* ============================================================
   RAPPROCHEMENT À LA PIÈCE (lettrage banque ↔ facture)
   Chaque mouvement bancaire d'un tiers est affecté à la/les
   facture(s) qu'il règle. Le règlement de la facture est alors
   recalculé, et la TVA est contrôlée pièce par pièce.
   ============================================================ */
function reglementDe(factureId){ return db.reglements.find(r=>r.factureId===factureId); }
function bankAlloue(b){ return r2((b.alloc||[]).reduce((a,x)=>a+x.montant,0)); }
function bankDispo(b){ return r2(b.montant - bankAlloue(b)); }
function recalcReglement(factureId){
  const f=db.factures.find(x=>x.id===factureId); const reg=reglementDe(factureId); if(!f||!reg)return;
  let paye=0; db.banque.forEach(b=>(b.alloc||[]).forEach(a=>{ if(a.factureId===factureId) paye+=a.montant; }));
  paye=r2(paye); reg.regle=paye; reg.restant=r2(f.ttc-paye);
  if(paye<=0.005){ reg.statut='attente'; reg.echelonne=false; reg.restant=f.ttc; }
  else if(reg.restant>0.005){ reg.statut='partiel'; reg.echelonne=true; }
  else { reg.statut='regle'; reg.echelonne=false; reg.restant=0; }
}
function facturesOuvertes(tiersId){ return db.factures.filter(f=>{const r=reglementDe(f.id); return f.tiersId===tiersId && r && r.restant>0.005;}); }
function lettrer(bankId, factureId, montant){
  const b=db.banque.find(x=>x.id===bankId); if(!b||!factureId)return;
  b.alloc=b.alloc||[]; b.alloc.push({factureId, montant:r2(montant)});
  recalcReglement(factureId);
}
function delettrer(bankId){
  const b=db.banque.find(x=>x.id===bankId); if(!b)return;
  const facs=[...new Set((b.alloc||[]).map(a=>a.factureId))]; b.alloc=[];
  facs.forEach(recalcReglement); save(); render(); toast('Lettrage annulé');
}
function lettrerUI(bankId){
  const b=db.banque.find(x=>x.id===bankId); if(!b)return;
  const fac=document.getElementById('lt-fac-'+bankId).value; if(!fac)return toast('Choisissez une facture');
  let mt=+document.getElementById('lt-mt-'+bankId).value||0; if(mt<=0)return toast('Montant invalide');
  const reg=reglementDe(fac); const dispo=bankDispo(b);
  if(mt>dispo+0.005) mt=dispo; if(mt>reg.restant+0.005) mt=reg.restant;
  lettrer(bankId, fac, r2(mt)); save(); render(); toast('Pièce lettrée → règlement mis à jour');
}
function autoRapprocher(){
  let n=0;
  db.banque.forEach(b=>{ if(!b.tiersId)return; const dispo=bankDispo(b); if(dispo<=0.005)return;
    const cand=facturesOuvertes(b.tiersId).find(f=>Math.abs(reglementDe(f.id).restant-dispo)<0.01);
    if(cand){ lettrer(b.id, cand.id, dispo); n++; } });
  save(); render(); toast(n?(n+' pièce(s) rapprochée(s) automatiquement'):'Aucune correspondance exacte');
}
/* contrôle TVA à la pièce pour une facture */
function rapproFacture(f){
  const reg=reglementDe(f.id); const regle=reg?reg.regle:0;
  const tvaFacProp=f.ttc?r2(f.tva*regle/f.ttc):0;          // TVA facturée au prorata du réglé
  let tvaBan=0; db.banque.forEach(b=>(b.alloc||[]).forEach(a=>{ if(a.factureId===f.id){
    const t=db.tiers.find(x=>x.id===(b.tiersId||f.tiersId)); const taux=t?t.taux:f.taux; tvaBan+=a.montant*taux/(100+taux); } }));
  tvaBan=r2(tvaBan); const ecart=r2(tvaBan-tvaFacProp);
  let statut = regle<=0.005?'ouverte':(reg.restant>0.005?'partiel':'regle');
  return {regle:r2(regle), restant:reg?reg.restant:f.ttc, tvaFacProp, tvaBan, ecart, statut, anomalie:Math.abs(ecart)>0.02};
}
/* mouvement bancaire d'un tiers, non soldé, sans facture ouverte correspondante = à vérifier */
function bankAnomalie(b){ if(!b.tiersId)return false; if(bankDispo(b)<=0.005)return false; return facturesOuvertes(b.tiersId).length===0; }
function factureParCle(type,tid,date){ const f=db.factures.find(x=>x.type===type&&x.tiersId===tid&&x.date===date); return f?f.id:null; }

/* ============================================================
   DÉRIVATIONS
   ============================================================ */
function totauxCompte(p){ let d=0,c=0; db.ecritures.forEach(e=>e.lignes.forEach(l=>{ if(l.compte===p||l.compte.startsWith(p)){d+=l.debit;c+=l.credit;} })); return {debit:r2(d),credit:r2(c)}; }
function moisDisponibles(){ return [...new Set(db.ecritures.map(e=>ym(e.date)))].sort().reverse(); }
function tvaDuMois(m){
  let col=0,ded=0;
  db.ecritures.filter(e=>ym(e.date)===m && e.journal!=='BQ').forEach(e=>e.lignes.forEach(l=>{
    if(l.compte==='44571') col+=l.credit;
    if(l.compte==='44566'||l.compte==='44562') ded+=l.debit;
  }));
  col=r2(col); ded=r2(ded); const net=r2(col-ded);
  return {col, ded, net, aDecaisser:net>0?net:0, credit:net<0?-net:0};
}
/* Détail TVA du mois ventilé par taux, à partir des factures (justification pièce par pièce) */
function tvaDetailMois(m){
  const collectee={20:{base:0,tva:0,fact:[]},10:{base:0,tva:0,fact:[]},5.5:{base:0,tva:0,fact:[]}};
  const deductible={20:{base:0,tva:0,fact:[]},10:{base:0,tva:0,fact:[]},5.5:{base:0,tva:0,fact:[]}};
  db.factures.filter(f=>ym(f.date)===m).forEach(f=>{
    const taux=+f.taux||0; const bucket = f.type==='vente'?collectee:deductible;
    if(bucket[taux]){ bucket[taux].base=r2(bucket[taux].base+f.ht); bucket[taux].tva=r2(bucket[taux].tva+f.tva);
      const t=db.tiers.find(x=>x.id===f.tiersId);
      bucket[taux].fact.push({numero:f.numero, date:f.date, tiers:t?t.nom:'—', ht:f.ht, tva:f.tva, ttc:f.ttc, id:f.id}); }
  });
  const sumTva=o=>r2(Object.values(o).reduce((a,b)=>a+b.tva,0));
  const sumBase=o=>r2(Object.values(o).reduce((a,b)=>a+b.base,0));
  const col=sumTva(collectee), ded=sumTva(deductible);
  // report du crédit du mois précédent (ligne 22)
  const mois=moisDisponibles().slice().sort();
  const idx=mois.indexOf(m); let reportCredit=0;
  if(idx>0){ const prev=tvaDuMois(mois[idx-1]); reportCredit=prev.credit||0; }
  const nette=r2(col-ded-reportCredit);
  return { collectee, deductible, baseCol:sumBase(collectee), baseDed:sumBase(deductible),
    col, ded, reportCredit, nette, aDecaisser:nette>0?nette:0, credit:nette<0?-nette:0 };
}
/* Écriture OD TVA au dernier jour du mois — style Sage (journal OD TVA, pièce MM/AAAA) */
function odTvaDejaPostee(m){ const lib='OD TVA CA3 '+pieceMois(m); return db.ecritures.some(e=>e.journal==='ODTVA' && (e.libelle||'').includes(lib)); }
function posterODTVA(m){
  if(odTvaDejaPostee(m)) return false;
  const d=tvaDetailMois(m); if(d.col<=0 && d.ded<=0) return false;
  const date=dernierJourMoisISO(m); const piece=pieceMois(m); const lignes=[];
  // solde la TVA collectée (débit) et la TVA déductible (crédit)
  if(d.col>0) lignes.push({compte:'445710000', debit:d.col, credit:0});
  if(d.ded>0) lignes.push({compte:'445660000', debit:0, credit:d.ded});
  if(d.reportCredit>0) lignes.push({compte:'445670000', debit:0, credit:d.reportCredit});
  if(d.aDecaisser>0) lignes.push({compte:'445510000', debit:0, credit:d.aDecaisser});   // TVA à décaisser
  else if(d.credit>0) lignes.push({compte:'445670000', debit:d.credit, credit:0});       // crédit de TVA à reporter
  posterOD({ journal:'ODTVA', date, numero:piece, libelle:'OD TVA CA3 '+piece, lignes });
  return true;
}
function analytique(){
  const prod={},charge={},parClient={},parFourn={};
  db.factures.forEach(f=>{ const t=db.tiers.find(x=>x.id===f.tiersId); const nom=t?t.nom:'—';
    if(f.type==='vente'){ prod[f.compteContre]=(prod[f.compteContre]||0)+f.ht; parClient[nom]=(parClient[nom]||0)+f.ht; }
    else { charge[f.compteContre]=(charge[f.compteContre]||0)+f.ht; parFourn[nom]=(parFourn[nom]||0)+f.ht; } });
  const sum=o=>r2(Object.values(o).reduce((a,b)=>a+b,0));
  return {prod, charge, parClient, parFourn, ca:sum(prod), achats:sum(charge), resultat:r2(sum(prod)-sum(charge))};
}
/* statistiques par tiers (fiche détaillée) */
function statsTiers(id){
  const fs=db.factures.filter(f=>f.tiersId===id);
  let ht=0,tva=0,ttc=0; const parMois={},parAn={};
  fs.forEach(f=>{ ht+=f.ht; tva+=f.tva; ttc+=f.ttc;
    parMois[ym(f.date)]=(parMois[ym(f.date)]||0)+f.ttc;
    const an=f.date.slice(0,4); parAn[an]=(parAn[an]||0)+f.ttc; });
  // règlements bancaires liés
  const paye=db.banque.filter(b=>b.tiersId===id).reduce((a,b)=>a+b.montant,0);
  return {ht:r2(ht),tva:r2(tva),ttc:r2(ttc),parMois,parAn,factures:fs,nb:fs.length,paye:r2(paye)};
}
/* rapprochement TVA : banque (via taux du tiers) vs factures */
function rapprochementTVA(m){
  const tf=tvaDuMois(m);
  let banDed=0,banCol=0;
  db.banque.filter(b=>ym(b.date)===m && b.tiersId).forEach(b=>{
    const t=db.tiers.find(x=>x.id===b.tiersId); if(!t)return;
    const tva=r2(b.montant*t.taux/(100+t.taux));
    if(t.type==='fournisseur') banDed+=tva; else banCol+=tva;
  });
  banDed=r2(banDed); banCol=r2(banCol);
  return { facCol:tf.col, facDed:tf.ded, banCol, banDed, ecartCol:r2(tf.col-banCol), ecartDed:r2(tf.ded-banDed) };
}

let current='dash';
function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML=''; let lastSec='';
  PAGES.forEach(p=>{ if(p.sec!==lastSec){ const s=document.createElement('div'); s.className='nav-sec'; s.textContent=p.sec; nav.appendChild(s); lastSec=p.sec; }
    const b=document.createElement('button'); b.className='nav-btn'+(p.id===current?' active':'');
    b.innerHTML=`<span class="ico">${p.ico}</span>${p.lbl}`; b.onclick=()=>{current=p.id;render();}; nav.appendChild(b); });
}
let connecte=false;   // false = écran de sélection de dossier ; true = logiciel ouvert
function render(){
  const layout=document.querySelector('.layout'); const aside=document.querySelector('aside'); const mainEl=document.getElementById('main');
  if(!connecte){ if(aside) aside.style.display='none'; if(layout) layout.classList.add('solo'); mainEl.className='login-bleed'; mainEl.innerHTML=ecranSelectionDossier(); return; }
  if(aside) aside.style.display=''; if(layout) layout.classList.remove('solo');
  buildNav();
  document.body.setAttribute('data-page', current);
  // tous les modules en plein écran : compta/compteaux gèrent leur propre layout logiciel ; les autres passent par un cadre plein écran scrollable
  const softwareLike = (current==='compta'||current==='compteaux'||current==='rappro'||current==='chargespaie'||current==='immos');
  mainEl.className = 'fullbleed';
  const contenu=({
  dash:pageDash, societe:pageSociete, tiers:pageTiers, facturation:pageFacturation, achats:pageAchats,
  client:pageEspaceClient, compta:pageCompta, compteaux:pageCompteAux, chargespaie:pageChargesPaie, journal:pageJournal, ia:pageIA, tva:pageTVA, editions:pageEditions, fec:pageFEC,
  analytique:pageAnalytique, banque:pageBanque, saisiebq:pageSaisieBq, rappro:pageRappro, reglements:pageReglements,
  immos:pageImmos,
  dossier:pageDossier, parametrage:pageParametrage, infosociete:pageInfoSociete, coffre:pageCoffre
})[current]();
  // compta/compteaux et dash/societe fournissent déjà leur propre conteneur plein cadre ; les autres sont enveloppés
  const autoWrap = !softwareLike && current!=='dash' && current!=='societe';
  mainEl.innerHTML = autoWrap ? ('<div class="mod-wrap">'+contenu+'</div>') : contenu;
  if(current==='tiers') majComptesTiers();
  if(current==='facturation' && document.getElementById('fa-client')) faMaj();
  if(current==='achats' && document.getElementById('ac-ttc')) majAc();
  if(current==='banque' && document.getElementById('bq-compte')) majBq();
  if(current==='saisiebq' && document.getElementById('sj-compte')) majSj();
}
let selRecherche='';
function ecranSelectionDossier(){
  const cab=db.cabinet||cabinetDefaut();
  const q=(selRecherche||'').toLowerCase();
  let liste=cab.dossiers.slice();
  if(q) liste=liste.filter(d=>(d.nom||'').toLowerCase().includes(q)||(d.ville||'').toLowerCase().includes(q)||(d.activite||'').toLowerCase().includes(q)||(d.siren||'').includes(q));
  liste.sort((a,b)=>(b.favori?1:0)-(a.favori?1:0));
  const cartes=liste.map(d=>`<button class="dossier-card" onclick="choisirDossier('${d.id}')">
      <div class="dc-top"><span class="dc-av">${(d.nom||'?')[0]}</span>
        <span class="dc-star ${d.favori?'on':''}" onclick="event.stopPropagation();toggleFavoriDossier('${d.id}');render()">${d.favori?'★':'☆'}</span></div>
      <div class="dc-nom">${d.nom}</div>
      <div class="dc-meta">${[d.forme,d.activite,d.ville].filter(Boolean).join(' · ')||'—'}</div>
      <div class="dc-siren">${d.siren?('SIREN '+d.siren):'SIREN —'}</div>
      <div class="dc-foot"><span class="dc-badge ${d.actif?'on':''}">${d.actif?'Actif':'Inactif'}</span>
        <span class="dc-open">Ouvrir le dossier →</span></div>
    </button>`).join('');
  return `<div class="login-wrap">
    <div class="login-head">
      <div class="login-brand" onclick="retourSelectionDossier()" style="cursor:pointer">
        <svg viewBox="0 0 150 44" width="132" height="40" xmlns="http://www.w3.org/2000/svg" aria-label="YADA">
          <defs><linearGradient id="yd-gl" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e8b84b"/><stop offset="1" stop-color="#a8801f"/></linearGradient></defs>
          <rect x="1" y="7" width="32" height="32" rx="9" fill="url(#yd-gl)"/>
          <path d="M10 15 L17 24 L24 15" fill="none" stroke="#0e1a22" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="17" y1="24" x2="17" y2="33" stroke="#0e1a22" stroke-width="3.2" stroke-linecap="round"/>
          <text x="44" y="33" font-family="Fraunces, serif" font-size="29" font-weight="900" fill="#ffffff" letter-spacing="1.5">YADA</text>
        </svg>
        <small>Système intégré · CA3</small></div>
      <div class="login-cab"><b>${cab.cabinetNom}</b><span>${cab.collaborateur} · ${cab.role}</span></div>
    </div>
    <div class="login-title">Sélectionnez un dossier</div>
    <div class="login-sub">Choisissez la société à ouvrir. Vous pourrez changer de dossier à tout moment (vue cabinet comptable).</div>
    <input class="login-search" placeholder="Rechercher un dossier (nom, ville, activité, SIREN)…" value="${(selRecherche||'').replace(/"/g,'&quot;')}" oninput="selRecherche=this.value;render()" autofocus>
    <div class="dossier-grid">${cartes||'<div class="login-empty">Aucun dossier — importez un FEC ou créez un dossier.</div>'}</div>
    <div class="login-actions">
      <button class="btn btn-gold" onclick="ouvrirCreationDossier()">Créer un dossier</button>
      <button class="btn btn-ghost" onclick="document.getElementById('imp').click()">Importer des données (JSON)</button>
      <button class="btn btn-ghost" onclick="if(confirm('Réinitialiser avec les données de démonstration ?')){seed();save();connecte=false;render();}">↺ Réinitialiser (démo)</button>
    </div>
  </div>`;
}
function choisirDossier(id){ if(!db.dossiersData[id]){ // dossier du portefeuille sans dataset encore : en créer un vierge
    const d=db.cabinet.dossiers.find(x=>x.id===id);
    db.dossiersData[id]=datasetVide(Object.assign(societeDefaut(),{ raison:d.nom, dossierNom:d.nom, dossierCode:(d.nom||'').replace(/\s/g,'').slice(0,6), formeJur:d.forme||'SAS', siren:d.siren||'', activite:d.activite||'', ville:d.ville||'' }));
    withDataset(db.dossiersData[id], ()=>chargerPlanBTP());
  }
  chargerDossier(id); connecte=true; current='dash'; sgPer=null; render();
  const d=db.cabinet.dossiers.find(x=>x.id===id); toast('Dossier « '+(d?d.nom:'')+' » ouvert');
}
function retourSelectionDossier(){ persistActif(); connecte=false; selRecherche=''; render(); }
function head(title,desc){ return `<div class="page-head"><div><h1>${title}</h1><p>${desc}</p></div></div>`; }
function flow(steps){ return `<div class="flow">${steps.map((s,i)=>(i?'<span class="arr">→</span>':'')+`<b>${s}</b>`).join('')}</div>`; }

let dashRecherche='';
function pageDash(){
  return '<div class="dash-wrap">'+dashCompta()+'</div>';
}
function pageSociete(){
  return '<div class="dash-wrap">'+cabinetApercu()+'</div>';
}
function cabinetApercu(){
  const cab=db.cabinet||cabinetDefaut();
  const actifs=cab.dossiers.filter(d=>d.actif).length;
  const q=(dashRecherche||'').toLowerCase();
  let liste=cab.dossiers.slice();
  if(q) liste=liste.filter(d=>(d.nom||'').toLowerCase().includes(q)||(d.ville||'').toLowerCase().includes(q)||(d.activite||'').toLowerCase().includes(q));
  liste.sort((a,b)=>(b.favori?1:0)-(a.favori?1:0));
  return head('Bienvenue, '+cab.collaborateur,'Visualisez et gérez votre cabinet comptable — '+cab.cabinetNom+' · '+cab.role)+
  `<div class="grid g2">
    <div class="kpi"><div class="lbl">Écritures comptables rejetées</div><div class="val">${cab.ecrituresRejetees||0}</div></div>
    <div class="kpi blue"><div class="lbl">Entreprises activées</div><div class="val">${actifs} <span class="meta">/ ${cab.total||cab.dossiers.length}</span></div></div>
  </div>
  <div class="card"><h2>Portefeuille d'entreprises</h2>
    <div class="sub">Cliquez sur « Ouvrir » pour accéder au dossier comptable.</div>
    <input id="cab-search" placeholder="Rechercher une entreprise…" value="${(dashRecherche||'').replace(/"/g,'&quot;')}" oninput="dashRecherche=this.value;rafraichirCabinet()" autocomplete="off" style="margin-bottom:14px">
    <div id="rg-portfolio">${cabinetTable(liste)}</div>
  </div>`;
}
function cabinetTable(liste){
  const rows=liste.map(d=>`<tr>
    <td><b>${d.nom}</b> <span class="mini">${d.forme||''}${d.siren?(' · SIREN '+d.siren):''}${d.ville?(' · '+d.ville):''}${d.activite?(' · '+d.activite):''}</span></td>
    <td class="r num">${d.factFourn||0}</td>
    <td class="r num">${d.factClient||0}</td>
    <td class="r num">${d.docsManquants||0}</td>
    <td><span class="rg-link" onclick="ouvrirDossierCabinet('${d.id}')">Accéder à ${d.portail||'Qonto'}</span></td>
    <td class="r" style="white-space:nowrap">
      <button class="btn btn-gold btn-sm" onclick="ouvrirDossierCabinet('${d.id}')">Ouvrir</button>
      <span class="rg-star ${d.favori?'on':''}" onclick="toggleFavoriDossier('${d.id}')" title="Favori" style="cursor:pointer;margin-left:6px">${d.favori?'★':'☆'}</span></td>
  </tr>`).join('');
  return `<table><thead><tr><th>Nom de l'entreprise</th><th class="r">Fact. fournisseur</th><th class="r">Fact. client</th><th class="r">Docs manquants</th><th>Portail client</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=6 class=empty>Aucune entreprise — créez un dossier dans « Société &amp; création du dossier »</td></tr>'}</tbody></table>`;
}
function rafraichirCabinet(){ const el=document.getElementById('rg-portfolio'); if(!el)return;
  const cab=db.cabinet; const q=(dashRecherche||'').toLowerCase();
  let liste=cab.dossiers.slice(); if(q) liste=liste.filter(d=>(d.nom||'').toLowerCase().includes(q)||(d.ville||'').toLowerCase().includes(q)||(d.activite||'').toLowerCase().includes(q));
  liste.sort((a,b)=>(b.favori?1:0)-(a.favori?1:0));
  el.innerHTML=cabinetTable(liste);
}
function toggleFavoriDossier(id){ const d=db.cabinet.dossiers.find(x=>x.id===id); if(d){ d.favori=!d.favori; save(); rafraichirCabinet(); } }
function ouvrirDossierCabinet(id){ const d=db.cabinet.dossiers.find(x=>x.id===id); if(!d)return;
  // créer le jeu de données du dossier s'il n'existe pas encore
  if(!db.dossiersData[id]){
    db.dossiersData[id]=datasetVide(Object.assign(societeDefaut(),{ raison:d.nom, dossierNom:d.nom, dossierCode:(d.nom||'').replace(/\s/g,'').slice(0,6), formeJur:d.forme||'SAS', siren:d.siren||'', activite:d.activite||'', ville:d.ville||'' }));
    withDataset(db.dossiersData[id], ()=>chargerPlanBTP());
  }
  chargerDossier(id);
  current='compta'; sgPer=null; render(); toast('Dossier « '+d.nom+' » ouvert');
}
function dashCompta(){
  const a=analytique(); const mois=moisDisponibles(); const m=mois[0]||ym(todayStr()); const tva=tvaDuMois(m);
  return head('Synthèse comptable du dossier courant','Données consolidées du dossier '+(db.societe?db.societe.dossierNom:'')+' — issues des écritures saisies.')+
  `<div class="grid g4">
    <div class="kpi green"><div class="lbl">Chiffre d'affaires HT</div><div class="val cre">${eur(a.ca)}</div><div class="meta">Comptes 70x</div></div>
    <div class="kpi red"><div class="lbl">Charges HT</div><div class="val deb">${eur(a.achats)}</div><div class="meta">Comptes 60x</div></div>
    <div class="kpi blue"><div class="lbl">Résultat</div><div class="val">${eur(a.resultat)}</div><div class="meta">Produits − Charges</div></div>
    <div class="kpi"><div class="lbl">TVA ${moisLabel(m)}</div><div class="val">${eur(tva.aDecaisser||tva.credit)}</div><div class="meta">${tva.aDecaisser?'à décaisser':'crédit à reporter'}</div></div>
  </div>
  <div class="grid g2">
    <div class="card"><h2>Dernières écritures</h2><div class="sub">Générées automatiquement (factures + banque)</div>
      <table><thead><tr><th>Date</th><th>Jrn</th><th>Libellé</th><th class="r">Montant</th></tr></thead><tbody>
      ${db.ecritures.slice(-6).reverse().map(e=>{const d=e.lignes.reduce((a,l)=>a+l.debit,0);
        return `<tr><td class="num">${e.date}</td><td>${jrnTag(e.journal)}</td><td>${e.libelle}</td><td class="r num">${eur(d)}</td></tr>`}).join('')||'<tr><td colspan=4 class=empty>Aucune écriture</td></tr>'}
      </tbody></table></div>
    <div class="card"><h2>Trésorerie à suivre</h2><div class="sub">Factures non soldées</div>
      <table><thead><tr><th>Pièce</th><th>Tiers</th><th>Statut</th><th class="r">Restant</th></tr></thead><tbody>
      ${db.reglements.filter(r=>r.statut!=='regle').slice(0,6).map(r=>{const f=db.factures.find(x=>x.id===r.factureId);const t=db.tiers.find(x=>x.id===f.tiersId);
        return `<tr><td class="num">${f.numero}</td><td>${t?t.nom:''}</td><td>${statutTag(r)}</td><td class="r num">${eur(r.restant)}</td></tr>`}).join('')||'<tr><td colspan=4 class=empty>Tout est soldé</td></tr>'}
      </tbody></table></div>
  </div>`;
}

/* ---------- TIERS (fiches détaillées + recherche) ---------- */

  const F =db.tiers.filter(t=>t.type==='fournisseur');
  const CS=db.tiers.filter(t=>t.type==='client'&&t.categorie!=='particulier');
  const CP=db.tiers.filter(t=>t.type==='client'&&t.categorie==='particulier');
  return head('Tiers — clients & fournisseurs','À la réception d\'une facture, le tiers reconnu pré-affecte automatiquement ses comptes de charge/produit et de TVA. Cliquez sur une dénomination pour la fiche complète.')+
  `<div class="card"><h2>Recherche</h2><div class="sub">Tapez n'importe quelle information : nom, compte, e-mail, SIRET, téléphone, adresse…</div>
    <input id="ti-search" placeholder="Rechercher un fournisseur ou un client…" oninput="filtreTiers()" autocomplete="off">
    <div id="ti-results"></div></div>`+
  sectionTiers('Fournisseurs', F, 'fournisseur')+
  sectionTiers('Clients — Sociétés', CS, 'client')+
  sectionTiers('Clients — Particuliers', CP, 'client')+
  `<div class="card figer-card"><h2>Ajouter / enregistrer un tiers</h2><div class="sub">La règle (comptes + taux) sera appliquée automatiquement à ses futures factures</div>
    <div class="row g4">
      <div class="field"><label>Type</label><select id="ti-type" onchange="majComptesTiers()">

      <div class="field" id="ti-cat-wrap" style="display:none"><label>Catégorie client</label><select id="ti-cat"><option value="societe">Société</option><option value="particulier">Particulier</option></select></div>
      <div class="field"><label>Dénomination</label><input id="ti-nom" placeholder="Ex : EDF Pro" oninput="majAuxApercu()"><div class="hint" id="ti-aux-apercu">Compte auxiliaire : —</div></div>
      <div class="field"><label>Taux TVA défaut</label><select id="ti-taux"><option>20</option><option>10</option><option>5.5</option><option>2.1</option><option>0</option></select></div>
    </div>
    <div class="row g2">
      <div class="field"><label>Compte de contrepartie (charge/produit)</label><select id="ti-contre"></select></div>
      <div class="field"><label>Compte de TVA</label><select id="ti-tva"></select></div>
    </div>
    <div class="row g4">
      <div class="field"><label>E-mail</label><input id="ti-email" placeholder="contact@…"></div>
      <div class="field"><label>Téléphone</label><input id="ti-tel"></div>
      <div class="field"><label>SIREN / SIRET</label><input id="ti-siret" placeholder="9 chiffres (SIREN) ou 14 (SIRET)" oninput="tiersSiretAuto(this)"></div>
      <div class="field"><label>Adresse</label><input id="ti-adresse"></div>
    </div>
    <div class="right" style="justify-content:flex-start;margin:6px 0 10px;gap:10px;align-items:center">
      <button class="btn btn-pri btn-sm" onclick="remplirTiersDepuisSiret()">Récupérer les informations (SIREN/SIRET)</button>
      <span class="mini" id="ti-lookup-status"></span>
    </div>
    <div class="sub">Informations société (récupérées automatiquement via le SIRET, modifiables) :</div>
    <div class="row g4">
      <div class="field"><label>SIREN</label><input id="ti-siren"></div>
      <div class="field"><label>N° TVA intracommunautaire</label><input id="ti-tvaintra"></div>
      <div class="field"><label>Forme juridique</label><input id="ti-forme"></div>
      <div class="field"><label>Code APE</label><input id="ti-ape"></div>
    </div>
    <div class="row g4">
      <div class="field"><label>Activité</label><input id="ti-activite"></div>
      <div class="field"><label>Date de création</label><input id="ti-datecrea"></div>
      <div class="field"><label>Capital social</label><input id="ti-capital"></div>
      <div class="field"><label>Convention collective</label><input id="ti-conv"></div>
    </div>
    <div class="right"><button class="btn btn-gold" onclick="ajoutTiers()">+ Enregistrer la fiche</button></div>

}
function sectionTiers(title,list,kind){
  const isC=kind==='client';
  const rows=list.map(t=>{const s=statsTiers(t.id); const _dup=window.dupTiersIds&&window.dupTiersIds.has(t.id);
    return `<tr class="${_dup?'dup-tiers':''}${t.nouveau?' new-tiers':''}">
      <td><button class="linkname" onclick="openTiers('${t.id}')">${t.nom}</button>${_dup?' <span class="dup-tag">DOUBLON</span>':''}${t.nouveau?' <span class="new-tag" title="Créé par le client — à vérifier/compléter">NOUVEAU</span>':''}</td>
      <td class="num">${t.compteAux||(isC?'411':'401')}</td>
      <td class="num">${t.compteContre} <span class="mini">${COMPTES[t.compteContre]||''}</span></td>
      <td class="r num">${t.taux} %</td>
      <td class="r num">${eur(s.ttc)}</td>
      <td class="r num ${isC?'cre':'deb'}">${eur(s.tva)}</td>
    </tr>`;}).join('');
  return `<div class="card"><h2>${title}</h2><div class="sub">${list.length} fiche(s) — cliquez sur un nom pour la fiche complète</div>
    <table><thead><tr><th>Dénomination</th><th>Compte tiers</th><th>Compte ${isC?'produit':'charge'}</th><th class="r">Taux</th>
      <th class="r">${isC?'CA TTC':'Dépensé TTC'}</th><th class="r">TVA ${isC?'collectée':'payée'}</th></tr></thead>
    <tbody>${rows||'<tr><td colspan=6 class=empty>Aucune fiche</td></tr>'}</tbody></table></div>`;
}
function filtreTiers(){
  const q=(document.getElementById('ti-search').value||'').toLowerCase().trim();
  const box=document.getElementById('ti-results'); if(!q){ box.innerHTML=''; return; }
  const res=db.tiers.filter(t=>[t.nom,t.compteAux,t.compteContre,t.compteTVA,t.email,t.tel,t.siret,t.adresse,t.type,t.categorie]
    .filter(Boolean).join(' ').toLowerCase().includes(q));
  box.innerHTML=`<div class="search-res">${res.map(t=>{const s=statsTiers(t.id);
    return `<button onclick="openTiers('${t.id}')"><span><b>${t.nom}</b> <span class="mini">${t.type}${t.categorie?(' · '+t.categorie):''} · ${t.compteAux||''}${t.email?' · '+t.email:''}</span></span><span class="num">${eur(s.ttc)}</span></button>`;}).join('')
    ||'<div class="empty" style="padding:18px">Aucun résultat</div>'}</div>`;
}
function openTiers(id){
  const t=db.tiers.find(x=>x.id===id); if(!t)return; const s=statsTiers(id); const isC=t.type==='client';

  document.getElementById('ti-tva').innerHTML=optComptes(type==='client'?['44571']:['44566','44562']);

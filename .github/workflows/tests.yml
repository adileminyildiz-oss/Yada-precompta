name: Tests — équilibre des écritures

# Filet de sécurité comptable : vérifie sur chaque push / PR que TOUTE écriture
# des 2 démos (et de la génération en direct) est équilibrée (Σ débit = Σ crédit).
on:
  push:
    branches: [main, 'claude/**']
    paths:
      - precompta.html
      - tests/**
      - .github/workflows/tests.yml
  pull_request:
    paths:
      - precompta.html
      - tests/**
      - .github/workflows/tests.yml
  workflow_dispatch: {}

jobs:
  equilibre:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Playwright (Chromium)
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@^1.48
          npx playwright install --with-deps chromium

      - name: Contrôle d'équilibre des écritures
        run: node tests/equilibre-ecritures.mjs

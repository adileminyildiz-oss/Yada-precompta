name: Archive ZIP du squelette

# Régénère automatiquement yada-precompta-github.zip à chaque mise à jour
# du logiciel sur main (nouvelle version), puis le recommite.
on:
  push:
    branches: [main]
    paths:
      - precompta.html
      - sw.js
      - manifest.webmanifest
      - icon-192.png
      - icon-512.png
      - index.html
      - CLAUDE.md
      - ROADMAP.md
      - README.md
      - PASSATION-YADA-Precompta.md
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-zip
  cancel-in-progress: false

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construire l'archive
        run: |
          rm -f yada-precompta-github.zip
          zip -q yada-precompta-github.zip \
            precompta.html sw.js manifest.webmanifest \
            icon-192.png icon-512.png index.html \
            CLAUDE.md ROADMAP.md README.md PASSATION-YADA-Precompta.md
          echo "Contenu :" && unzip -l yada-precompta-github.zip

      - name: Recommiter si l'archive a changé
        run: |
          if git diff --quiet -- yada-precompta-github.zip; then
            echo "Archive inchangée — rien à committer."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add yada-precompta-github.zip
            git commit -m "chore: régénération auto de l'archive ZIP du squelette [skip ci]"
            git push
          fi
